      );
    };

    // =====================================================
    // 頁面：點數兌換
    // =====================================================
    const Redeem = () => {
      const { redeemableProducts, user, setUser } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [processing, setProcessing] = useState(false);
      const [redemptions, setRedemptions] = useState([]);
      const [pointsLog, setPointsLog] = useState([]);
      const [loadingHistory, setLoadingHistory] = useState(true);
      const [historyTab, setHistoryTab] = useState('redeem'); // 'redeem' | 'log'

      useEffect(() => {
        if (!user || user.lineId === 'guest') { setLoadingHistory(false); return; }
        Promise.all([
          api.get('getUserRedemptions', { lineId: user.lineId }).catch(()=>null),
          api.get('getPointsLog', { lineId: user.lineId }).catch(()=>null)
        ]).then(([rr, rl]) => {
          if (rr && !rr.error && Array.isArray(rr)) setRedemptions(rr);
          if (rl && !rl.error && Array.isArray(rl)) setPointsLog(rl);
          setLoadingHistory(false);
        });
      }, [user]);

      const handleRedeem = async (product) => {
        if (!user) return;
        if ((user.points||0) < product.redeemPoints) { showAlert('點數不足無法兌換'); return; }
        if (!await showConfirm(`確定要使用 ${product.redeemPoints} 點兌換「${product.name}」嗎？\n兌換後需等待管理員審核出貨。`)) return;
        setProcessing(true);
        try {
          const res = await api.post('createRedemption', { redemption: { lineId:user.lineId, userName:user.name, itemId:product.id, itemName:product.name, points:product.redeemPoints } });
          if (res?.success) {
            showAlert('兌換申請已送出！請等待管理員審核。');
            setUser({ ...user, points: user.points - product.redeemPoints });
            const newRec = { redemptionId: res.redemptionId || `R${Date.now()}`, date: new Date().toISOString(), status: 'Pending', content: { itemName: product.name, points: product.redeemPoints } };
            setRedemptions(prev => [newRec, ...prev]);
            setPointsLog(prev => [{ date: new Date().toISOString(), type:'redeemed', amount:-product.redeemPoints, label:'兌換商品', ref:newRec.redemptionId, status:'Pending' }, ...prev]);
          } else { showAlert('兌換失敗: ' + (res?.error||'未知錯誤')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
        finally { setProcessing(false); }
      };

      const redeemStatusMap = { Pending:{label:'審核中',color:'bg-yellow-100 text-yellow-700'}, Shipped:{label:'已出貨',color:'bg-blue-100 text-blue-700'}, Completed:{label:'已完成',color:'bg-green-100 text-green-700'}, Cancelled:{label:'已取消',color:'bg-red-100 text-red-700'} };
      const logTypeMap = { earned:{icon:'➕',color:'text-green-600',bg:'bg-green-50',border:'border-green-200'}, used:{icon:'➖',color:'text-blue-600',bg:'bg-blue-50',border:'border-blue-200'}, redeemed:{icon:'🎁',color:'text-orange-600',bg:'bg-orange-50',border:'border-orange-200'} };

      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans">
          <div className="bg-white p-4 sticky top-0 shadow-sm z-50 flex items-center gap-3">
            <button onClick={() => navigate(-1)}><Icons.ArrowLeft /></button>
            <h1 className="font-bold text-lg">點數兌換專區</h1>
          </div>
          <div className="p-4 space-y-4">
            {/* 點數卡 */}
            <div className="bg-gradient-to-r from-lime-500 to-lime-600 text-white p-5 rounded-2xl flex justify-between items-center shadow-lg shadow-lime-200">
              <div>
                <div className="text-lime-100 text-sm font-medium mb-1">目前持有點數</div>
                <span className="text-4xl font-black">{user?.points||0}</span>
                <span className="text-sm opacity-80 ml-1">pts</span>
              </div>
              <div className="text-right">
                <div className="bg-white/20 p-3 rounded-full"><Icons.Gift size={32} className="text-white" /></div>
              </div>
            </div>

            {/* 紀錄 Tab 切換 — 緊接在點數卡下方 */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="flex border-b border-gray-100">
                <button onClick={()=>setHistoryTab('redeem')}
                  className={`flex-1 py-3 text-sm font-bold flex items-center justify-center gap-1.5 border-b-2 transition-colors ${historyTab==='redeem'?'border-orange-400 text-orange-600 bg-orange-50':'border-transparent text-gray-400'}`}>
                  🎁 兌換紀錄 <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">{redemptions.length}</span>
                </button>
                <button onClick={()=>setHistoryTab('log')}
                  className={`flex-1 py-3 text-sm font-bold flex items-center justify-center gap-1.5 border-b-2 transition-colors ${historyTab==='log'?'border-lime-500 text-lime-600 bg-lime-50':'border-transparent text-gray-400'}`}>
                  📊 點數使用紀錄 <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">{pointsLog.length}</span>
                </button>
              </div>
              <div className="p-3 max-h-72 overflow-y-auto space-y-2">
                {loadingHistory ? (
                  <div className="text-center py-6 text-gray-400 text-sm">載入中...</div>
                ) : historyTab === 'redeem' ? (
                  redemptions.length === 0
                    ? <div className="text-center py-8 text-gray-400 text-sm">尚無兌換紀錄</div>
                    : redemptions.map((r, i) => {
                        const st = redeemStatusMap[r.status] || {label:r.status,color:'bg-gray-100 text-gray-600'};
                        return (
                          <div key={r.redemptionId||i} className="bg-orange-50 border border-orange-100 rounded-xl p-3 flex items-center gap-3">
                            <div className="flex-1 min-w-0">
                              <div className="font-bold text-gray-800 text-sm truncate">{r.content?.itemName || r.itemName || '兌換商品'}</div>
                              <div className="text-xs text-gray-400">{r.date ? new Date(r.date).toLocaleDateString('zh-TW') : ''} · {r.redemptionId}</div>
                            </div>
                            <div className="text-right flex-shrink-0">
                              <div className="text-orange-600 font-black text-sm">-{r.content?.points||r.points} pts</div>
                              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${st.color}`}>{st.label}</span>
                            </div>
                          </div>
                        );
                      })
                ) : (
                  pointsLog.length === 0
                    ? <div className="text-center py-8 text-gray-400 text-sm">尚無點數紀錄</div>
                    : pointsLog.map((l, i) => {
                        const t = logTypeMap[l.type] || {icon:'•',color:'text-gray-600',bg:'bg-gray-50',border:'border-gray-100'};
                        return (
                          <div key={i} className={`${t.bg} border ${t.border} rounded-xl p-3 flex items-center gap-3`}>
                            <div className="text-xl">{t.icon}</div>
                            <div className="flex-1 min-w-0">
                              <div className="font-bold text-gray-800 text-sm">{l.label}</div>
                              <div className="text-xs text-gray-400">{l.date ? new Date(l.date).toLocaleDateString('zh-TW') : ''} · {l.ref}</div>
                              {l.status && <span className="text-[10px] text-gray-400">{({Completed:'已完成',Pending:'待處理',Cancelled:'已取消',Shipped:'已出貨'})[l.status]||l.status}</span>}
                            </div>
                            <div className={`font-black text-base flex-shrink-0 ${t.color}`}>
                              {l.amount > 0 ? '+' : ''}{l.amount} pts
                            </div>
                          </div>
                        );
                      })
                )}
              </div>
            </div>

            {/* 可兌換商品 — 移至下方 */}
            <div>
              <h2 className="font-black text-gray-800 text-base mb-3 flex items-center gap-2">🛍️ 可兌換商品</h2>
              {redeemableProducts.length===0 ? (
                <div className="text-center text-gray-500 py-10 bg-white rounded-2xl"><div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3"><Icons.Gift className="w-7 h-7 text-gray-400" /></div>目前沒有可兌換的商品</div>
              ) : (
                <div className="grid gap-4">
                  {redeemableProducts.map(p => (
                    <div key={p.id} className="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
                      <div className="aspect-video w-full bg-gray-100 relative"><img src={p.images?.[0]} className="w-full h-full object-cover" referrerPolicy="no-referrer" /></div>
                      <div className="p-4 flex-1 flex flex-col justify-between">
                        <div><h3 className="font-bold text-gray-800 mb-1">{p.name}</h3><p className="text-xs text-gray-500 line-clamp-2 mb-3">{p.description}</p></div>
                        <div className="flex justify-between items-center mt-2 border-t border-gray-100 pt-3">
                          <span className="text-lime-600 font-black text-lg">{p.redeemPoints} 點</span>
                          <button disabled={processing||(user?.points||0)<p.redeemPoints} onClick={() => handleRedeem(p)}
                            className={`px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${(user?.points||0)>=p.redeemPoints?'bg-lime-500 text-white hover:bg-lime-600':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                            {processing?'處理中...':'立即兌換'}
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // =====================================================
    // =====================================================
    // 商品評論元件（顯示在商品頁底部）
    // =====================================================
    const ProductReviews = ({ productId, productName, user }) => {
      const { showAlert } = useDialog();
      const [reviews, setReviews] = useState([]);
      const [myReview, setMyReview] = useState(null);
      const [loading, setLoading] = useState(true);
      const [rating, setRating] = useState(0);
      const [comment, setComment] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [showForm, setShowForm] = useState(false);
      const [hasPurchased, setHasPurchased] = useState(false); // 是否有已完成訂單含此商品
      const [purchasedOrderId, setPurchasedOrderId] = useState(''); // 對應訂單ID

      // 匿名遮罩：2字→蘇*；3字以上→王****晨（首尾+****）
      const maskName = (name) => {
        if (!name) return '匿名';
        const n = String(name).trim();
        if (n.length <= 1) return n;
        if (n.length === 2) return n[0] + '*';
        return n[0] + '****' + n[n.length - 1];
      };

      useEffect(() => {
        api.get('getProductReviews', { productId: String(productId), productName }).then(r => {
          if (Array.isArray(r)) setReviews(r);
          setLoading(false);
        }).catch(() => setLoading(false));
        // 檢查是否已評價
        if (user && user.lineId !== 'guest') {
          api.get('getUserReviews', { lineId: user.lineId }).then(r => {
            if (Array.isArray(r)) {
              const mine = r.find(rv => rv.itemId === String(productId) || rv.itemName === productName);
              if (mine) { setMyReview(mine); setRating(mine.rating); setComment(mine.comment || ''); }
            }
          });
          // ✅ 檢查是否有已完成訂單包含此商品
          api.get('getUserOrders', { lineId: user.lineId }).then(orders => {
            if (!Array.isArray(orders)) return;
            const completedOrders = orders.filter(o => o.status === 'Completed');
            for (const order of completedOrders) {
              const items = order.content?.items || order.items || [];
              const found = Array.isArray(items) && items.find(item =>
                String(item.id) === String(productId) || item.name === productName
              );
              if (found) {
                setHasPurchased(true);
                setPurchasedOrderId(order.orderId || order.id || '');
                break;
              }
            }
          });
        }
      }, [productId]);

      const avgRating = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1) : 0;

      const handleSubmitReview = async () => {
        if (!user || user.lineId === 'guest') { showAlert('請先登入才能留下評論'); return; }
        if (!hasPurchased) { showAlert('您尚未購買此商品，或訂單未完成，無法評論'); return; }
        if (!rating) { showAlert('請選擇星級評分'); return; }
        setSubmitting(true);
        try {
          const r = await api.post('submitReview', {
            lineId: user.lineId, userName: user.name,
            orderId: purchasedOrderId || 'VERIFIED',
            itemId: String(productId), itemName: productName, rating, comment
          });
          if (r?.success) {
            const newReview = { userName: user.name, rating, comment, submittedAt: new Date().toISOString().split('T')[0] };
            setReviews(prev => [newReview, ...prev]);
            setMyReview(newReview);
            setShowForm(false);
            showAlert('✅ 感謝您的評論！');
          } else showAlert(r?.error === '已評價過此商品' ? '您已評論過此商品' : '評論失敗：' + (r?.error || ''));
        } catch(e) { showAlert('送出失敗，請稍後再試'); }
        setSubmitting(false);
      };

      const StarDisplay = ({ val, size='text-lg' }) => (
        <span className="inline-flex">
          {[1,2,3,4,5].map(s => <span key={s} className={`${size} leading-none ${s<=val?'text-yellow-400':'text-gray-200'}`}>★</span>)}
        </span>
      );

      return (
        <div className="mt-2 mb-6 border-t border-gray-100 pt-5">
          {/* 評論標題列 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <h3 className="font-bold text-gray-800 text-sm">顧客評論</h3>
              {reviews.length > 0 && (
                <span className="text-xs bg-yellow-50 text-yellow-700 border border-yellow-200 px-2 py-0.5 rounded-full font-bold">
                  ★ {avgRating} ({reviews.length})
                </span>
              )}
            </div>
            {!myReview && user?.lineId !== 'guest' && (
              hasPurchased
                ? <button onClick={() => setShowForm(f => !f)}
                    className="text-xs font-bold text-lime-600 border border-lime-300 px-3 py-1.5 rounded-xl active:scale-95 transition-transform bg-lime-50">
                    {showForm ? '取消' : '✍️ 寫評論'}
                  </button>
                : <span className="text-xs text-gray-400 bg-gray-50 px-2 py-1 rounded-lg">需完成購買才可評論</span>
            )}
          </div>

          {/* 寫評論表單 */}
          {showForm && !myReview && (
            <div className="bg-lime-50 border border-lime-200 rounded-2xl p-4 mb-4 space-y-3">
              <div>
                <div className="text-xs text-gray-600 mb-1.5 font-bold">您的評分</div>
                <div className="flex gap-2">
                  {[1,2,3,4,5].map(s => (
                    <button key={s} onClick={() => setRating(s)}
                      className={`text-3xl leading-none transition-transform active:scale-90 ${s<=rating?'text-yellow-400':'text-gray-200'}`}>★</button>
                  ))}
                </div>
              </div>
              <textarea value={comment} onChange={e => setComment(e.target.value)}
                placeholder="分享您的使用心得（選填）..."
                className="w-full p-3 border border-gray-200 rounded-xl text-sm bg-white min-h-[80px] resize-none" />
              <button onClick={handleSubmitReview} disabled={!rating || submitting}
                className="w-full py-2.5 bg-lime-600 text-white rounded-xl font-bold text-sm disabled:opacity-40 active:scale-95 transition-transform">
                {submitting ? '送出中...' : '送出評論'}
              </button>
            </div>
          )}

          {/* 我的評論（已評價提示） */}
          {myReview && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3">
              <div className="flex items-center gap-2 mb-1">
                <StarDisplay val={myReview.rating} />
                <span className="text-xs text-gray-500">{myReview.submittedAt}</span>
                <span className="text-xs font-bold text-green-600 ml-auto">✅ 您已評論</span>
              </div>
              {myReview.comment && <p className="text-sm text-gray-600">{myReview.comment}</p>}
            </div>
          )}

          {/* 評論列表 */}
          {loading ? (
            <div className="text-center py-4 text-gray-400 text-sm">載入評論中...</div>
          ) : reviews.length === 0 ? (
            <div className="text-center py-6 text-gray-400">
              <div className="text-3xl mb-1">💬</div>
              <div className="text-sm">還沒有評論，成為第一個評論者！</div>
            </div>
          ) : (
            <div className="space-y-3">
              {reviews.slice(0, 10).map((rv, i) => (
                <div key={i} className="bg-gray-50 rounded-2xl p-3 border border-gray-100">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full bg-lime-200 flex items-center justify-center text-lime-700 font-bold text-xs">
                        {rv.userName ? rv.userName[0] : '?'}
                      </div>
                      <span className="text-xs font-bold text-gray-700">{maskName(rv.userName)}</span>
                    </div>
                    <div className="flex items-center gap-1">
                      <StarDisplay val={rv.rating} size="text-sm" />
                      <span className="text-xs text-gray-400 ml-1">{rv.submittedAt}</span>
                    </div>
                  </div>
                  {rv.comment && <p className="text-sm text-gray-600 mt-1 leading-relaxed pl-9">{rv.comment}</p>}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // 頁面：商品詳情
    // =====================================================
    const ProductDetail = () => {
      const { id } = useParams();
      const navigate = useNavigate();
      const { addToCart, cart, allProducts, user, settings } = useAppContext();
      const { showAlert } = useDialog();
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedSpecs, setSelectedSpecs] = useState({}); // { 顏色:'紅', 尺寸:'S' }
      const [addedAnim, setAddedAnim] = useState(false);

      // ── 圖片輪播 hooks（必須在所有 early return 之前）──
      const [imgIdx, setImgIdx] = useState(0);
      const [lightbox, setLightbox] = useState(false);
      const touchStartX = React.useRef(null);

      // 購物車總數
      const cartCount = cart.reduce((a, c) => a + c.quantity, 0);

      // 解析多規格資料
      const parseVariantGroups = (p) => {
        if (!p) return [];
        if (p.variantGroupsJson) { try { return JSON.parse(p.variantGroupsJson); } catch(e) {} }
        if (p.variants && p.variants.length) return [{ name: p.variantType || '規格', options: p.variants }];
        return [];
      };
      const parseVariantStocks = (p) => {
        if (!p) return {};
        if (p.variantStocksJson) { try { return JSON.parse(p.variantStocksJson); } catch(e) {} }
        if (p.variants && p.variants.length) {
          const parts = String(p.stock||'').split(',');
          const m = {};
          p.variants.forEach((v,i) => { m[v] = Number(parts[i])||0; });
          return m;
        }
        return {};
      };

      useEffect(() => {
        const tryFromCache = () => {
          if (allProducts && allProducts.length > 0) {
            const found = allProducts.find(x => String(x.id) === String(id));
            if (found) { setProduct(found); setSelectedSpecs({}); setLoading(false); return true; }
          }
          return false;
        };
        if (tryFromCache()) return;
        setLoading(true);
        api.fetchProducts().then(p => {
          if (!p) { setError('無法載入商品資料'); setLoading(false); return; }
          const found = p.find(x => String(x.id) === String(id));
          if (found) { setProduct(found); setSelectedSpecs({}); }
          else setError('找不到此商品');
          setLoading(false);
        }).catch(() => { setError('發生錯誤'); setLoading(false); });
      }, [id, allProducts]);

      // ── 自動輪播 useEffect（在 early return 之前）──
      useEffect(() => {
        const imgs = !product ? [] : (Array.isArray(product.images) ? product.images.filter(Boolean) : (product.images||'').split(',').map(s=>s.trim()).filter(Boolean));
        const count = imgs.length;
        if (count <= 1) return;
        const sec = Number(settings?.carouselSeconds) || 4;
        const t = setInterval(() => setImgIdx(i => (i+1) % count), sec * 1000);
        return () => clearInterval(t);
      }, [product, settings]);

      // 顯示總庫存
      const getTotalStock = (product) => {
        if (!product) return 0;
        const vg = parseVariantGroups(product);
        if (vg.length) {
          const vs = parseVariantStocks(product);
          return Object.values(vs).reduce((a,b) => a + Number(b||0), 0);
        }
        return Number(product.stock) || 0;
      };

      const vGroups = product ? parseVariantGroups(product) : [];
      const vStocks = product ? parseVariantStocks(product) : {};
      const hasVariants = vGroups.length > 0;

      // 目前選擇是否完整
      const comboComplete = vGroups.every(g => selectedSpecs[g.name]);
      // 目前組合 key 和庫存
      const comboKey = vGroups.map(g => selectedSpecs[g.name]||'').join('|');
      const comboStock = comboComplete ? (Number(vStocks[comboKey]) || 0) : null;
      // 購物車顯示標籤
      const comboLabel = comboComplete ? vGroups.map(g => selectedSpecs[g.name]).join(' / ') : null;

      const handleAddToCart = () => {
        if (hasVariants && !comboComplete) { showAlert('請選擇所有規格'); return; }
        if (hasVariants && comboStock <= 0) { showAlert('此規格已售完'); return; }
        if (!hasVariants && getTotalStock(product) <= 0) { showAlert('商品已售完'); return; }
        addToCart(product, 1, comboLabel || null);
        setAddedAnim(true);
        setTimeout(() => setAddedAnim(false), 600);
        showAlert('✅ 已加入購物車！');
      };

      const getVideoEmbed = (url) => {
        if (!url) return null;
        let embedUrl = null;
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          const vid = (url.split('v=')[1] || url.split('/').pop()).split('&')[0].split('?')[0];
          embedUrl = `https://www.youtube.com/embed/${vid}`;
        } else if (url.includes('facebook.com')) {
          embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0`;
        }
        if (embedUrl) return <div className="aspect-video w-full mt-4 rounded-xl overflow-hidden shadow-sm"><iframe src={embedUrl} className="w-full h-full" frameBorder="0" allowFullScreen></iframe></div>;
        return <div className="mt-4 p-4 bg-gray-100 rounded-xl text-center"><a href={url} target="_blank" className="text-blue-600 underline">點此觀看影片</a></div>;
      };

      if (loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-white">
          <div className="w-10 h-10 border-4 border-lime-200 border-t-lime-500 rounded-full animate-spin mb-3"></div>
          <div className="text-sm text-gray-400">商品載入中...</div>
        </div>
      );
      if (error || !product) return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4">
          <p className="text-red-500 mb-4">{error || '商品不存在'}</p>
          <button onClick={() => navigate('/')} className="bg-lime-600 text-white px-6 py-2 rounded-full font-bold">回首頁</button>
        </div>
      );

      const totalStock = getTotalStock(product);
      // hasVariants 已在上方宣告（early return 之前）

      // ── 圖片輪播計算（hooks 已在上方宣告）──
      const images = !product ? [] : (Array.isArray(product.images) ? product.images.filter(Boolean) : (product.images||'').split(',').map(s=>s.trim()).filter(Boolean));
      const imgCount = images.length || 1;
      const carouselSec = Number(settings?.carouselSeconds) || 4;
      const goPrev = () => setImgIdx(i => (i - 1 + imgCount) % imgCount);
      const goNext = () => setImgIdx(i => (i + 1) % imgCount);

      return (
        <div className="min-h-screen bg-white pb-28">
          {/* ── 燈箱放大 ── */}
          {lightbox && (
            <div className="fixed inset-0 z-[9999] bg-black/95 flex items-center justify-center" onClick={() => setLightbox(false)}>
              <button className="absolute top-5 right-5 text-white text-3xl font-bold z-10 bg-black/40 w-10 h-10 rounded-full flex items-center justify-center">×</button>
              {imgCount > 1 && <button onClick={e=>{e.stopPropagation();goPrev();}} className="absolute left-3 top-1/2 -translate-y-1/2 bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl z-10">‹</button>}
              <img src={images[imgIdx]||''} className="max-w-full max-h-full object-contain" referrerPolicy="no-referrer" onClick={e=>e.stopPropagation()} />
              {imgCount > 1 && <button onClick={e=>{e.stopPropagation();goNext();}} className="absolute right-3 top-1/2 -translate-y-1/2 bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl z-10">›</button>}
              {imgCount > 1 && <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-1.5">{images.map((_,i)=><span key={i} className={`w-2 h-2 rounded-full transition-all ${i===imgIdx?'bg-white scale-125':'bg-white/40'}`}/>)}</div>}
            </div>
          )}
          {/* ── 商品圖片輪播 ── */}
          <div className="relative bg-gray-100 overflow-hidden select-none"
            onTouchStart={e => { touchStartX.current = e.touches[0].clientX; }}
            onTouchEnd={e => {
              if (touchStartX.current === null) return;
              const dx = e.changedTouches[0].clientX - touchStartX.current;
              if (Math.abs(dx) > 40) { dx < 0 ? goNext() : goPrev(); }
              touchStartX.current = null;
            }}>
            <div className="relative aspect-square w-full cursor-zoom-in" onClick={() => setLightbox(true)}>
              {images.length > 0
                ? <img src={images[imgIdx]} alt={product.name} className="w-full h-full object-cover transition-opacity duration-500" referrerPolicy="no-referrer" />
                : <div className="w-full h-full flex items-center justify-center text-gray-400">無圖片</div>
              }
              {/* 點擊放大提示 */}
              <div className="absolute bottom-3 right-3 bg-black/40 text-white text-[10px] px-2 py-1 rounded-full backdrop-blur-sm">🔍 點擊放大</div>
            </div>
            {/* 左右切換箭頭 */}
            {imgCount > 1 && <>
              <button onClick={e=>{e.stopPropagation();goPrev();}} className="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 text-gray-800 w-9 h-9 rounded-full flex items-center justify-center shadow-md text-lg font-bold backdrop-blur-sm active:scale-90 transition-transform">‹</button>
              <button onClick={e=>{e.stopPropagation();goNext();}} className="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 text-gray-800 w-9 h-9 rounded-full flex items-center justify-center shadow-md text-lg font-bold backdrop-blur-sm active:scale-90 transition-transform">›</button>
            </>}
            {/* 圓點指示器 */}
            {imgCount > 1 && (
              <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
                {images.map((_,i) => <span key={i} className={`rounded-full transition-all duration-300 ${i===imgIdx ? 'bg-white w-4 h-2' : 'bg-white/50 w-2 h-2'}`} />)}
              </div>
            )}
            {/* 縮圖列（超過1張顯示） */}
            {imgCount > 1 && (
              <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 pt-6 pb-2 px-3">
                <div className="flex gap-1.5 overflow-x-auto no-scrollbar justify-center">
                  {images.map((url,i) => (
                    <button key={i} onClick={e=>{e.stopPropagation();setImgIdx(i);}}
                      className={`flex-shrink-0 w-10 h-10 rounded-md overflow-hidden border-2 transition-all ${i===imgIdx?'border-white scale-110':'border-white/30'}`}>
                      <img src={url} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                    </button>
                  ))}
                </div>
              </div>
            )}
            {/* 返回 & 購物車 */}
            <div className="absolute top-4 left-4 right-4 flex justify-between items-center">
              <button onClick={() => navigate(-1)} className="bg-white/90 p-2.5 rounded-full shadow-lg backdrop-blur-sm">
                <Icons.ArrowLeft className="w-5 h-5 text-gray-800" />
              </button>
              <button onClick={() => navigate('/cart')} className="bg-white/90 p-2.5 rounded-full shadow-lg backdrop-blur-sm relative">
                <Icons.ShoppingCart className="w-5 h-5 text-gray-800" />
                {cartCount > 0 && (
                  <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">
                    {cartCount > 9 ? '9+' : cartCount}
                  </span>
                )}
              </button>
            </div>
            {product.originalPrice > product.price && (
              <div className="absolute bottom-4 right-4 bg-red-500 text-white text-xs font-black px-2.5 py-1 rounded-xl shadow-lg tracking-wide">SALE</div>
            )}
          </div>

          {/* 商品資訊卡 */}
          <div className="p-5 -mt-6 bg-white rounded-t-3xl relative z-10 shadow-[0_-4px_12px_rgba(0,0,0,0.06)]">
            <div className="flex justify-between items-start mb-1">
              <h1 className="text-xl font-bold text-gray-800 flex-1 pr-2">{product.name}</h1>
              <span className={`px-2.5 py-1 rounded-full text-xs font-bold flex-shrink-0 ${totalStock > 0 ? 'bg-lime-100 text-lime-700' : 'bg-red-100 text-red-600'}`}>
                庫存: {totalStock}
              </span>
            </div>
            <div className="flex items-baseline gap-2 mb-5">
              <span className="text-3xl font-bold text-lime-600">NT${product.price}</span>
              {product.originalPrice > 0 && product.originalPrice > product.price && (
                <span className="text-gray-400 line-through text-sm">NT${product.originalPrice}</span>
              )}
            </div>

            {/* 規格選擇（支援多組規格） */}
            {hasVariants && (
              <div className="mb-5 space-y-4">
                {vGroups.map(grp => {
                  const isSingleGroup = vGroups.length === 1;
                  return (
                    <div key={grp.name}>
                      <h3 className="font-bold text-gray-800 mb-2 text-sm">{grp.name}</h3>
                      <div className="flex flex-wrap gap-2">
                        {grp.options.filter(o=>o).map(opt => {
                          const isSelected = selectedSpecs[grp.name] === opt;
                          // 計算此選項是否售完
                          let outOfStock = false;
                          let optStock = null;
                          if (isSingleGroup) {
                            optStock = Number(vStocks[opt]) || 0;
                            outOfStock = optStock <= 0;
                          } else {
                            // 多規格：假設已選其他維度的情況下，看這個選項的所有組合是否全部售完
                            const testCombo = {...selectedSpecs, [grp.name]: opt};
                            const otherGroups = vGroups.filter(g => g.name !== grp.name);
                            if (otherGroups.every(g => testCombo[g.name])) {
                              // 其他維度都已選：直接查此組合庫存
                              const key = vGroups.map(g => testCombo[g.name] || '').join('|');
                              const s = Number(vStocks[key]) || 0;
                              outOfStock = s <= 0;
                              optStock = s;
                            } else {
                              // 其他維度未選：掃描此維度選項涉及的所有組合
                              const allCombosForOpt = Object.keys(vStocks).filter(k => {
                                const parts = k.split('|');
                                const myIdx = vGroups.findIndex(g => g.name === grp.name);
                                return myIdx >= 0 && parts[myIdx] === opt;
                              });
                              outOfStock = allCombosForOpt.length > 0 && allCombosForOpt.every(k => (Number(vStocks[k]) || 0) <= 0);
                            }
                          }
                          return (
                            <button key={opt}
                              disabled={outOfStock}
                              onClick={() => !outOfStock && setSelectedSpecs(s => ({...s, [grp.name]: opt}))}
                              className={`px-4 py-2 rounded-xl border text-sm font-medium transition-all relative ${
                                outOfStock
                                  ? 'border-gray-100 bg-gray-50 text-gray-300 cursor-not-allowed opacity-50'
                                  : isSelected
                                  ? 'border-lime-500 bg-lime-50 text-lime-700 shadow-sm'
                                  : 'border-gray-200 text-gray-600 active:scale-95'
                              }`}>
                              {outOfStock && <span className="absolute inset-0 flex items-center justify-center pointer-events-none"><span className="w-full h-px bg-gray-300 absolute" style={{transform:'rotate(135deg)'}}></span></span>}
                              {opt}
                              {isSingleGroup && !outOfStock && optStock !== null && <span className={`ml-1.5 text-xs ${isSelected?'text-lime-500':'text-gray-400'}`}>({optStock})</span>}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {/* 組合庫存提示 */}
                {comboComplete && (
                  <div className={`text-xs font-bold px-3 py-1.5 rounded-xl inline-flex items-center gap-1.5 ${comboStock > 0 ? 'bg-lime-50 text-lime-600 border border-lime-200' : 'bg-red-50 text-red-500 border border-red-100'}`}>
                    <span>已選：{comboLabel}</span>
                    <span>·</span>
                    <span>{comboStock > 0 ? `剩餘 ${comboStock} 件` : '此組合已售完'}</span>
                  </div>
                )}
              </div>
            )}

            {/* 商品介紹 */}
            <div className="mb-6">
              <h3 className="font-bold text-gray-800 mb-2 text-sm">商品介紹</h3>
              {product.description && product.description.includes('<') ? (
                <div className="text-sm text-gray-600 leading-relaxed product-desc"
                  dangerouslySetInnerHTML={{ __html: product.description }} />
              ) : (
                <p className="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">{product.description}</p>
              )}
              {getVideoEmbed(product.videoUrl)}
            </div>

            {/* 商品評論區（動態載入） */}
            <ProductReviews productId={product.id} productName={product.name} user={user} />
          </div>

          {/* 底部操作欄 */}
          <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 flex items-center gap-3 z-50 shadow-[0_-2px_8px_rgba(0,0,0,0.06)]">
            {/* 首頁按鈕 */}
            <button onClick={() => navigate('/')} className="p-3 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-50 flex-shrink-0">
              <Icons.Home className="w-6 h-6" />
            </button>
            {/* 購物車角標（加入購物車左側） */}
            <button onClick={() => navigate('/cart')} className="p-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 flex-shrink-0 relative">
              <Icons.ShoppingCart className="w-6 h-6" />
              {cartCount > 0 && (
                <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  {cartCount > 9 ? '9+' : cartCount}
                </span>
              )}
            </button>
            {/* 加入購物車按鈕 */}
            <button
              onClick={handleAddToCart}
              disabled={totalStock <= 0}
              className={`flex-1 py-3.5 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 transition-all ${
                totalStock <= 0
                  ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                  : addedAnim
                  ? 'bg-green-500 text-white scale-95 shadow-green-200'
                  : 'bg-lime-600 text-white active:scale-95 shadow-lime-200'
              }`}
            >
              <Icons.ShoppingCart className="w-5 h-5" />
              {totalStock <= 0 ? '已售完' : addedAnim ? '已加入！' : '加入購物車'}
            </button>
          </div>
        </div>
      );
    };

    // =====================================================
    // 廣播子元件 — 使用後端 LINE Messaging API Push
    // =====================================================
    const BroadcastTab = ({ showAlert, showConfirm, adminId }) => {
      const [bcMsg, setBcMsg] = useState('');
      const [mode, setMode] = useState('all'); // 'all' | 'single'
      const [toUserId, setToUserId] = useState('');
      const [sending, setSending] = useState(false);
      const [result, setResult] = useState(null); // {ok, msg}
      const [debugResult, setDebugResult] = useState(null);
      const [debugLoading, setDebugLoading] = useState(false);

      const TEMPLATES = [
        '🎉 限時特賣！本週精選商品全面特惠，數量有限，歡迎選購！',
        '📦 您好，您的訂單已完成出貨，預計 1-3 個工作日送達，請耐心等候。',
        '🎁 本月壽星請至會員中心領取專屬生日禮優惠券！',
        '🛍️ 新品上架！快來逛逛最新商品，售完為止！',
        '⭐ 感謝您的購買，歡迎至「我的評價」留下心得，期待您再次光臨！',
      ];

      const runDebug = async () => {
        setDebugLoading(true); setDebugResult(null);
        try {
          const r = await api.post('debugLinePush', { adminId, toUserId: adminId });
          setDebugResult(r);
        } catch(e) { setDebugResult({ ok: false, step: 'network', reason: e.message }); }
        setDebugLoading(false);
      };

      const send = async () => {
        if (!bcMsg.trim()) { showAlert('請輸入推播訊息'); return; }
        if (mode === 'single' && !toUserId.trim()) { showAlert('請填入目標用戶的 LINE ID'); return; }
        const preview = bcMsg.substring(0, 50) + (bcMsg.length > 50 ? '...' : '');
        const confirmTxt = mode === 'all'
          ? `確定廣播給「所有會員」？\n\n${preview}`
          : `確定推播給用戶：\n${toUserId}\n\n${preview}`;
        if (!await showConfirm(confirmTxt, mode === 'all' ? '確認廣播' : '確認推播')) return;
        setSending(true); setResult(null);
        try {
          const action = mode === 'all' ? 'broadcastToAll' : 'broadcastToUser';
          const payload = mode === 'all'
            ? { adminId, message: bcMsg }
            : { adminId, toUserId: toUserId.trim(), message: bcMsg };
          const r = await api.post(action, payload);
          if (r?.success) {
            const detail = mode === 'all' ? `成功 ${r.sent} 人，失敗 ${r.failed} 人` : '已送達';
            setResult({ ok: true, msg: `✅ 推播成功！${detail}` });
            setBcMsg('');
          } else {
            setResult({ ok: false, msg: '❌ ' + (r?.error || '推播失敗') });
          }
        } catch(e) {
          setResult({ ok: false, msg: '❌ 網路錯誤：' + e.message });
        }
        setSending(false);
      };

      return (
        <div className="space-y-4">
          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 text-sm text-blue-800">
            <div className="font-bold mb-1">📡 LINE Messaging API 直接推播</div>
            <div className="text-xs leading-relaxed">不需要用戶在 LINE 中開啟，後端透過 Channel Token 直接送達。可推播給單一用戶或廣播給所有已註冊會員。</div>
          </div>

          {/* 🔍 除錯區塊已移除 */}

          {/* 模式切換 */}
          <div className="flex rounded-xl overflow-hidden border border-gray-200 bg-gray-50">
            {[{id:'all',label:'📢 廣播所有用戶'},{id:'single',label:'📤 推播單一用戶'}].map(m=>(
              <button key={m.id} onClick={()=>{setMode(m.id);setResult(null);}}
                className={`flex-1 py-2.5 text-sm font-bold transition-colors ${mode===m.id?'bg-white text-blue-700 shadow-sm':'text-gray-500'}`}>
                {m.label}
              </button>
            ))}
          </div>

          {mode === 'single' && (
            <div>
              <label className="text-xs text-gray-500 block mb-1">目標 LINE ID（U 開頭）</label>
              <input value={toUserId} onChange={e=>setToUserId(e.target.value)}
                placeholder="Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                className="w-full p-2.5 border border-gray-200 rounded-xl text-xs bg-gray-50 font-mono" />
            </div>
          )}

          {mode === 'all' && (
            <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 text-xs text-orange-700">
              ⚠️ 廣播將推播給所有已完成手機驗證的會員，請確認訊息內容正確後再送出。
            </div>
          )}

          {/* 快速範本 */}
          <div>
            <div className="text-xs text-gray-500 mb-2 font-bold">快速範本</div>
            <div className="space-y-1.5">
              {TEMPLATES.map((t, i) => (
                <button key={i} onClick={()=>{setBcMsg(t);setResult(null);}}
                  className="w-full text-left p-2.5 bg-gray-50 rounded-xl border border-gray-100 text-xs text-gray-600 hover:bg-blue-50 hover:border-blue-200 transition-colors leading-relaxed">
                  {t}
                </button>
              ))}
            </div>
          </div>

          {/* 自訂訊息 */}
          <div>
            <div className="text-xs text-gray-500 mb-1 font-bold">推播內容</div>
            <textarea value={bcMsg} onChange={e=>{setBcMsg(e.target.value);setResult(null);}}
              placeholder="輸入推播訊息內容..."
              className="w-full p-3 border border-gray-200 rounded-xl text-sm bg-gray-50 min-h-[120px] resize-none" />
            <div className="text-right text-xs text-gray-400 mt-1">{bcMsg.length} 字</div>
          </div>

          {result && (
            <div className={`p-3 rounded-xl text-sm font-bold text-center ${result.ok ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
              {result.msg}
            </div>
          )}

          <button onClick={send} disabled={sending || !bcMsg.trim() || (mode==='single' && !toUserId.trim())}
            className="w-full py-3.5 rounded-xl font-bold text-sm bg-blue-600 text-white shadow-lg shadow-blue-200 active:scale-95 transition-all disabled:opacity-40">
            {sending ? '推播中...' : mode === 'all' ? '📢 廣播給所有用戶' : '📤 推播給指定用戶'}
          </button>
        </div>
      );
    };

    // =====================================================
    // 頁面：管理員後台 (Bug Fixed)
    // =====================================================
    const AdminDashboard = () => {
      const { user, allCategories, setAllCategories } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [orders, setOrders] = useState([]);
      const [redemptions, setRedemptions] = useState([]);
      const [users, setUsers] = useState([]);
      const [products, setProducts] = useState([]);
      const [stats, setStats] = useState({ dailyTotal:0, monthlyTotal:0, grandTotal:0 });
      const [adminSettings, setAdminSettings] = useState({});
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('dashboard');
      const [editProduct, setEditProduct] = useState(null);
      const [uploadingImg, setUploadingImg] = useState(false);
      const [showAddCategoryModal, setShowAddCategoryModal] = useState(false);
      const [newCategory, setNewCategory] = useState({ id:'', name:'', iconUrl:'', isBrand:false });
      const [uploadingCatIcon, setUploadingCatIcon] = useState(false);
      // campaigns
      const [campaigns, setCampaigns] = useState([]);
      const [editCampaign, setEditCampaign] = useState(null);
      // inventory
      const [inventory, setInventory] = useState([]);
      const [inventoryDirty, setInventoryDirty] = useState(false);
      // notify modal
      const [notifyModal, setNotifyModal] = useState(null);
      const [copiedNotify, setCopiedNotify] = useState(false);
      // report & adjust
      const [salesReport, setSalesReport] = useState(null);
      const [adjustTarget, setAdjustTarget] = useState(null);
      // 試算表密碼
      const [sheetPwdUnlocked, setSheetPwdUnlocked] = useState(false);
      const [sheetPwdInput, setSheetPwdInput] = useState('');
      const [sheetPwdError, setSheetPwdError] = useState(false);
      // 分類拖曳排序
      const [catDragIdx, setCatDragIdx] = useState(null);
      const [localCats, setLocalCats] = useState([]);

      useEffect(() => {
        if (!user) return;
        if (!ADMIN_IDS.includes(user.lineId)) { navigate('/'); return; }
        fetchTabData('dashboard');
      }, [user]);

      useEffect(() => {
        if (user && ADMIN_IDS.includes(user.lineId)) fetchTabData(tab);
        // 切換到受保護的分頁時需重新驗證
        const protectedTabs = ['orders','users','settings','report'];
        if (!protectedTabs.includes(tab)) setSheetPwdUnlocked(false);
      }, [tab]);

      // 同步 localCats 給拖曳使用
      useEffect(() => { setLocalCats([...allCategories]); }, [allCategories]);

      const fetchTabData = async (currentTab) => {
        setLoading(true);
        try {
          if (currentTab==='dashboard') {
            const r = await api.get('getAdminStats', { adminId: user.lineId });
            if (r && !r.error) setStats(r);
          } else if (currentTab==='orders') {
            const r = await api.get('getOrders', { adminId: user.lineId });
            if (r && !r.error) setOrders(Array.isArray(r) ? r : []);
          } else if (currentTab==='redemptions') {
            const r = await api.get('getRedemptions', { adminId: user.lineId });
            if (r && !r.error) setRedemptions(Array.isArray(r) ? r : []);
          } else if (currentTab==='users') {
            const r = await api.get('getUsers', { adminId: user.lineId });
            if (r && !r.error) setUsers(Array.isArray(r) ? r : []);
          } else if (currentTab==='products') {
            const r = await api.fetchProducts();
            if (r) setProducts(r);
          } else if (currentTab==='settings') {
            const r = await api.fetchSettings();
            if (r && !r.error) setAdminSettings(r);
          } else if (currentTab==='campaigns') {
            const r = await api.get('getCampaignsAdmin', { adminId: user.lineId });
            if (Array.isArray(r)) setCampaigns(r);
            else setCampaigns([]);
          } else if (currentTab==='report') {
            const r = await api.get('getSalesReport', { adminId: user.lineId });
            if (r && !r.error) setSalesReport(r);
          } else if (currentTab==='broadcast') {
            // broadcast 不需要預載資料
          } else if (currentTab==='categories') {
            // categories loaded from allCategories context
          } else if (currentTab==='notices') {
            // notices - static tab, no preload needed
          } else if (currentTab==='inventory') {
            const r = await api.fetchProducts();
            if (r) {
              // 依庫存由低到高排序，計算總庫存
              const inv = r.map(p => {
                const stockStr = String(p.stock || '0');
                const totalStock = stockStr.split(',').map(s => Number(s.trim())||0).reduce((a,b)=>a+b,0);
                return { id:p.id, name:p.name, stock:stockStr, totalStock, variants:p.variants||[], images:p.images };
              }).sort((a,b) => a.totalStock - b.totalStock);
              setInventory(inv);
              setInventoryDirty(false);
            }
          }
        } catch(e) { console.error(e); showAlert('資料載入失敗'); }
        finally { setLoading(false); }
      };

      // 通知推播 Modal
      const NotifyModal = ({ msg, toUserId, onClose }) => {
        const [copied, setCopied] = useState(false);
        const [sending, setSending] = useState(false);
        const [sent, setSent] = useState(false);
        const [apiErr, setApiErr] = useState('');
        const copyMsg = () => {
          try { navigator.clipboard.writeText(msg); } catch(e) { const el=document.createElement('textarea'); el.value=msg; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
          setCopied(true); setTimeout(()=>setCopied(false), 2500);
        };
        const sendViaPush = async () => {
          if (!toUserId) { showAlert('無法取得用戶 LINE ID，請改用複製後手動發送'); return; }
          setSending(true); setApiErr('');
          try {
            const r = await api.post('sendLineNotify', { adminId: user.lineId, toUserId, message: msg });
            if (r?.success) { setSent(true); setTimeout(onClose, 1500); }
            else { setApiErr(r?.error || '推播失敗'); }
          } catch(e) { setApiErr('網路錯誤：' + e.message); }
          setSending(false);
        };
        return (
          <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-scale-in">
              <div className="bg-[#06C755] p-5 text-white text-center">
                <div className="text-3xl mb-1">📲</div>
                <h3 className="font-black text-lg">LINE 通知推播</h3>
                <p className="text-green-100 text-xs mt-1">透過 LINE Messaging API 直接推播至顧客</p>
              </div>
              <div className="p-4">
                <div className="bg-gray-50 rounded-2xl p-3 text-xs text-gray-700 whitespace-pre-wrap font-mono mb-4 max-h-48 overflow-y-auto border border-gray-100 leading-relaxed">{msg}</div>
                {apiErr && <div className="mb-3 p-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-700">{apiErr}</div>}
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <button onClick={sendViaPush} disabled={sending || sent}
                    className={`py-3.5 rounded-2xl font-bold text-sm transition-all active:scale-95 ${sent?'bg-green-500 text-white':sending?'bg-gray-200 text-gray-400':'bg-[#06C755] text-white shadow-lg shadow-green-200'}`}>
                    {sent ? '✅ 已推播' : sending ? '⏳ 推播中...' : '📲 LINE 推播'}
                  </button>
                  <button onClick={copyMsg}
                    className={`py-3.5 rounded-2xl border-2 font-bold text-sm transition-all active:scale-95 ${copied?'border-lime-400 bg-lime-50 text-lime-700':'border-gray-200 text-gray-600'}`}>
                    {copied ? '✅ 已複製' : '📋 複製訊息'}
                  </button>
                </div>
                <button onClick={onClose} className="w-full py-2.5 text-gray-400 text-sm border-t border-gray-100">略過，不發送</button>
              </div>
            </div>
          </div>
        );
      };

      const updateStatus = async (orderId, newStatus) => {
        const order = orders.find(o => o.orderId === orderId);
        if (!order) return;
        const method = order.content?.deliveryMethod || order.deliveryMethod;
        const pts = order.content?.pointsEarned || 0;

        if (newStatus === 'Cancelled') {
          if (!await showConfirm(`確定取消訂單 ${orderId}？`)) return;
        } else if (newStatus === 'Shipped') {
          if (!await showConfirm(`確認將訂單 ${orderId} 設為出貨中？`, '確認出貨')) return;
        } else if (newStatus === 'Completed') {
          if (!await showConfirm(`確定完成訂單 ${orderId}？\n${pts>0?`將發放 ${pts} 點給顧客`:''}`, '完成訂單')) return;
        }

        // CVS 出貨時詢問寄件編號
        if (newStatus === 'Shipped' && method === 'cvs') {
          const trackingNum = window.prompt(`請輸入超商寄件編號（選填，可稍後補填）：`);
          if (trackingNum && trackingNum.trim()) {
            try {
              await api.post('updateOrderTracking', { adminId:user.lineId, orderId, trackingNumber: trackingNum.trim() });
              setOrders(prev => prev.map(o => o.orderId===orderId
                ? {...o, content:{...o.content, trackingNumber: trackingNum.trim()}}
                : o
              ));
            } catch(e) {}
          }
        }

        try {
          const r = await api.post('updateOrderStatus', { adminId:user.lineId, orderId, status:newStatus, notify:false });
          if (r?.success) {
            setOrders(prev => prev.map(o => o.orderId===orderId ? {...o, status:newStatus} : o));
            let notifyMsg = '';
            if (newStatus === 'Shipped') {
              notifyMsg = method === 'pickup'
                ? `🏪 取貨通知\n\n您的訂單 ${orderId} 已備妥！\n\n請儘快到店完成取貨 😊`
                : method === 'cvs'
                ? `🏬 超商取貨通知\n\n您的訂單 ${orderId} 已出貨！\n\n請耐心等候超商簡訊通知 😊`
                : `🚚 出貨通知\n\n您的訂單 ${orderId} 已寄送！\n\n請耐心等候收件，謝謝 😊`;
            } else if (newStatus === 'Completed') {
              notifyMsg = `✅ 訂單完成通知\n\n訂單 ${orderId} 已完成！${pts > 0 ? `\n\n恭喜獲得 ${pts} 點數！` : ''}\n\n感謝您的購買 🎉`;
            }
            if (notifyMsg) {
              setNotifyModal({ msg: notifyMsg, toUserId: order.lineId || order.content?.user?.lineId, onClose: () => setNotifyModal(null) });
            } else {
              showAlert('更新成功');
            }
          } else showAlert('更新失敗：' + (r?.error||'請稍後再試'));
        } catch(e) { showAlert('更新失敗'); }
      };

      const updateRedemptionStatus = async (redemptionId, newStatus) => {
        const redemption = redemptions.find(r => r.redemptionId === redemptionId);
        if (!await showConfirm(`更新兌換狀態為「${newStatus==='Shipped'?'已出貨':'已完成'}」？`, '更新兌換狀態')) return;
        try {
          const r = await api.post('updateRedemptionStatus', { adminId:user.lineId, redemptionId, status:newStatus, notify:false });
          if (r?.success) {
            setRedemptions(prev => prev.map(red => red.redemptionId===redemptionId ? {...red,status:newStatus} : red));
            const itemName = redemption?.content?.itemName || '';
            const msg = newStatus === 'Shipped'
              ? `🚚 兌換出貨通知\n\n您的兌換商品「${itemName}」已出貨！\n請耐心等候收件 😊`
              : `✅ 兌換完成通知\n\n您的兌換商品「${itemName}」已完成！\n感謝您的使用 🎉`;
            setNotifyModal({ msg, toUserId: redemption.lineId || redemption.content?.lineId, onClose: () => setNotifyModal(null) });
          } else showAlert('更新失敗：' + (r?.error||'請稍後再試'));
        } catch(e) { showAlert('更新失敗'); }
      };

      const [savingProduct, setSavingProduct] = useState(false);

      const handleSaveProduct = async () => {
        if (!editProduct.name || !editProduct.price) { showAlert('商品名稱與價格為必填'); return; }
        if (savingProduct) return;
        setSavingProduct(true);
        try {
          let p = {...editProduct};
          const vg = (p.variantGroups||[]).filter(g=>g.name&&g.options.some(o=>o));
          if (vg.length) {
            // 笛卡爾積組合
            const combos = vg.reduce((acc,grp) => {
              const opts=grp.options.filter(o=>o);
              return acc.length ? acc.flatMap(prev=>opts.map(o=>[...prev,o])) : opts.map(o=>[o]);
            }, []);
            const stocks = p.variantStocks || {};
            p.variants = combos.map(c=>c.join('|'));
            p.stock = combos.map(c=>String(stocks[c.join('|')]||0)).join(',');
            p.variantType = vg.map(g=>g.name).join('×');
            p.variantGroupsJson = JSON.stringify(vg);
            p.variantStocksJson = JSON.stringify(stocks);
          } else {
            p.variantGroupsJson = '';
            p.variantStocksJson = '';
            p.variants = [];
            p.variantType = '';
          }
          const r = await api.post('updateProduct', { adminId:user.lineId, product:p });
          if (r?.success) { showAlert('✅ 商品已儲存'); setEditProduct(null); fetchTabData('products'); }
          else showAlert('儲存失敗：' + (r?.error||''));
        } catch(e) { showAlert('儲存失敗'); }
        finally { setSavingProduct(false); }
      };

      const handleDeleteProduct = async (productId) => {
        if (!await showConfirm('確定要刪除此商品？此動作無法復原。', '刪除商品')) return;
        try {
          const r = await api.post('deleteProduct', { adminId:user.lineId, productId });
          if (r?.success) { showAlert('商品已刪除'); fetchTabData('products'); }
          else showAlert('刪除失敗：' + (r?.error||''));
        } catch(e) { showAlert('刪除失敗'); }
      };

      const statusBadge = (s) => {
        const m = { Completed:'bg-green-100 text-green-700', Shipped:'bg-blue-100 text-blue-700', Cancelled:'bg-red-100 text-red-700', Pending:'bg-yellow-100 text-yellow-700' };
        const l = { Completed:'已完成', Shipped:'寄送中/待取貨', Cancelled:'已取消', Pending:'待處理' };
        return <span className={`px-2 py-1 rounded text-xs font-bold ${m[s]||'bg-gray-100 text-gray-600'}`}>{l[s]||s}</span>;
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-20">

          {/* 🔒 試算表密碼鎖定 — 保護敏感分頁 */}
          {!sheetPwdUnlocked && (tab==='orders'||tab==='users'||tab==='settings'||tab==='report'||tab==='users') && (
            <div className="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-md flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xs overflow-hidden">
                <div className="bg-gradient-to-br from-lime-500 to-emerald-600 p-6 text-center">
                  <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3 text-3xl">🔐</div>
                  <div className="text-white font-black text-lg">安全驗證</div>
                  <div className="text-lime-100 text-xs mt-1">此分頁含敏感資料，請輸入 4 位數字密碼</div>
                </div>
                <div className="p-6 space-y-4">
                  <div className="flex justify-center gap-3">
                    {[0,1,2,3].map(i => (
                      <div key={i} className={`w-12 h-12 rounded-xl border-2 flex items-center justify-center text-xl font-black transition-all ${sheetPwdInput.length > i ? 'border-lime-500 bg-lime-50 text-lime-700' : 'border-gray-200 bg-gray-50'}`}>
                        {sheetPwdInput.length > i ? '●' : ''}
                      </div>
                    ))}
                  </div>
                  {sheetPwdError && <div className="text-center text-red-500 text-xs font-bold animate-pulse">密碼錯誤，請再試一次</div>}
                  {/* 數字鍵盤 */}
                  <div className="grid grid-cols-3 gap-2">
                    {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i) => (
                      <button key={i} disabled={k===''} onClick={() => {
                        if (k === '⌫') {
                          setSheetPwdInput(p => p.slice(0,-1));
                          setSheetPwdError(false);
                        } else if (typeof k === 'number' && sheetPwdInput.length < 4) {
                          const next = sheetPwdInput + String(k);
                          setSheetPwdInput(next);
                          setSheetPwdError(false);
                          if (next.length === 4) {
                            const correct = String(adminSettings.sheetPassword || '0000');
                            if (next === correct) { setSheetPwdUnlocked(true); setSheetPwdInput(''); }
                            else { setSheetPwdError(true); setTimeout(() => setSheetPwdInput(''), 600); }
                          }
                        }
                      }}

    // =====================================================
    // 頁面：我的優惠券（全部）
