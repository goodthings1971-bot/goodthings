<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>美好的事 GOOD THINGS</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 核心 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- React Router -->
  <script src="https://unpkg.com/history@5/umd/history.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router@6.3.0/umd/react-router.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.production.min.js"></script>
  
  <!-- Babel (解析 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- LINE LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { -webkit-tap-highlight-color: transparent; }
    
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .animate-marquee {
      animation: marquee 20s linear infinite;
    }
  </style>
</head>
<body class="bg-yellow-50">
  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(200,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h3 class="font-bold text-xl mb-2">發生錯誤 (Error Log)</h3>
    <button onclick="document.getElementById('error-log').style.display='none'" style="border:1px solid white; padding:5px 10px; margin-bottom:10px;">關閉</button>
    <div id="error-content"></div>
  </div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>' + msg + '</strong><br><small>' + url + ':' + line + '</small><br><pre style="white-space:pre-wrap;">' + (error ? error.stack : '') + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
    window.onunhandledrejection = function(event) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>Unhandled Rejection</strong><br><pre style="white-space:pre-wrap;">' + event.reason + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
  </script>

  <div id="root">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fefce8;color:#f97316;font-weight:bold;font-family:sans-serif;">
      載入中... (Loading...)
    </div>
  </div>

  <script type="text/babel">
    console.log('App starting...');

    // 檢查依賴是否載入
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof ReactRouterDOM === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;">系統錯誤：核心元件未載入，請檢查網路連線。</div>';
      throw new Error('React 或 ReactRouterDOM 未正確載入');
    }

    const { useState, useEffect, createContext, useContext } = React;
    const { HashRouter, Routes, Route, Link, useNavigate, useLocation, useParams } = ReactRouterDOM;

    // --- 重要設定 ---
    // 請將此處替換為您 GAS 部署後的「網頁應用程式網址」 (以 /exec 結尾)
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxG9xUAxbLvWf6fP9solDNtHgHJ8BV3PpMZwYwhXcl7T7BYQ10cU1c3VLL3yFV6ZNvF/exec'; 
    const LIFF_ID = '2009248623-E3UOP9Mc';

    // --- API 服務 (Fetch) ---
    const api = {
      // GET 請求
      get: async (action, params = {}) => {
        if (!GAS_API_URL.includes('/exec')) {
          console.error('GAS_API_URL 設定錯誤');
          return null;
        }
        const query = new URLSearchParams({ action, ...params }).toString();
        try {
          const res = await fetch(`${GAS_API_URL}?${query}`);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error('API GET Error:', e);
          return null;
        }
      },
      // POST 請求
      post: async (action, data) => {
        if (!GAS_API_URL.includes('/exec')) return null;
        try {
          const res = await fetch(GAS_API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, ...data }),
            headers: { 'Content-Type': 'text/plain' }
          });
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error('API POST Error:', e);
          throw e;
        }
      },
      fetchProducts: () => api.get('getProducts'),
      fetchCategories: () => api.get('getCategories'),
      fetchSettings: () => api.get('getSettings'),
      getUserProfile: (lineId) => api.get('getUserProfile', { lineId }),
      submitOrder: (order) => api.post('createOrder', { order }),
      updateUserProfile: (profile) => api.post('updateUserProfile', { profile })
    };

    // --- Utils ---
    const generateOrderId = () => {
      const now = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      const datePart = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const randomPart = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
      return `${datePart}${randomPart}`;
    };

    // --- Icons ---
    const Icons={
      Home:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      ShoppingCart:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
      User:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Search:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      Menu:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      X:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>,
      Facebook:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>,
      ArrowLeft:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
      Plus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      Minus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/></svg>,
      Trash2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      Settings2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      LayoutGrid:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
      Grid2X2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/><path d="M12 3v18"/></svg>,
      Grid3X3:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>,
      Square:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
      Minimize:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>,
      ShoppingBag:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      Gift:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>,
      Truck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><path d="M14 17h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
      CreditCard:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
      ShieldCheck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
      HelpCircle:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>,
      Share2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
    };

    // --- Context ---
    const AppContext = createContext();

    const AppProvider = ({ children }) => {
      const [cart, setCart] = useState([]);
      const [user, setUser] = useState(null);
      const [settings, setSettings] = useState(null);
      const [redeemableProducts, setRedeemableProducts] = useState([]);
      const [liffError, setLiffError] = useState(null);

      useEffect(() => {
        // 初始化 LIFF
        const initLiff = async () => {
          if (typeof liff === 'undefined') {
            console.warn('LIFF SDK not loaded');
            setUser({ lineId: 'guest', name: '訪客 (No LIFF)', points: 0 });
            return;
          }
          try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
              const profile = await liff.getProfile();
              const lineId = profile.userId;
              
              // 取得後端會員資料
              const dbUser = await api.getUserProfile(lineId);
              setUser({
                lineId,
                name: profile.displayName,
                pictureUrl: profile.pictureUrl,
                points: 0,
                coupons: [],
                redemptions: [],
                wishlist: '',
                ...(dbUser || {}) // 覆蓋資料庫中的資料
              });
            } else {
              // 未登入，顯示訪客或引導登入
              // liff.login(); // 可選擇自動登入
              setUser({ lineId: 'guest', name: '訪客', points: 0 });
            }
          } catch (err) {
            console.error('LIFF Init Failed', err);
            setLiffError(err.toString());
            // 測試用 Fallback
            setUser({ lineId: 'test_user', name: '測試會員', points: 100 });
          }
        };
        initLiff();

        // 載入設定與商品
        try {
          const savedCart = localStorage.getItem('cart');
          if (savedCart) setCart(JSON.parse(savedCart));
        } catch (e) {
          console.error('LocalStorage Error', e);
        }

        api.fetchSettings().then(setSettings).catch(console.error);
        api.fetchProducts().then(p => {
          if (p) setRedeemableProducts(p.filter(x => (x.redeemPoints || 0) > 0));
        }).catch(console.error);
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem('cart', JSON.stringify(cart));
        } catch (e) {
          console.error('LocalStorage Save Error', e);
        }
      }, [cart]);

      const addToCart = (p, q, v, isRedeem=false) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === p.id && i.selectedVariant === v && i.isRedemption === isRedeem);
          if (exist) return prev.map(i => i === exist ? { ...i, quantity: i.quantity + q } : i);
          return [...prev, { ...p, quantity: q, selectedVariant: v, isRedemption: isRedeem }];
        });
      };
      
      const updateQuantity = (id, q, v, isRedeem) => {
        if (q <= 0) return setCart(prev => prev.filter(i => !(i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem)));
        setCart(prev => prev.map(i => (i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem) ? { ...i, quantity: q } : i));
      };

      const cartTotal = cart.reduce((t, i) => i.isRedemption ? t : t + i.price * i.quantity, 0);
      const pointsUsed = cart.reduce((t, i) => (i.isRedemption && i.redeemPoints) ? t + i.redeemPoints * i.quantity : t, 0);
      const isFreeShipping = settings?.freeShippingThreshold ? cartTotal >= settings.freeShippingThreshold : false;
      const shippingFee = isFreeShipping ? 0 : (settings?.shippingFee || 60);

      return (
        <AppContext.Provider value={{
          cart, addToCart, updateQuantity, clearCart: () => setCart([]), cartTotal,
          user, setUser, settings, shippingFee, isFreeShipping, pointsUsed,
          redeemableProducts, updateSettings: (s) => setSettings(p => ({...p, ...s})),
          updateUserProfile: (p) => {
            const newUser = { ...user, ...p };
            setUser(newUser);
            api.updateUserProfile(newUser);
          },
          redeemItem: (p) => {
            if((user.points||0) < p.redeemPoints) return false;
            const newUser = { 
              ...user, 
              points: user.points - p.redeemPoints, 
              redemptions: [...(user.redemptions||[]), { id: Date.now(), name: p.name, code: Math.random().toString(36).substr(2,8).toUpperCase() }] 
            };
            setUser(newUser);
            api.updateUserProfile(newUser);
            return true;
          }
        }}>
          {children}
        </AppContext.Provider>
      );
    };
    const useAppContext = () => useContext(AppContext);

    // --- Components ---
    const ProductCard = ({ product }) => (
      <Link to={`/product/${product.id}`} className="block bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-lg transition-all group relative">
        <div className="aspect-square w-full bg-gray-100 relative overflow-hidden">
          {product.images?.[0] ? <img src={product.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" referrerPolicy="no-referrer" /> : <div className="flex items-center justify-center h-full text-gray-400">無圖片</div>}
          {product.originalPrice > product.price && <div className="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full shadow-md">SALE</div>}
          <div className="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-sm">庫存: {product.stock}</div>
        </div>
        <div className="p-3">
          <h3 className="text-sm font-bold text-gray-800 line-clamp-2 min-h-[40px] group-hover:text-orange-600">{product.name}</h3>
          <div className="mt-2 flex items-baseline gap-2">
            <span className="text-lg font-black text-orange-600">NT${product.price}</span>
            {product.originalPrice && <span className="text-xs text-gray-400 line-through">NT${product.originalPrice}</span>}
          </div>
        </div>
      </Link>
    );

    const BottomNav = () => {
      const { cart } = useAppContext();
      const loc = useLocation();
      const [isOpen, setIsOpen] = useState(false);
      const count = cart.reduce((a, c) => a + c.quantity, 0);
      const items = [
        { path: '/', icon: Icons.Home, label: '首頁' },
        { path: '/instructions', icon: Icons.HelpCircle, label: '說明' },
        { path: '/cart', icon: Icons.ShoppingCart, label: '購物車', badge: count },
        { path: '/profile', icon: Icons.User, label: '會員' },
      ];
      return (
        <>
          {isOpen && <div className="fixed inset-0 bg-black/50 z-40" onClick={() => setIsOpen(false)} />}
          {isOpen && (
            <div className="fixed bottom-0 left-0 right-0 bg-white z-50 rounded-t-2xl p-6 pb-24 shadow-lg">
              <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><Icons.Menu size={20} className="text-orange-500" /> 更多功能</h3>
              <a href="https://www.facebook.com/Goodieshut" target="_blank" className="flex flex-col items-center gap-2 text-gray-600">
                <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600"><Icons.Facebook size={28} /></div>
                <span className="text-xs font-bold">粉絲專頁</span>
              </a>
            </div>
          )}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-2 py-1 flex justify-between items-center z-50 pb-safe shadow-lg">
            {items.map(i => (
              <Link key={i.path} to={i.path} className={`flex flex-col items-center justify-center w-full py-2 relative ${loc.pathname === i.path ? 'text-orange-500' : 'text-gray-400'}`}>
                <div className="relative">
                  <i.icon size={24} strokeWidth={loc.pathname === i.path ? 2.5 : 2} />
                  {i.badge > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">{i.badge}</span>}
                </div>
                <span className="text-[10px] font-bold mt-1">{i.label}</span>
              </Link>
            ))}
            <button onClick={() => setIsOpen(!isOpen)} className={`flex flex-col items-center justify-center w-full py-2 ${isOpen ? 'text-orange-500' : 'text-gray-400'}`}>
              <Icons.Menu size={24} strokeWidth={isOpen ? 2.5 : 2} />
              <span className="text-[10px] font-bold mt-1">選單</span>
            </button>
          </div>
        </>
      );
    };

    // --- Pages ---
    const Home = () => {
      const { settings } = useAppContext();
      const [products, setProducts] = useState([]);
      const [cats, setCats] = useState([]);
      const [activeCat, setActiveCat] = useState('all');
      
      useEffect(() => {
        api.fetchProducts().then(p => p && setProducts(p));
        api.fetchCategories().then(c => c && setCats(c));
      }, []);

      const filtered = activeCat === 'all' ? products : products.filter(p => p.categoryId === activeCat);
      const gridClass = (l) => l==='xl'?'grid-cols-1':l==='lg'?'grid-cols-2':l==='md'?'grid-cols-3':l==='sm'?'grid-cols-4':'grid-cols-2';

      return (
        <div className="min-h-screen bg-yellow-50 pb-20 font-sans">
          <div className="bg-white shadow-sm sticky top-0 z-40">
            {settings?.marqueeText && <div className="bg-orange-500 text-white text-xs py-1 overflow-hidden whitespace-nowrap"><div className="animate-marquee inline-block px-4">{settings.marqueeText}</div></div>}
            <div className="px-4 py-3 flex justify-between items-center">
              <h1 className="font-black text-lg text-gray-800">{settings?.storeName}</h1>
              <Link to="/cart" className="text-gray-600"><Icons.ShoppingCart size={24} /></Link>
            </div>
          </div>
          <div className="bg-white py-3 border-b border-gray-100 sticky top-[80px] z-30 overflow-x-auto no-scrollbar">
            <div className="flex px-4 gap-3 min-w-max">
              <button onClick={() => setActiveCat('all')} className={`px-4 py-1.5 rounded-full text-sm font-bold ${activeCat === 'all' ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'}`}>全部商品</button>
              {cats.map(c => <button key={c.id} onClick={() => setActiveCat(c.id)} className={`px-4 py-1.5 rounded-full text-sm font-bold ${activeCat === c.id ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-600'}`}>{c.name}</button>)}
            </div>
          </div>
          <div className="p-4">
            <div className={`grid gap-4 ${gridClass(settings?.productLayout)}`}>
              {filtered.map(p => <ProductCard key={p.id} product={p} />)}
            </div>
          </div>
          <BottomNav />
        </div>
      );
    };

    const Instructions = () => (
      <div className="min-h-screen bg-yellow-50 pb-20 font-sans">
        <div className="bg-orange-500 text-white p-6 shadow-lg rounded-b-3xl mb-6">
          <h1 className="text-2xl font-bold text-center">購買說明</h1>
        </div>
        <div className="px-4 space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-md border-l-4 border-purple-400">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icons.ShoppingBag size={24} className="text-purple-600"/> 購物流程</h2>
            <div className="space-y-4 relative before:absolute before:left-5 before:h-full before:w-0.5 before:bg-gray-200">
              {['選購商品', '確認購物車', '填寫資料', '完成訂單'].map((step, i) => (
                <div key={i} className="relative flex items-center gap-4">
                  <div className="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center font-bold z-10 border-4 border-white shadow">{i+1}</div>
                  <div className="bg-gray-50 p-3 rounded-lg flex-1"><h3 className="font-bold text-sm">{step}</h3></div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-white p-5 rounded-2xl shadow-md border-l-4 border-blue-400">
            <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><Icons.CreditCard size={24} className="text-blue-600"/> 付款方式</h2>
            <ul className="list-disc pl-5 text-sm text-gray-600 space-y-2">
              <li>貨到付款：取貨時再付款。</li>
              <li>店取付款：至實體門市取貨時付款。</li>
            </ul>
          </div>
        </div>
        <BottomNav />
      </div>
    );

    const Cart = () => {
      const { cart, updateQuantity, clearCart, cartTotal, shippingFee, isFreeShipping, user, setUser, pointsUsed } = useAppContext();
      const navigate = useNavigate();
      const [payMethod, setPayMethod] = useState('貨到付款');
      const [formData, setFormData] = useState({ name: user?.name||'', phone: user?.phone||'', address: user?.address||'' });
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        if(cart.length===0) return;

        // 1. 產生訂單編號 (日期+時間+隨機碼)
        const orderId = generateOrderId();
        const totalAmount = cartTotal + shippingFee;

        // 2. 準備訂單資料
        const orderData = { 
          orderId,
          ...formData, 
          payMethod, 
          items: cart, 
          total: totalAmount, 
          pointsUsed 
        };

        try {
          // 3. 送出訂單到 GAS
          await api.submitOrder(orderData);
          
          // 4. 準備 LIFF 訊息內容
          let messageText = `新訂單通知！\n訂單編號：${orderId}\n----------------\n商品：\n`;
          cart.forEach((item, index) => {
            const priceInfo = item.isRedemption ? `${item.redeemPoints}點` : `NT$${item.price}`;
            messageText += `${index + 1}. ${item.name} (${item.selectedVariant || '單一規格'}) x ${item.quantity} (${priceInfo})\n`;
          });
          messageText += `----------------\n總金額：NT$${totalAmount}\n運費：NT$${shippingFee}\n付款方式：${payMethod}\n收件人：${formData.name}\n電話：${formData.phone}\n地址：${formData.address}`;
          
          if (pointsUsed > 0) {
            messageText += `\n已折抵點數：${pointsUsed}點`;
          }

          // 5. 透過 LIFF 發送訊息 (僅在 LINE 內有效)
          if (typeof liff !== 'undefined' && liff.isInClient()) {
             try {
               await liff.sendMessages([{ type: 'text', text: messageText }]);
             } catch (liffErr) {
               console.error('LIFF sendMessages failed', liffErr);
               // 不阻擋訂單完成流程
             }
          }

          alert('訂單已成功送出！');
          setUser({ ...user, ...formData }); 
          clearCart(); // 清空購物車
          navigate('/profile');
        } catch (err) {
          console.error(err);
          alert('訂單送出失敗，請稍後再試。');
        }
      };

      if(cart.length===0) return <div className="min-h-screen flex flex-col items-center justify-center bg-yellow-50"><Icons.ShoppingCart size={48} className="text-orange-300 mb-4"/><p>購物車是空的</p><Link to="/" className="mt-4 bg-orange-500 text-white px-6 py-2 rounded-full">去逛逛</Link></div>;

      return (
        <div className="min-h-screen bg-yellow-50 pb-24 font-sans">
          <div className="bg-white p-4 sticky top-0 shadow-sm z-50 flex items-center gap-3"><button onClick={()=>navigate(-1)}><Icons.ArrowLeft/></button><h1 className="font-bold">購物車</h1></div>
          <div className="p-4 space-y-4">
            {cart.map(i => (
              <div key={i.id+i.selectedVariant} className="bg-white p-3 rounded-xl shadow-sm flex gap-3">
                <img src={i.images?.[0]} className="w-20 h-20 rounded-lg object-cover bg-gray-100" referrerPolicy="no-referrer" />
                <div className="flex-1">
                  <div className="flex justify-between"><h3 className="font-bold text-sm line-clamp-1">{i.name}</h3><button onClick={()=>updateQuantity(i.id,0,i.selectedVariant,i.isRedemption)}><Icons.Trash2 size={16} className="text-gray-400"/></button></div>
                  <p className="text-xs text-gray-500">{i.selectedVariant}</p>
                  <div className="flex justify-between items-end mt-2">
                    <span className="text-orange-600 font-bold">{i.isRedemption ? `${i.redeemPoints} 點` : `NT$${i.price}`}</span>
                    <div className="flex items-center border rounded-full h-8"><button onClick={()=>updateQuantity(i.id,i.quantity-1,i.selectedVariant,i.isRedemption)} className="px-2"><Icons.Minus size={14}/></button><span className="px-2 text-xs">{i.quantity}</span><button onClick={()=>updateQuantity(i.id,i.quantity+1,i.selectedVariant,i.isRedemption)} className="px-2"><Icons.Plus size={14}/></button></div>
                  </div>
                </div>
              </div>
            ))}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 className="font-bold text-sm">收件資訊</h3>
                <input placeholder="姓名" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="w-full bg-gray-50 p-2 rounded" required />
                <input placeholder="電話" value={formData.phone} onChange={e=>setFormData({...formData, phone:e.target.value})} className="w-full bg-gray-50 p-2 rounded" required />
                <input placeholder="地址" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-gray-50 p-2 rounded" required />
                <select value={payMethod} onChange={e=>setPayMethod(e.target.value)} className="w-full bg-gray-50 p-2 rounded">
                  <option value="貨到付款">貨到付款</option>
                  <option value="店取付款">店取付款</option>
                </select>
              </div>
              <div className="fixed bottom-0 left-0 right-0 bg-white p-4 border-t z-50">
                <button type="submit" className="w-full bg-orange-500 text-white py-3 rounded-full font-bold shadow-lg">確認結帳 (NT${cartTotal + shippingFee})</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    const Profile = () => {
      const { user, updateUserProfile } = useAppContext();
      const [wishlist, setWishlist] = useState(user?.wishlist || '');
      
      const handleSave = () => {
        updateUserProfile({ wishlist });
        alert('儲存成功');
      };

      if (!user) return <div>Loading...</div>;

      return (
        <div className="min-h-screen bg-yellow-50 pb-20 font-sans">
          <div className="bg-orange-500 text-white p-8 rounded-b-3xl mb-6 text-center">
            {user.pictureUrl ? <img src={user.pictureUrl} className="w-20 h-20 rounded-full mx-auto mb-3 border-4 border-white" /> : <div className="w-20 h-20 bg-white rounded-full mx-auto mb-3 flex items-center justify-center text-orange-500 font-bold text-2xl">{user.name?.[0]}</div>}
            <h1 className="text-xl font-bold">{user.name}</h1>
            <p className="opacity-80">點數: {user.points}</p>
          </div>
          <div className="px-4 space-y-4">
            <Link to="/redeem" className="block bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-orange-100 hover:shadow-md transition-shadow">
              <div className="flex items-center gap-3">
                <div className="bg-orange-100 p-2 rounded-full text-orange-500"><Icons.Gift size={24}/></div>
                <span className="font-bold text-gray-800">點數兌換專區</span>
              </div>
              <div className="flex items-center gap-2 text-gray-400">
                <span className="text-xs">查看可兌換商品</span>
                <Icons.ArrowLeft className="rotate-180" size={16}/>
              </div>
            </Link>
            <div className="bg-white p-4 rounded-xl shadow-sm">
              <h3 className="font-bold mb-2">許願池</h3>
              <textarea value={wishlist} onChange={e=>setWishlist(e.target.value)} className="w-full bg-gray-50 p-2 rounded h-24" placeholder="希望未來提供什麼產品或服務？"></textarea>
              <button onClick={handleSave} className="mt-2 bg-orange-500 text-white px-4 py-1 rounded text-sm">儲存</button>
            </div>
          </div>
          <BottomNav />
        </div>
      );
    };

    const Redeem = () => {
      const { redeemableProducts, redeemItem, user } = useAppContext();
      const navigate = useNavigate();
      
      return (
        <div className="min-h-screen bg-yellow-50 pb-20 font-sans">
          <div className="bg-white p-4 sticky top-0 shadow-sm z-50 flex items-center gap-3">
            <button onClick={()=>navigate(-1)}><Icons.ArrowLeft/></button>
            <h1 className="font-bold text-lg">點數兌換專區</h1>
          </div>
          <div className="p-4">
            <div className="bg-orange-500 text-white p-4 rounded-xl mb-4 flex justify-between items-center shadow-md">
              <span className="font-bold">目前持有點數</span>
              <span className="text-2xl font-black">{user?.points || 0} P</span>
            </div>
            
            {redeemableProducts.length === 0 ? (
              <div className="text-center text-gray-500 py-10">目前沒有可兌換的商品</div>
            ) : (
              <div className="grid gap-4">
                {redeemableProducts.map(p => (
                  <div key={p.id} className="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
                    <div className="aspect-video w-full bg-gray-100 relative">
                      <img src={p.images?.[0]} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                      <div className="absolute top-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm">庫存: {p.stock}</div>
                    </div>
                    <div className="p-4 flex-1 flex flex-col justify-between">
                      <div>
                        <h3 className="font-bold text-gray-800 mb-1">{p.name}</h3>
                        <p className="text-xs text-gray-500 line-clamp-2 mb-3">{p.description}</p>
                      </div>
                      <div className="flex justify-between items-center mt-2 border-t pt-3">
                        <span className="text-orange-600 font-black text-lg">{p.redeemPoints} 點</span>
                        <button 
                          onClick={()=>{ 
                            if((user?.points||0) < p.redeemPoints) {
                              alert('點數不足無法兌換');
                            } else {
                              if(confirm(`確定要使用 ${p.redeemPoints} 點兌換「${p.name}」嗎？`)) {
                                if(redeemItem(p)) alert('兌換成功！請至櫃台出示兌換紀錄。'); 
                                else alert('兌換失敗');
                              }
                            }
                          }} 
                          className={`px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${ (user?.points||0) >= p.redeemPoints ? 'bg-orange-500 text-white hover:bg-orange-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                        >
                          立即兌換
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const ProductDetail = () => {
      const { id } = useParams();
      const navigate = useNavigate();
      const { addToCart } = useAppContext();
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [imgIdx, setImgIdx] = useState(0);
      const [variant, setVariant] = useState('');

      useEffect(() => {
        setLoading(true);
        api.fetchProducts().then(p => {
          if (!p) {
            setError('無法載入商品資料');
            setLoading(false);
            return;
          }
          // 確保 ID 比對時類型一致 (轉為字串)
          const found = p.find(x => String(x.id) === String(id));
          if (found) { 
            setProduct(found); 
            if(found.variants?.[0]) setVariant(found.variants[0]); 
          } else {
            setError('找不到此商品');
          }
          setLoading(false);
        }).catch(err => {
          console.error(err);
          setError('發生錯誤');
          setLoading(false);
        });
      }, [id]);

      if (loading) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;
      if (error || !product) return <div className="min-h-screen flex flex-col items-center justify-center"><p className="text-red-500 mb-4">{error || '商品不存在'}</p><button onClick={()=>navigate('/')} className="bg-orange-500 text-white px-4 py-2 rounded">回首頁</button></div>;

      return (
        <div className="min-h-screen bg-yellow-50 pb-24">
          <div className="relative bg-white">
            <button onClick={()=>navigate(-1)} className="absolute top-4 left-4 z-10 w-10 h-10 bg-black/30 rounded-full text-white flex items-center justify-center"><Icons.ArrowLeft/></button>
            <div className="aspect-square">
              <img src={product.images?.[imgIdx]} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
            </div>
          </div>
          <div className="bg-white p-5 mb-2 rounded-b-3xl shadow-sm">
            <h1 className="text-2xl font-bold mb-2">{product.name}</h1>
            <p className="text-orange-600 text-3xl font-black">NT${product.price}</p>
            {product.variants?.length > 0 && (
              <div className="mt-4">
                <p className="text-sm font-bold mb-2">{product.variantType || '規格'}</p>
                <div className="flex gap-2">{product.variants.map(v => <button key={v} onClick={()=>setVariant(v)} className={`px-4 py-2 rounded border ${variant===v?'bg-orange-500 text-white':'bg-white'}`}>{v}</button>)}</div>
              </div>
            )}
          </div>
          <div className="bg-white p-5 rounded-3xl shadow-sm mx-2 mb-20">
            <h3 className="font-bold mb-2 border-l-4 border-orange-500 pl-2">商品詳情</h3>
            <p className="text-gray-600 whitespace-pre-line">{product.description}</p>
          </div>
          <div className="fixed bottom-0 left-0 right-0 bg-white p-4 border-t flex gap-3 z-50">
            <button onClick={()=>addToCart(product, 1, variant)} className="flex-1 bg-orange-100 text-orange-600 py-3 rounded-full font-bold">加入購物車</button>
            <button onClick={()=>{addToCart(product, 1, variant); navigate('/cart');}} className="flex-1 bg-orange-500 text-white py-3 rounded-full font-bold">立即購買</button>
          </div>
        </div>
      );
    };

    const App = () => (
      <AppProvider>
        <HashRouter>
          <Routes>
            <Route path="/" element={<Home />} />
            <Route path="/product/:id" element={<ProductDetail />} />
            <Route path="/cart" element={<Cart />} />
            <Route path="/profile" element={<Profile />} />
            <Route path="/instructions" element={<Instructions />} />
            <Route path="/redeem" element={<Redeem />} />
          </Routes>
        </HashRouter>
      </AppProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
