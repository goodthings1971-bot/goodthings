  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { -webkit-tap-highlight-color: transparent; }
    
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .animate-marquee {
      animation: marquee 20s linear infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-in {
      animation: scaleIn 0.2s ease-out;
    }
  </style>
</head>
<body class="bg-yellow-50">
  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(200,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h3 class="font-bold text-xl mb-2">發生錯誤 (Error Log)</h3>
    <button onclick="document.getElementById('error-log').style.display='none'" style="border:1px solid white; padding:5px 10px; margin-bottom:10px;">關閉</button>
    <div id="error-content"></div>
  </div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>' + msg + '</strong><br><small>' + url + ':' + line + '</small><br><pre style="white-space:pre-wrap;">' + (error ? error.stack : '') + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
    window.onunhandledrejection = function(event) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>Unhandled Rejection</strong><br><pre style="white-space:pre-wrap;">' + event.reason + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
  </script>

  <div id="root">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fefce8;color:#f97316;font-weight:bold;font-family:sans-serif;">
      載入中... (Loading...)
    </div>
  </div>

  <script type="text/babel">
    console.log('Step 1: Script started');

    // 檢查依賴是否載入
    if (typeof React === 'undefined') console.error('React missing');
    if (typeof ReactDOM === 'undefined') console.error('ReactDOM missing');
    if (typeof ReactRouterDOM === 'undefined') console.error('ReactRouterDOM missing');

    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof ReactRouterDOM === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;">系統錯誤：核心元件未載入，請檢查網路連線。</div>';
      throw new Error('React 或 ReactRouterDOM 未正確載入');
    }
    console.log('Step 2: Dependencies loaded');

    const { useState, useEffect, createContext, useContext } = React;
    const { HashRouter, Routes, Route, Link, useNavigate, useLocation, useParams } = ReactRouterDOM;

    // --- 重要設定 ---
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxG9xUAxbLvWf6fP9solDNtHgHJ8BV3PpMZwYwhXcl7T7BYQ10cU1c3VLL3yFV6ZNvF/exec'; 
    const LIFF_ID = '2009248623-E3UOP9Mc';
    console.log('Step 3: Config loaded');

    // --- API 服務 (Fetch) ---
    const api = {
      // GET 請求
      get: async (action, params = {}) => {
        if (!GAS_API_URL.includes('/exec')) {
          console.error('GAS_API_URL 設定錯誤');
          return null;
        }
        const query = new URLSearchParams({ action, ...params }).toString();
        try {
          const res = await fetch(`${GAS_API_URL}?${query}`);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error('API GET Error:', e);
          return null;
        }
      },
      // POST 請求
      post: async (action, data) => {
        if (!GAS_API_URL.includes('/exec')) return null;
        try {
          const res = await fetch(GAS_API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, ...data }),
            headers: { 'Content-Type': 'text/plain' }
          });
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error('API POST Error:', e);
          throw e;
        }
      },
      fetchProducts: () => api.get('getProducts'),
      fetchCategories: () => api.get('getCategories'),
      fetchSettings: () => api.get('getSettings'),
      getUserProfile: (lineId) => api.get('getUserProfile', { lineId }),
      submitOrder: (order) => api.post('createOrder', { order }),
      updateUserProfile: (profile) => api.post('updateUserProfile', { profile })
    };
    console.log('Step 4: API initialized');

    // --- Utils ---
    const generateOrderId = () => {
      const now = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      const datePart = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const randomPart = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
      return `${datePart}${randomPart}`;
    };

    // --- Icons ---
    const Icons={
      Home:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      ShoppingCart:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
      User:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Search:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      Menu:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      X:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>,
      Facebook:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>,
      ArrowLeft:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
      Plus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      Minus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/></svg>,
      Trash2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      Settings2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      LayoutGrid:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
      Grid2X2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/><path d="M12 3v18"/></svg>,
      Grid3X3:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>,
      Square:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
      Minimize:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>,
      ShoppingBag:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      Gift:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>,
      Truck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><path d="M14 17h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
      CreditCard:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
      ShieldCheck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
      HelpCircle:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>,
      Share2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>,
      Zap:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Store:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></svg>
    };
    console.log('Step 5: Icons defined');

    // --- Context ---
    const AppContext = createContext();

    const AppProvider = ({ children }) => {
      const [cart, setCart] = useState([]);
      const [user, setUser] = useState(null);
      const [settings, setSettings] = useState(null);
      const [redeemableProducts, setRedeemableProducts] = useState([]);
      const [liffError, setLiffError] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        const initApp = async () => {
          console.log('AppProvider: Start initialization');
          try {
            // 1. Load LocalStorage
            try {
              const savedCart = localStorage.getItem('cart');
              if (savedCart) setCart(JSON.parse(savedCart));
            } catch (e) {
              console.error('LocalStorage Error', e);
            }

            // 2. Parallel Load: LIFF, Settings, Products
            const loadLiff = async () => {
              if (typeof liff === 'undefined') {
                console.warn('LIFF SDK not loaded');
                setUser({ lineId: 'guest', name: '訪客 (No LIFF)', points: 0 });
                return;
              }
              try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                  const profile = await liff.getProfile();
                  const lineId = profile.userId;
                  const dbUser = await api.getUserProfile(lineId);
                  setUser({
                    lineId,
                    name: profile.displayName,
                    pictureUrl: profile.pictureUrl,
                    points: 0,
                    coupons: [],
                    redemptions: [],
                    wishlist: '',
                    ...(dbUser || {})
                  });
                } else {
                  setUser({ lineId: 'guest', name: '訪客', points: 0 });
                }
              } catch (err) {
                console.error('LIFF Init Failed', err);
                setLiffError(err.toString());
                setUser({ lineId: 'test_user', name: '測試會員 (LIFF Error)', points: 0 });
              }
            };

            const loadData = async () => {
              try {
                const [s, p] = await Promise.all([
                  api.fetchSettings(),
                  api.fetchProducts()
                ]);
                if (s) setSettings(s);
                if (p) setRedeemableProducts(p.filter(x => (x.redeemPoints || 0) > 0));
              } catch (err) {
                console.error('Data Load Failed', err);
              }
            };

            await Promise.all([loadLiff(), loadData()]);
          } catch (error) {
            console.error('App Initialization Error', error);
          } finally {
            console.log('AppProvider: Initialization done');
            setIsLoading(false);
          }
        };

        initApp();
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem('cart', JSON.stringify(cart));
        } catch (e) {
          console.error('LocalStorage Save Error', e);
        }
      }, [cart]);

      const addToCart = (p, q, v, isRedeem=false) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === p.id && i.selectedVariant === v && i.isRedemption === isRedeem);
          if (exist) return prev.map(i => i === exist ? { ...i, quantity: i.quantity + q } : i);
          return [...prev, { ...p, quantity: q, selectedVariant: v, isRedemption: isRedeem }];
        });
      };
      
      const updateQuantity = (id, q, v, isRedeem) => {
        if (q <= 0) return setCart(prev => prev.filter(i => !(i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem)));
        setCart(prev => prev.map(i => (i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem) ? { ...i, quantity: q } : i));
      };

      const cartTotal = cart.reduce((t, i) => i.isRedemption ? t : t + i.price * i.quantity, 0);
      const pointsUsed = cart.reduce((t, i) => (i.isRedemption && i.redeemPoints) ? t + i.redeemPoints * i.quantity : t, 0);
      const isFreeShipping = settings?.freeShippingThreshold ? cartTotal >= settings.freeShippingThreshold : false;
      const shippingFee = isFreeShipping ? 0 : (settings?.shippingFee || 60);

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-lime-600">
            <div className="w-12 h-12 border-4 border-lime-200 border-t-lime-600 rounded-full animate-spin mb-4"></div>
            <div className="font-bold text-lg">美好正在發生...</div>
            <div className="text-sm text-gray-400 mt-2">Loading...</div>
          </div>
        );
      }

      return (
        <AppContext.Provider value={{
          cart, addToCart, updateQuantity, clearCart: () => setCart([]), cartTotal,
          user, setUser, settings, shippingFee, isFreeShipping, pointsUsed,
          redeemableProducts, updateSettings: (s) => setSettings(p => ({...p, ...s})),
          updateUserProfile: (p) => {
            const newUser = { ...user, ...p };
            setUser(newUser);
            api.updateUserProfile(newUser);
          },
          redeemItem: (p) => {
            if((user.points||0) < p.redeemPoints) return false;
            const newUser = { 
              ...user, 
              points: user.points - p.redeemPoints, 
              redemptions: [...(user.redemptions||[]), { id: Date.now(), name: p.name, code: Math.random().toString(36).substr(2,8).toUpperCase() }] 
            };
            setUser(newUser);
            api.updateUserProfile(newUser);
            return true;
          }
        }}>
          {children}
        </AppContext.Provider>
      );
    };
    const useAppContext = () => useContext(AppContext);

    // --- Components ---
    console.log('Step 6: Defining components');

    // Custom Dialog Component
    const Dialog = ({ isOpen, type, title, message, onConfirm, onCancel }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm overflow-hidden transform transition-all scale-100 animate-scale-in">
            <div className={`p-4 text-center ${type === 'confirm' ? 'bg-blue-50' : 'bg-lime-50'}`}>
              <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2 ${type === 'confirm' ? 'bg-blue-100 text-blue-600' : 'bg-lime-100 text-lime-600'}`}>
                {type === 'confirm' ? <Icons.HelpCircle size={24} /> : <Icons.ShieldCheck size={24} />}
              </div>
              <h3 className="text-lg font-bold text-gray-800">{title}</h3>
            </div>
            <div className="p-6 text-center text-gray-600 text-sm whitespace-pre-wrap">
              {message}
            </div>
            <div className="flex border-t border-gray-100">
              {type === 'confirm' ? (
                <>
                  <button onClick={onCancel} className="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 active:bg-gray-100 transition-colors border-r border-gray-100">取消</button>
                  <button onClick={onConfirm} className="flex-1 py-3 text-blue-600 font-bold hover:bg-blue-50 active:bg-blue-100 transition-colors">確認</button>
                </>
              ) : (
                <button onClick={onConfirm} className="flex-1 py-3 text-lime-600 font-bold hover:bg-lime-50 active:bg-lime-100 transition-colors">知道了</button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Dialog Context
    const DialogContext = createContext();
    const useDialog = () => useContext(DialogContext);

    const DialogProvider = ({ children }) => {
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: () => {}, onCancel: () => {} });

      const showAlert = (message, title = '提示') => {
        return new Promise((resolve) => {
          setDialog({
            isOpen: true,
            type: 'alert',
            title,
            message,
            onConfirm: () => {
              setDialog(prev => ({ ...prev, isOpen: false }));
              resolve(true);
            },
            onCancel: () => {}
          });
        });
      };

      const showConfirm = (message, title = '確認') => {
        return new Promise((resolve) => {
          setDialog({
            isOpen: true,
            type: 'confirm',
            title,
            message,
            onConfirm: () => {
              setDialog(prev => ({ ...prev, isOpen: false }));
              resolve(true);
            },
            onCancel: () => {
              setDialog(prev => ({ ...prev, isOpen: false }));
              resolve(false);
            }
          });
        });
      };

      return (
        <DialogContext.Provider value={{ showAlert, showConfirm }}>
          {children}
          <Dialog {...dialog} />
        </DialogContext.Provider>
      );
    };

    // Admin Component
    const AdminDashboard = () => {
      const { user } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const [orders, setOrders] = useState([]);
      const [redemptions, setRedemptions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('orders'); // orders, redemptions
      const navigate = useNavigate();

      useEffect(() => {
        if (!user || user.lineId !== 'Ua66fd77f72e4524075afd856cae91587') {
          navigate('/');
          return;
        }
        fetchData();
      }, [user]);

      const fetchData = async () => {

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      componentDidCatch(error, errorInfo) {
        this.setState({ error, errorInfo });
        console.error("React Error Boundary caught an error", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-red-50 text-red-800">
              <h1 className="text-2xl font-bold mb-4">發生錯誤 (Error)</h1>

              <pre className="bg-white p-4 rounded shadow text-xs overflow-auto w-full max-w-md mb-4">
                {this.state.error && this.state.error.toString()}
                <br />
                {this.state.errorInfo && this.state.errorInfo.componentStack}
              </pre>
              <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">重新載入</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const Cart = () => {
      const { cart, updateQuantity, clearCart, cartTotal, user, settings, shippingFee, isFreeShipping, pointsUsed } = useAppContext();
      const { showAlert } = useDialog();
      const navigate = useNavigate();
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [deliveryMethod, setDeliveryMethod] = useState('shipping'); // shipping, pickup, cvs
      const [cvsType, setCvsType] = useState(''); // 7-11, family
      const [formData, setFormData] = useState({ name: user?.name||'', phone: user?.phone||'', address: user?.address||'', storeName: '' });
      const [selectedCoupon, setSelectedCoupon] = useState(null);

      // 計算折扣
      let discountAmount = 0;
      if (selectedCoupon) {
        discountAmount = selectedCoupon.value;
      }

      const total = cartTotal + (deliveryMethod === 'shipping' ? (isFreeShipping ? 0 : shippingFee) : 0) - discountAmount;
      const pointsEarned = Math.floor(cartTotal / (settings?.pointRatio || 100)); // 預設 100 元 1 點，可由 Settings 覆蓋
      const freeShippingDiff = (settings?.freeShippingThreshold || 1000) - cartTotal;

      // 篩選可用優惠券
      const availableCoupons = (user?.coupons || []).filter(c => {
        const today = new Date().toISOString().split('T')[0];
        return c.expiry >= today && cartTotal >= c.minSpend;
      });

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (cart.length === 0) return;
        if (!user || !user.phone) {
          showAlert('請先至會員中心填寫手機號碼');
          navigate('/profile');
          return;
        }
        if (deliveryMethod === 'cvs' && (!cvsType || !formData.storeName)) {
          showAlert('請選擇超商並填寫門市名稱');
          return;
        }
        
        setIsSubmitting(true);
        const orderId = generateOrderId();
        const order = {
          orderId,
          user: {
            lineId: user.lineId,
            name: formData.name || user.name,
            phone: formData.phone || user.phone,
            address: deliveryMethod === 'shipping' ? formData.address : (deliveryMethod === 'cvs' ? `${cvsType} ${formData.storeName}` : '店面取貨')
          },
          items: cart,
          total,
          pointsUsed,
          pointsEarned,
          discount: discountAmount,
          deliveryMethod,
          shippingFee: deliveryMethod === 'shipping' ? (isFreeShipping ? 0 : shippingFee) : 0,
          status: 'Pending',
          createdAt: new Date().toISOString()
        };

        try {
          // 1. Submit to GAS
          await api.submitOrder(order);
          
          // 2. Send LIFF Message
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            const itemsText = cart.map((i, idx) => {
              if (i.isRedemption) return `${idx + 1}. [兌換] ${i.name} (${i.selectedVariant || '單一規格'}) x ${i.quantity} (0點)`;
              return `${idx + 1}. ${i.name} (${i.selectedVariant || '單一規格'}) x ${i.quantity} (NT$${i.price})`;
            }).join('\n');
            
            const deliveryText = deliveryMethod === 'pickup' ? '店面取貨' : deliveryMethod === 'cvs' ? `超商取貨 (${cvsType} ${formData.storeName})` : `宅配`;
            const paymentText = deliveryMethod === 'pickup' ? '店取付款' : '貨到付款';
            const shippingFeeText = deliveryMethod === 'shipping' && !isFreeShipping ? `NT$${shippingFee}` : 'NT$0';

            const messageText = `新訂單通知！
訂單編號：${orderId}
----------------
商品：
${itemsText}
----------------
總金額：NT$${total}
運費：${shippingFeeText}
付款方式：${paymentText}
收件人：${formData.name || user.name}
電話：${formData.phone || user.phone}
地址：${deliveryMethod === 'shipping' ? formData.address : (deliveryMethod === 'cvs' ? `${cvsType} ${formData.storeName}` : settings?.storeAddress || '店面取貨')}`;
            
            await liff.sendMessages([{
              type: 'text',
              text: messageText

          showAlert('發生錯誤，請稍後再試');
        } finally {
          setProcessing(false);
        }
      };
      
      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans">
          <div className="bg-white p-4 sticky top-0 shadow-sm z-50 flex items-center gap-3">
            <button onClick={()=>navigate(-1)}><Icons.ArrowLeft/></button>
            <h1 className="font-bold text-lg">點數兌換專區</h1>
          </div>
          <div className="p-4">
            <div className="bg-gradient-to-r from-lime-500 to-lime-600 text-white p-6 rounded-2xl mb-6 flex justify-between items-center shadow-lg shadow-lime-200">
              <div>
                <div className="text-lime-100 text-sm font-medium mb-1">目前持有點數</div>
                <span className="text-3xl font-black">{user?.points || 0}</span> <span className="text-sm opacity-80">pts</span>
              </div>
              <div className="bg-white/20 p-3 rounded-full">
                <Icons.Gift size={32} className="text-white" />
              </div>
            </div>
            
            {redeemableProducts.length === 0 ? (
              <div className="text-center text-gray-500 py-10">
                <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icons.Gift className="w-8 h-8 text-gray-400" />
                </div>
                目前沒有可兌換的商品
              </div>
            ) : (
              <div className="grid gap-4">
                {redeemableProducts.map(p => (
                  <div key={p.id} className="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
                    <div className="aspect-video w-full bg-gray-100 relative">
                      <img src={p.images?.[0]} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                      <div className="absolute top-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm">庫存: {p.stock}</div>
                    </div>
                    <div className="p-4 flex-1 flex flex-col justify-between">
                      <div>
                        <h3 className="font-bold text-gray-800 mb-1">{p.name}</h3>
                        <p className="text-xs text-gray-500 line-clamp-2 mb-3">{p.description}</p>
                      </div>
                      <div className="flex justify-between items-center mt-2 border-t border-gray-100 pt-3">
                        <span className="text-lime-600 font-black text-lg">{p.redeemPoints} 點</span>
                        <button 
                          disabled={processing || (user?.points||0) < p.redeemPoints}
                          onClick={() => handleRedeem(p)}
                          className={`px-4 py-1.5 rounded-full text-sm font-bold shadow-sm transition-all ${ 
                            (user?.points||0) >= p.redeemPoints 
                              ? 'bg-lime-500 text-white hover:bg-lime-600 shadow-lime-200' 
                              : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                          }`}
                        >
                          {processing ? '處理中...' : '立即兌換'}
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const ProductDetail = () => {
      const { id } = useParams();
      const navigate = useNavigate();
      const { addToCart } = useAppContext();
      const { showAlert } = useDialog();
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedVariant, setSelectedVariant] = useState(null);

      useEffect(() => {
        setLoading(true);
        api.fetchProducts().then(p => {
          if (!p) {
            setError('無法載入商品資料');
            setLoading(false);
            return;
          }
          const found = p.find(x => String(x.id) === String(id));
          if (found) { 
            setProduct(found); 
            if(found.variants?.[0]) setSelectedVariant(found.variants[0]); 
          } else {
            setError('找不到此商品');
          }
          setLoading(false);
        }).catch(err => {
          console.error(err);
          setError('發生錯誤');
          setLoading(false);
        });
      }, [id]);

      if (loading) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;
      if (error || !product) return <div className="min-h-screen flex flex-col items-center justify-center"><p className="text-red-500 mb-4">{error || '商品不存在'}</p><button onClick={()=>navigate('/')} className="bg-lime-600 text-white px-4 py-2 rounded">回首頁</button></div>;

      // 影片嵌入 helper
      const getVideoEmbed = (url) => {
        if (!url) return null;
        let embedUrl = null;
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          const videoId = url.split('v=')[1] || url.split('/').pop();
          const cleanId = videoId.split('&')[0].split('?')[0];
          embedUrl = `https://www.youtube.com/embed/${cleanId}`;
        } else if (url.includes('facebook.com')) {
           embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0`;
        }

        if (embedUrl) {
          return (
            <div className="aspect-video w-full mt-4 rounded-xl overflow-hidden shadow-sm">
              <iframe src={embedUrl} className="w-full h-full" frameBorder="0" allowFullScreen></iframe>
            </div>
          );
        }
        return (
          <div className="mt-4 p-4 bg-gray-100 rounded-xl text-center">
            <a href={url} target="_blank" className="text-blue-600 underline">點此觀看影片</a>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-white pb-24">
          <div className="relative">
            <img src={product.images[0] || 'https://picsum.photos/400/400'} alt={product.name} className="w-full aspect-square object-cover" referrerPolicy="no-referrer" />
            <button onClick={() => navigate(-1)} className="absolute top-4 left-4 bg-white/80 p-2 rounded-full shadow-lg backdrop-blur-sm">
              <Icons.ArrowLeft className="w-6 h-6 text-gray-800" />
            </button>
          </div>

          <div className="p-5 -mt-6 bg-white rounded-t-3xl relative z-10">
            <div className="flex justify-between items-start mb-2">
              <h1 className="text-2xl font-bold text-gray-800">{product.name}</h1>
              <span className="bg-lime-100 text-lime-700 px-3 py-1 rounded-full text-xs font-bold">庫存: {product.stock}</span>
            </div>
            
            <div className="flex items-baseline gap-2 mb-6">
              <span className="text-3xl font-bold text-lime-600">NT${product.price}</span>
              {product.originalPrice && <span className="text-gray-400 line-through text-sm">NT${product.originalPrice}</span>}
            </div>

            {product.variants && product.variants.length > 0 && (
              <div className="mb-6">
                <h3 className="font-bold text-gray-800 mb-3">{product.variantType || '規格'}</h3>
                <div className="flex flex-wrap gap-2">
                  {product.variants.map(v => (
                    <button
                      key={v}
                      onClick={() => setSelectedVariant(v)}
                      className={`px-4 py-2 rounded-lg border text-sm font-medium transition-all ${
                        selectedVariant === v 
                          ? 'border-lime-500 bg-lime-50 text-lime-700' 
                          : 'border-gray-200 text-gray-600 hover:border-lime-200'
                      }`}
                    >
                      {v}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="prose prose-sm text-gray-600 mb-8">
              <h3 className="font-bold text-gray-800 mb-2">商品介紹</h3>
              <p className="whitespace-pre-wrap">{product.description}</p>
              {getVideoEmbed(product.videoUrl)}
            </div>
          </div>

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 flex items-center gap-4 z-50 safe-area-bottom">
             <button onClick={() => navigate('/')} className="p-3 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-50">
               <Icons.Home className="w-6 h-6" />
             </button>
             <button 
               onClick={() => {
                 addToCart(product, 1, selectedVariant);
                 showAlert('已加入購物車');
               }}
               className="flex-1 bg-lime-600 text-white py-3 rounded-full font-bold shadow-lg shadow-lime-200 active:scale-95 transition-transform flex items-center justify-center gap-2"
             >
               <Icons.ShoppingCart className="w-5 h-5" />
               加入購物車
             </button>
          </div>
        </div>
      );
    };

    const App = () => (
      <ErrorBoundary>
        <AppProvider>
          <DialogProvider>
            <HashRouter>
              <Routes>
                <Route path="/" element={<Home />} />
                <Route path="/product/:id" element={<ProductDetail />} />
                <Route path="/cart" element={<Cart />} />
                <Route path="/profile" element={<Profile />} />
                <Route path="/instructions" element={<Instructions />} />
                <Route path="/redeem" element={<Redeem />} />
                <Route path="/admin" element={<AdminDashboard />} />
              </Routes>
            </HashRouter>
          </DialogProvider>
        </AppProvider>
      </ErrorBoundary>
    );

    console.log('Step 7: App component defined, mounting root');
    try {
      const container = document.getElementById('root');
      if (!container) throw new Error('Root element not found');
      
      const root = ReactDOM.createRoot(container);
      console.log('Step 8: Root created');
      root.render(<App />);
      console.log('Step 9: Render called');
    } catch (err) {
      console.error('Render Error:', err);
      document.getElementById('root').innerHTML = `<div style="padding:20px;color:red;">啟動失敗: ${err.message}</div>`;
    }
  </script>
</body>
</html>
