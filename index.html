  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 商品介紹 HTML 樣式 */
    .product-desc h1,.product-desc h2,.product-desc h3 { font-weight:700; margin:0.6em 0 0.3em; }
    .product-desc h1 { font-size:1.1em; }
    .product-desc h2 { font-size:1em; }
    .product-desc h3 { font-size:0.95em; }
    .product-desc p { margin:0.4em 0; }
    .product-desc ul,.product-desc ol { padding-left:1.4em; margin:0.4em 0; }
    .product-desc li { margin:0.15em 0; }
    .product-desc strong,.product-desc b { font-weight:700; }
    .product-desc em,.product-desc i { font-style:italic; }
    .product-desc a { color:#16a34a; text-decoration:underline; }
    .product-desc img { max-width:100%; border-radius:8px; margin:0.4em 0; }
    .product-desc table { width:100%; border-collapse:collapse; margin:0.5em 0; font-size:0.85em; }
    .product-desc td,.product-desc th { border:1px solid #e5e7eb; padding:4px 8px; }
    .product-desc th { background:#f3f4f6; font-weight:600; }
    .product-desc hr { border:none; border-top:1px solid #e5e7eb; margin:0.6em 0; }
    .product-desc blockquote { border-left:3px solid #a3e635; padding-left:0.8em; color:#6b7280; margin:0.4em 0; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { -webkit-tap-highlight-color: transparent; }
    :root { --app-font-scale: 1; }
    .app-scalable { font-size: calc(1em * var(--app-font-scale)); }
    /* 按鈕點擊反饋 */
    .btn-action { position:relative; overflow:hidden; transition: opacity 0.15s, transform 0.1s; }
    .btn-action:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .btn-action.loading { opacity: 0.7; }
    .btn-action:active:not(:disabled) { transform: scale(0.97); }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    .animate-marquee { animation: marquee 20s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    @keyframes checkmark { 0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .animate-check { animation: checkmark 0.3s ease-out; }
  </style>
</head>

  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(200,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h3 class="font-bold text-xl mb-2">發生錯誤 (Error Log)</h3>
    <button onclick="document.getElementById('error-log').style.display='none'" style="border:1px solid white; padding:5px 10px; margin-bottom:10px;">關閉</button>
    <div id="error-content"></div>
  </div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>' + msg + '</strong><br><small>' + url + ':' + line + '</small><br><pre style="white-space:pre-wrap;">' + (error ? error.stack : '') + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
    window.onunhandledrejection = function(event) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>Unhandled Rejection</strong><br><pre style="white-space:pre-wrap;">' + event.reason + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
  </script>

    // --- Dialog Context ---
    const DialogContext = createContext();
    const useDialog = () => useContext(DialogContext);
    const Dialog = ({ isOpen, type, title, message, onConfirm, onCancel }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm overflow-hidden animate-scale-in">
            <div className={`p-4 text-center ${type === 'confirm' ? 'bg-blue-50' : 'bg-lime-50'}`}>
              <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2 ${type === 'confirm' ? 'bg-blue-100 text-blue-600' : 'bg-lime-100 text-lime-600'}`}>
                {type === 'confirm' ? <Icons.HelpCircle size={24} /> : <Icons.ShieldCheck size={24} />}

            </div>
            <div className="p-6 text-center text-gray-600 text-sm whitespace-pre-wrap">{message}</div>
            <div className="flex border-t border-gray-100">
              {type === 'confirm' ? (
                <>
                  <button onClick={onCancel} className="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 border-r border-gray-100">取消</button>
                  <button onClick={onConfirm} className="flex-1 py-3 text-blue-600 font-bold hover:bg-blue-50">確認</button>
                </>
              ) : (
                <button onClick={onConfirm} className="flex-1 py-3 text-lime-600 font-bold hover:bg-lime-50">知道了</button>
              )}
            </div>
          </div>
        </div>
      );
    };
    const DialogProvider = ({ children }) => {
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: () => {}, onCancel: () => {} });
      const showAlert = (message, title = '提示') => new Promise((resolve) => {
        setDialog({ isOpen: true, type: 'alert', title, message,
          onConfirm: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(true); },
          onCancel: () => {} });
      });
      const showConfirm = (message, title = '確認') => new Promise((resolve) => {
        setDialog({ isOpen: true, type: 'confirm', title, message,
          onConfirm: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(true); },
          onCancel: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(false); } });
      });
      return (
        <DialogContext.Provider value={{ showAlert, showConfirm }}>
          {children}
          <Dialog {...dialog} />

    // --- App Context ---
    const AppContext = createContext();
    const AppProvider = ({ children }) => {
      const [cart, setCart] = useState([]);

      const [isLoading, setIsLoading] = useState(true);
      const [loadProgress, setLoadProgress] = useState(0); // 0~100
      const dataLoadedRef = React.useRef(false); // ✅ 防止重複載入
      useEffect(() => {
        if (dataLoadedRef.current) return; // ✅ 只執行一次
        dataLoadedRef.current = true;
        const initApp = async () => {
          try {
            try { const s = localStorage.getItem('cart'); if (s) setCart(JSON.parse(s)); } catch(e) {}
            setLoadProgress(10);
            const loadLiff = async () => {
              if (typeof liff === 'undefined') { setUser({ lineId: 'guest', name: '訪客', points: 0 }); return; }
              try {
                await liff.init({ liffId: LIFF_ID });
                setLoadProgress(p => Math.max(p, 30));
                if (liff.isLoggedIn()) {
                  const profile = await liff.getProfile();
                  setLoadProgress(p => Math.max(p, 50));
                  const dbUser = await api.getUserProfile(profile.userId);
                  setLoadProgress(p => Math.max(p, 65));
                  setUser({ lineId: profile.userId, name: profile.displayName, pictureUrl: profile.pictureUrl, points: 0, coupons: [], ...(dbUser || {}) });
                } else { setUser({ lineId: 'guest', name: '訪客', points: 0 }); }
              } catch (err) {
                console.error('LIFF Init Failed', err);
                setUser({ lineId: 'test_user', name: '測試會員 (LIFF Error)', points: 0 });
              }
            };
            const loadData = async () => {
              try {
                const [s, p, c] = await Promise.all([api.fetchSettings(), api.fetchProducts(), api.fetchCategories()]);
                setLoadProgress(p2 => Math.max(p2, 85));
                if (s) {
                  setSettings(s);
                  // 套用字體大小設定

      const addToCart = (p, q, v, isRedeem=false) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === p.id && i.selectedVariant === v && i.isRedemption === isRedeem);
          if (exist) return prev.map(i => i === exist ? { ...i, quantity: i.quantity + q } : i);
          return [...prev, { ...p, quantity: q, selectedVariant: v, isRedemption: isRedeem }];
        });
      };
      const updateQuantity = (id, q, v, isRedeem) => {
        if (q <= 0) return setCart(prev => prev.filter(i => !(i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem)));

      };
      const cartTotal = cart.reduce((t, i) => i.isRedemption ? t : t + i.price * i.quantity, 0);

    const TaiwanAddressSelector = ({ value, onChange }) => {
      const parseAddr = (v) => {
        if (!v) return { city:'', district:'', detail:'' };
        const m = v.match(/^(\d{3,6})?\s*([^\s]+[縣市])\s*([^\s]+[區鎮鄉市])?\s*(.*)$/);
        if (m) return { city:m[2]||'', district:m[3]||'', detail:m[4]||'' };
        return { city:'', district:'', detail:v };
      };
      const parsed = parseAddr(value);
      const [city, setCity] = useState(parsed.city);
      const [district, setDistrict] = useState(parsed.district);
      const [detail, setDetail] = useState(parsed.detail);

      // ✅ 當 value prop 從外部變動時（例如預填會員地址），重新解析並同步 state
      const prevValue = React.useRef(value);
      useEffect(() => {
        if (value !== prevValue.current) {
          prevValue.current = value;
          const p = parseAddr(value);
          setCity(p.city);
          setDistrict(p.district);
          setDetail(p.detail);
        }
      }, [value]);

      const cities = Object.keys(TW_DISTRICTS);
      const districts = city && TW_DISTRICTS[city] ? Object.keys(TW_DISTRICTS[city]) : [];
      const zipCode = city && district && TW_DISTRICTS[city]?.[district] ? TW_DISTRICTS[city][district] : '';

      const buildAddr = (c, d, det) => {
        const zip = c && d && TW_DISTRICTS[c]?.[d] ? TW_DISTRICTS[c][d] : '';
        if (!c) return det;
        if (!d) return `${zip ? zip+' ' : ''}${c}${det}`;
        return `${zip} ${c}${d}${det}`;
      };

      const handleCity = (c) => { setCity(c); setDistrict(''); onChange(buildAddr(c,'',detail)); };
      const handleDistrict = (d) => { setDistrict(d); onChange(buildAddr(city,d,detail)); };
      const handleDetail = (e) => { setDetail(e.target.value); onChange(buildAddr(city,district,e.target.value)); };

      return (
        <div className="space-y-2">
          <div className="grid grid-cols-2 gap-2">
            <select value={city} onChange={e=>handleCity(e.target.value)} className="bg-gray-50 p-2 rounded-lg border border-gray-200 text-sm">
              <option value="">選擇縣市</option>
              {cities.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select value={district} onChange={e=>handleDistrict(e.target.value)} disabled={!city} className="bg-gray-50 p-2 rounded-lg border border-gray-200 text-sm disabled:opacity-50">
              <option value="">選擇鄉鎮區</option>
              {districts.map(d=><option key={d} value={d}>{d}</option>)}

      const getDates = () => {
        const dates = [];

          const d = new Date(today);

            const weekDay = ['日','一','二','三','四','五','六'][d.getDay()];
            dates.push({ label:`${mm}/${dd}（週${weekDay}）`, value:`${d.getFullYear()}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}` });

        }
        return dates;
      };

      const slots = [];

          if (h === 11 && m === 0) continue; // 從 11:30 開始

    // =====================================================

    const Cart = () => {
      const { cart, updateQuantity, clearCart, cartTotal, user, setUser, settings, shippingFee, cvsFee, isFreeShipping, pointsUsed } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [deliveryMethod, setDeliveryMethod] = useState('shipping');
      const [paymentMethod, setPaymentMethod] = useState('transfer');
      const [cvsType, setCvsType] = useState('');
      const [pickupTime, setPickupTime] = useState('');
      const [formData, setFormData] = useState({ name: user?.name||'', phone: user?.phone||'', address: user?.address||'', storeName: '' });
      const [selectedCoupon, setSelectedCoupon] = useState(null);
      const [showTransferModal, setShowTransferModal] = useState(false);
      const [completedOrderId, setCompletedOrderId] = useState('');
      const [copiedBank, setCopiedBank] = useState('');

      const allVirtual = cart.length > 0 && cart.every(i => i.isVirtual);

      // 切換取貨方式時自動設定預設付款方式
      React.useEffect(() => {
        if (allVirtual) { setDeliveryMethod('virtual'); setPaymentMethod('transfer'); return; }
        if (deliveryMethod === 'pickup') setPaymentMethod('store');
        else if (deliveryMethod === 'cvs') setPaymentMethod('cod');
        else setPaymentMethod('transfer'); // 宅配只有轉帳
      }, [deliveryMethod, allVirtual]);

      let discountAmount = selectedCoupon ? selectedCoupon.value : 0;
      // 依取貨方式套用對應運費
      const currentShippingFee = deliveryMethod === 'shipping' ? (isFreeShipping ? 0 : shippingFee)
                                : deliveryMethod === 'cvs' ? (isFreeShipping ? 0 : cvsFee)
                                : 0;
      const total = cartTotal + currentShippingFee - discountAmount;
      const pointsEarned = Math.floor(cartTotal / (settings?.pointRatio || 100));
      const freeShippingDiff = (settings?.freeShippingThreshold || 1000) - cartTotal;
      const availableCoupons = (user?.coupons||[]).filter(c => {
        if (c.usedAt) return false; // 已使用的券不顯示
        const today = new Date().toISOString().split('T')[0];
        return c.expiry >= today && cartTotal >= c.minSpend;
      });

      const copyToClipboard = (text, bankName) => {
        try { navigator.clipboard.writeText(text); } catch(e) { const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
        setCopiedBank(bankName);
        setTimeout(() => setCopiedBank(''), 2000);
      };

      // 宅配地址門牌號碼驗證
      const validateShippingAddress = (addr) => {
        if (!addr) return '請填寫收件地址';
        // 需包含號（幾號）或 F（樓）才算有填門牌
        const hasNumber = /[0-9０-９]+\s*號/.test(addr) || /[0-9]+\s*F/i.test(addr) || /[0-9]+\s*樓/.test(addr);
        if (!hasNumber) return '地址請包含門牌號碼（例：xx路1號 或 xx街10號3樓）';
        return '';
      };

      const handleSubmit = async () => {
        if (cart.length === 0) return;
        if (!user?.phone) { showAlert('請先至會員中心填寫手機號碼'); navigate('/profile'); return; }
        if (!allVirtual) {
          if (deliveryMethod==='cvs' && (!cvsType || !formData.storeName)) { showAlert('請選擇超商並填寫門市名稱'); return; }
          if (deliveryMethod==='shipping') {
            const addrErr = validateShippingAddress(formData.address);
            if (addrErr) { showAlert(addrErr); return; }
          }
        }
        // ── 宅配：提示付款時限 ────────────────────────────
        if (!allVirtual && deliveryMethod === 'shipping') {
          const hrs = settings?.shippingPayDeadlineHours || 2;
          const ok = await showConfirm(
            `⏰ 付款時限提醒\n\n宅配訂單請於 ${hrs} 小時內完成轉帳付款，逾時訂單將自動取消並恢復庫存。\n\n確認送出訂單？`,
            '宅配確認'
          );
          if (!ok) return;
        }
        // ── 店取：提示取貨期限 ────────────────────────────
        if (!allVirtual && deliveryMethod === 'pickup') {
          const days = settings?.pickupPayDeadlineDays || 7;
          const ptLine = pickupTime ? `\n📅 預約取貨：${pickupTime}` : '\n（未填預約時間，建議事先聯繫確認）';
          const ok = await showConfirm(
            `🏪 店面取貨注意事項\n\n⏰ 營業時間\n  週二 ～ 週日\n  11:30 ～ 20:00\n  🚫 週一公休${ptLine}\n\n📅 請於 ${days} 天內完成取貨付款，逾時訂單將自動取消。\n\n確認送出訂單？`,
            '確認取貨資訊'
          );
          if (!ok) return;
        }
        setIsSubmitting(true);
        const orderId = generateOrderId();
        const order = {
          orderId, user: { lineId:user.lineId, name:formData.name||user.name, phone:formData.phone||user.phone,
            address:deliveryMethod==='shipping'?formData.address:(deliveryMethod==='cvs'?`${cvsType} ${formData.storeName}`:`店面取貨`) },
          items:cart, total, pointsUsed, pointsEarned, discount:discountAmount,
          deliveryMethod, paymentMethod,
          shippingFee: currentShippingFee,
          pickupTime: deliveryMethod==='pickup' ? (pickupTime||'') : '',
          status:'Pending', createdAt:new Date().toISOString()
        };
        // ── 第一步：送出訂單到 GAS ──────────────────────────
        let orderRes;
        try {
          orderRes = await api.submitOrder(order);
        } catch(netErr) {
          showAlert('網路連線失敗，請稍後再試'); setIsSubmitting(false); return;
        }
        if (!orderRes || orderRes.error) {
          if (orderRes?.errorType === 'PRODUCT_UNAVAILABLE') showAlert(`⚠️ 商品「${orderRes.itemName}」已下架，請先從購物車移除再結帳`);
          else if (orderRes?.errorType === 'OUT_OF_STOCK') showAlert(`⚠️ ${orderRes.error}`);
          else showAlert('訂單送出失敗：' + (orderRes?.error || '請稍後再試'));
          setIsSubmitting(false); return;
        }

        // ── 第二步：訂單成立後的後置動作（每項獨立 try-catch，失敗不影響主流程）──

        // LIFF 訂單確認通知
        try {
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            const deliveryLabel = deliveryMethod==='pickup' ? '🏪 店面取貨' : deliveryMethod==='cvs' ? `🏬 超商取貨 (${cvsType} ${formData.storeName})` : '🚚 宅配寄送';
            const paymentLabel = paymentMethod==='transfer' ? '轉帳付款' : paymentMethod==='store' ? '門市付款' : '超商取貨付款';
            const shippingText = currentShippingFee === 0 ? '免運費' : `NT$${currentShippingFee}`;
            const addressLine = deliveryMethod==='pickup' ? (settings?.storeAddress||'請至門市取貨') : deliveryMethod==='cvs' ? `${cvsType} ${formData.storeName}` : formData.address;
            const itemLines = cart.map((item, idx) => {
              const vt = item.selectedVariant ? ` [${item.selectedVariant}]` : '';
              if (item.isRedemption) return `  ${idx+1}. 【兌換】${item.name}${vt} x${item.quantity}`;
              return `  ${idx+1}. ${item.name}${vt} x${item.quantity}  NT$${(item.price * item.quantity).toLocaleString()}`;
            }).join('\n');
            const deadlineHrs = settings?.shippingPayDeadlineHours || 2;
            const transferNote = paymentMethod==='transfer'
              ? (deliveryMethod==='shipping'
                ? `\n\n⏰ 請於 ${deadlineHrs} 小時內完成轉帳，逾時訂單自動取消！\n💳 完成後請將截圖傳給客服確認。`
                : '\n\n💳 請完成轉帳後將截圖傳給客服，確認後即安排出貨！')
              : '';
            const pickupNote = (deliveryMethod==='pickup' && pickupTime) ? `\n📅 預約取貨時間：${pickupTime}` : '';
            const msg = [`🛍️ 訂單確認通知`,`━━━━━━━━━━━━━━━`,`訂單編號：${orderId}`,'',`📦 商品明細：`,itemLines,'',`💰 費用明細：`,`  商品小計：NT$${cartTotal.toLocaleString()}`,`  運費：${shippingText}`,`  ─────────────`,`  總金額：NT$${total.toLocaleString()}`,'',`🚀 取貨方式：${deliveryLabel}`,`💳 付款方式：${paymentLabel}`,'',`👤 收件資訊：`,`  姓名：${formData.name||user.name}`,`  電話：${formData.phone||user.phone}`,`  地址：${addressLine}${pickupNote}`,`━━━━━━━━━━━━━━━`,`感謝您的購買！${transferNote}`].join('\n');
            await liff.sendMessages([{ type:'text', text: msg }]);
          }
        } catch(e) { console.warn('LIFF msg failed', e); }

        // ✅ 優惠券標記已使用（前端 state + 後端雙重確保，不用 spread 避免相容性問題）
        if (selectedCoupon && user) {

    const OrderHistory = () => {
      const { user, setUser } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [orders, setOrders] = useState([]);
      const [redemptions, setRedemptions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('orders'); // 'orders' | 'redemptions'
      const [editOrder, setEditOrder] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [editPickupOrder, setEditPickupOrder] = useState(null);
      const [newPickupTime, setNewPickupTime] = useState('');

      useEffect(() => {
        if (!user || user.lineId === 'guest') { setLoading(false); return; }
        Promise.all([
          api.getUserOrders(user.lineId).catch(()=>null),
          api.get('getUserRedemptions', { lineId: user.lineId }).catch(()=>null)
        ]).then(([ordersData, redeemsData]) => {
          if (ordersData && !ordersData.error) setOrders(ordersData);
          if (redeemsData && !redeemsData.error && Array.isArray(redeemsData)) setRedemptions(redeemsData);
          setLoading(false);
        });
      }, [user]);

      const handleCancel = async (order) => {
        if (order.status !== 'Pending') { showAlert('只有「待處理」的訂單才可取消'); return; }
        if (!await showConfirm(`確定要取消訂單 ${order.orderId}？\n取消後無法復原。`, '取消訂單')) return;
        try {
          const res = await api.cancelOrder(order.orderId, user.lineId);
          if (res?.success) {
            showAlert('訂單已取消');
            setOrders(prev => prev.map(o => o.orderId===order.orderId ? {...o, status:'Cancelled'} : o));
          } else { showAlert('取消失敗：' + (res?.error||'請稍後再試')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
      };

      const handleEditOpen = (order) => {
        if (order.status !== 'Pending') { showAlert('只有「待處理」的訂單才可修改'); return; }
        setEditOrder(order);
        const u = order.content?.user || {};
        setEditForm({ name: u.name||'', phone: u.phone||'', address: u.address||'' });
      };

      const handleEditSave = async () => {
        if (!editForm.phone || !editForm.name) { showAlert('姓名與電話為必填'); return; }
        try {
          const res = await api.post('updateOrderContact', {
            orderId: editOrder.orderId,
            lineId: user.lineId,
            contact: editForm
          });
          if (res?.success) {
            showAlert('訂單已更新');
            setOrders(prev => prev.map(o => o.orderId===editOrder.orderId ? {
              ...o,
              content: { ...o.content, user: { ...o.content.user, ...editForm } }
            } : o));
            setEditOrder(null);
          } else { showAlert('更新失敗：' + (res?.error||'請稍後再試')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
      };

      // 修改預約取貨時間
      const handlePickupTimeOpen = (order) => {
        const method = order.deliveryMethod || order.content?.deliveryMethod;
        if (method !== 'pickup') return;
        if (order.status === 'Completed' || order.status === 'Cancelled') { showAlert('此訂單狀態無法修改取貨時間'); return; }
        setEditPickupOrder(order);
        setNewPickupTime(order.content?.pickupTime || order.pickupTime || '');
      };

      const handlePickupTimeSave = async () => {
        try {
          const res = await api.post('updateOrderPickupTime', {
            orderId: editPickupOrder.orderId,
            lineId: user.lineId,
            pickupTime: newPickupTime
          });
          if (res?.success) {
            // 更新本地 state
            setOrders(prev => prev.map(o => o.orderId===editPickupOrder.orderId ? {
              ...o, pickupTime: newPickupTime,
              content: { ...o.content, pickupTime: newPickupTime }
            } : o));
            // LIFF 推播通知商家
            try {
              if (typeof liff !== 'undefined' && liff.isInClient()) {
                const ptText = newPickupTime || '（已清除預約時間）';
                const msg = `📅 取貨時間變更通知\n━━━━━━━━━━━━━━━\n訂單編號：${editPickupOrder.orderId}\n顧客：${user.name}\n電話：${user.phone}\n\n新預約取貨時間：${ptText}\n━━━━━━━━━━━━━━━\n請確認安排，謝謝！`;
                await liff.sendMessages([{ type: 'text', text: msg }]);
              }
            } catch(e) { console.warn('LIFF pickup notify failed', e); }
            showAlert('✅ 取貨時間已更新！');
            setEditPickupOrder(null);
          } else { showAlert('更新失敗：' + (res?.error||'請稍後再試')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          <div className="bg-white p-4 sticky top-0 z-10 shadow-sm flex items-center gap-3">
            <button onClick={() => navigate('/profile')}><Icons.ArrowLeft className="w-6 h-6" /></button>
            <h1 className="font-bold text-lg">訂單紀錄</h1>
          </div>
          {/* Tab 切換 */}
          <div className="sticky top-[57px] z-10 bg-white border-b border-gray-100 px-4 flex gap-1 shadow-sm">
            <button onClick={()=>setActiveTab('orders')}
              className={`flex-1 py-3 text-sm font-bold transition-colors flex items-center justify-center gap-1.5 border-b-2 ${activeTab==='orders'?'border-lime-500 text-lime-600':'border-transparent text-gray-400'}`}>
              📦 一般訂單 <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">{orders.length}</span>
            </button>
            <button onClick={()=>setActiveTab('redemptions')}
              className={`flex-1 py-3 text-sm font-bold transition-colors flex items-center justify-center gap-1.5 border-b-2 ${activeTab==='redemptions'?'border-orange-400 text-orange-600':'border-transparent text-gray-400'}`}>
              🎁 點數兌換 <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">{redemptions.length}</span>
            </button>
          </div>
          {/* 修改收件資訊 Modal */}
          {editOrder && (
            <div className="fixed inset-0 z-[9998] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm overflow-hidden animate-scale-in">
                <div className="p-4 bg-blue-50 text-center">
                  <h3 className="text-lg font-bold text-gray-800">修改收件資訊</h3>

              </div>

              redemptions.length === 0 ? (

              ) : redemptions.map((r, i) => {
                const stMap = { Pending:{label:'審核中',color:'bg-yellow-100 text-yellow-700',icon:'⏳'}, Shipped:{label:'已出貨',color:'bg-blue-100 text-blue-700',icon:'📦'}, Completed:{label:'已完成',color:'bg-green-100 text-green-700',icon:'✅'}, Cancelled:{label:'已取消',color:'bg-red-100 text-red-700',icon:'❌'} };
                const st = stMap[r.status] || {label:r.status,color:'bg-gray-100 text-gray-600',icon:'📋'};

                  <div key={r.redemptionId||i} className="bg-white rounded-2xl shadow-sm border border-orange-100 overflow-hidden">

                        <span className="text-orange-600 font-black text-lg">-{r.content?.points || r.points} 點</span>

                      </div>
                    </div>
                  </div>

              })
             ) :
             orders.length===0 ? (
              <div className="text-center py-16">
                <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><Icons.ClipboardList className="w-10 h-10" /></div>

              </div>
             ) : orders.map(order => {
              const statusInfo = getOrderStatusDisplay(order);
              const items = order.content?.items || order.items || [];
              const u = order.content?.user || {};
              const method = order.deliveryMethod || order.content?.deliveryMethod;
              const ptDisplay = order.content?.pickupTime || order.pickupTime || '';
              const payDeadline = order.content?.payDeadline || order.payDeadline || '';
              const trackingNumber = order.content?.trackingNumber || order.trackingNumber || '';
              const canCancel = order.status==='Pending';
              const canEdit = order.status==='Pending';
              const canEditPickup = method==='pickup' && order.status!=='Completed' && order.status!=='Cancelled';
              // 計算付款截止倒數
              let deadlineDisplay = null;
              if (order.status==='Pending' && payDeadline) {
                const diff = new Date(payDeadline) - new Date();
                if (diff > 0) {
                  const hrs = Math.floor(diff / 3600000);
                  const mins = Math.floor((diff % 3600000) / 60000);
                  deadlineDisplay = hrs > 0 ? `${hrs}小時${mins}分` : `${mins}分鐘`;
                } else {
                  deadlineDisplay = '已逾期';
                }
              }
              return (
                <div key={order.orderId} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="p-4 border-b border-gray-50">
                    <div className="flex justify-between items-start">
                      <div>
                        <div className="font-bold text-gray-700 text-sm">{order.orderId}</div>
                        <div className="text-xs text-gray-400 mt-0.5">{order.date ? new Date(order.date).toLocaleString('zh-TW') : ''}</div>
                      </div>
                      <span className={`px-3 py-1 rounded-full text-xs font-bold ${statusInfo.color}`}>{statusInfo.icon} {statusInfo.label}</span>
                    </div>
                  </div>
                  <div className="p-4 space-y-3">
                    <div className="space-y-2">
                      {(Array.isArray(items)?items:[]).map((item,i) => (
                        <div key={i} className="flex justify-between text-sm">
                          <span className="text-gray-600 line-clamp-1 flex-1">{item.name} {item.selectedVariant ? `(${item.selectedVariant})` : ''} x{item.quantity}</span>
                          <span className="text-gray-800 font-medium ml-2">{item.isRedemption ? `${item.redeemPoints}點` : `NT$${item.price * item.quantity}`}</span>
                        </div>
                      ))}
                    </div>
                    <div className="border-t pt-2 space-y-1 text-xs text-gray-500">
                      <div className="flex justify-between font-bold text-sm text-gray-800"><span>總金額</span><span>NT${order.content?.total || order.total}</span></div>
                      <div>收件人：{u.name} {u.phone}</div>
                      {u.address && <div>地址：{u.address}</div>}
                      {/* 顯示預約取貨時間 */}
                      {method==='pickup' && (
                        <div className={`flex items-center gap-1.5 mt-1 ${ptDisplay ? 'text-amber-700 font-bold' : 'text-gray-400'}`}>
                          📅 {ptDisplay ? `預約取貨：${ptDisplay}` : '未設定預約取貨時間'}
                          {canEditPickup && (
                            <button onClick={() => handlePickupTimeOpen(order)}
                              className="ml-auto text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold border border-amber-200 active:scale-95 transition-transform">
                              修改
                            </button>
                          )}
                        </div>
                      )}
                      {order.content?.pointsEarned > 0 && order.status==='Completed' && (
                        <div className="text-lime-600 font-bold">✅ 已獲得 {order.content.pointsEarned} 點數</div>
                      )}
                      {/* 付款截止提醒（宅配/店取 Pending） */}
                      {deadlineDisplay && (method==='shipping' || method==='pickup') && (
                        <div className={`flex items-center gap-1.5 mt-1 px-2.5 py-1.5 rounded-lg text-xs font-bold ${deadlineDisplay==='已逾期' ? 'bg-red-50 text-red-500 border border-red-100' : 'bg-orange-50 text-orange-600 border border-orange-100'}`}>

                          {deadlineDisplay==='已逾期' ? '已逾期，訂單將取消' : `剩餘 ${deadlineDisplay}`}
                        </div>
                      )}
                      {/* 超商寄件編號 */}
                      {trackingNumber && method==='cvs' && (
                        <div className="flex items-center gap-2 mt-1 px-2.5 py-1.5 bg-blue-50 rounded-lg border border-blue-100">
                          <span className="text-xs font-bold text-blue-700">📦 寄件編號：</span>
                          <span className="text-xs font-mono text-blue-800 font-bold">{trackingNumber}</span>
                        </div>
                      )}
                    </div>
                    {(canCancel || canEdit) && (
                      <div className="flex gap-2 pt-1">
                        {canEdit && (
                          <button onClick={() => handleEditOpen(order)}
                            className="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl border border-blue-200 text-blue-600 font-bold text-sm bg-blue-50 active:scale-95 transition-transform">
                            <Icons.Edit className="w-4 h-4" /> 修改資訊

                        )}
                        {canCancel && (
                          <button onClick={() => handleCancel(order)}
                            className="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl border border-red-200 text-red-500 font-bold text-sm bg-red-50 active:scale-95 transition-transform">
                            <Icons.XCircle className="w-4 h-4" /> 取消訂單
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
             })}

          <BottomNav active="profile" />

      );

    // =====================================================
    // 頁面：會員中心
    // =====================================================
    const Profile = () => {
      const { user, updateUserProfile, setUser, cart } = useAppContext();
      const { showAlert } = useDialog();
      const navigate = useNavigate();
      const [isEditing, setIsEditing] = useState(false);
      const [formData, setFormData] = useState({});
      const [isLotterySpinning, setIsLotterySpinning] = useState(false);
      const [showDrawer, setShowDrawer] = useState(false);
      useEffect(() => { if (user) setFormData(user); }, [user]);
      const handleSave = async () => {
        if (!formData.phone || formData.phone.length!==10 || !formData.phone.startsWith('09')) { showAlert('請輸入正確的 10 碼手機號碼 (09開頭)'); return; }
        if (!formData.birthday) { showAlert('請輸入生日'); return; }
        await updateUserProfile(formData);
        setIsEditing(false);
        showAlert('會員資料已更新');
      };
      const handleDailyLottery = async () => {
        if (!user) return;
        if (!user.phone || !user.birthday) { showAlert('請先加入會員 (填寫手機與生日) 才能參加每日好運！'); setIsEditing(true); return; }
        setIsLotterySpinning(true);
        try {
          // ✅ 根本修復：每次抽獎前先從 DB 重新拉取最新資料，不信任本地 state
          const freshUser = await api.getUserProfile(user.lineId);
          const todayTW = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
          const lastDrawDay = freshUser?.lastDrawDate ? String(freshUser.lastDrawDate).substring(0, 10) : '';
          if (lastDrawDay === todayTW) {
            showAlert('今天已經抽過囉！明天再來 😊');
            // 同步本地 state
            setUser(prev => ({ ...prev, lastDrawDate: todayTW }));
            return;
          }
          const res = await api.post('drawDailyCoupon', { lineId: user.lineId });
          if (res?.success) {
            const blessings = [
              '願今日萬事皆順，好運連連 🌟',
              '福氣滿滿，心想事成 ✨',
              '今天是個好日子，祝您幸福美滿 🍀',
              '好運降臨，喜悅滿懷 🌈',
              '願您諸事順遂，笑口常開 😊',
              '今日好運報到，一切如願 🎋',
              '祝福滿溢，平安喜樂 🕊️',
            ];
            const blessing = blessings[Math.floor(Math.random() * blessings.length)];
            showAlert(`🎉 恭喜獲得 ${res.coupon.title}！\n(滿 NT$${res.coupon.minSpend} 可用)\n\n${blessing}`);
            setUser(prev => ({ ...prev, coupons: [...(prev.coupons||[]), res.coupon], lastDrawDate: todayTW }));
          } else { showAlert(res?.error || '抽獎失敗'); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
        finally { setIsLotterySpinning(false); }
      };
      if (!user) return null;
      const isAdmin = ADMIN_IDS.includes(user.lineId);
      const needsRegistration = !user.phone || !user.birthday;
      // ✅ 修復：統一用台北時區的今日日期字串比較，避免重開後能再抽
      const todayTW = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
      // lastDrawDate 可能是完整 ISO 字串，擷取前10碼（YYYY-MM-DD）再比對
      const lastDrawDay = user.lastDrawDate ? String(user.lastDrawDate).substring(0, 10) : '';
      const canDraw = lastDrawDay !== todayTW;
      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          {/* 側拉選單 */}
          {showDrawer && (
            <div className="fixed inset-0 z-50 flex">
              <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowDrawer(false)} />

                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 bg-white rounded-full flex items-center justify-center text-lime-600"><Icons.Zap size={16} fill="currentColor" /></div>
                      <span className="text-white font-black text-sm">美好的事</span>
                    </div>
                    <button onClick={() => setShowDrawer(false)} className="text-white/80 p-1"><Icons.X className="w-5 h-5" /></button>
                  </div>
                  {user && (
                    <div className="flex items-center gap-3">
                      <img src={user.pictureUrl||'https://via.placeholder.com/40'} className="w-10 h-10 rounded-full border-2 border-white/30" referrerPolicy="no-referrer" />
                      <div>
                        <div className="text-white font-bold text-sm">{user.name}</div>
                        <div className="text-lime-200 text-xs">{user.points||0} 點</div>
                      </div>
                    </div>
                  )}
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-1">
                  <p className="text-xs text-gray-400 font-bold uppercase tracking-wider px-3 pb-2">購物功能</p>
                  {[
                    { icon:Icons.Home, label:'首頁', desc:'逛商品', color:'text-lime-600 bg-lime-50', action:()=>{ navigate('/'); setShowDrawer(false); } },
                    { icon:Icons.ClipboardList, label:'訂單紀錄', desc:'查看歷史訂單', color:'text-blue-500 bg-blue-50', action:()=>{ navigate('/orders'); setShowDrawer(false); } },
                    { icon:Icons.Gift, label:'點數兌換', desc:`持有 ${user?.points||0} 點`, color:'text-orange-500 bg-orange-50', action:()=>{ navigate('/redeem'); setShowDrawer(false); } },
                    { icon:Icons.Tag, label:'喜樂優惠券', desc:'專屬喜樂折扣', color:'text-rose-500 bg-rose-50', action:()=>{ navigate('/campaigns'); setShowDrawer(false); } },
                    { icon:Icons.ShoppingBag, label:'購物說明', desc:'付款·取貨·退換', color:'text-purple-500 bg-purple-50', action:()=>{ navigate('/instructions'); setShowDrawer(false); } },
                    { icon:Icons.ShoppingCart, label:'購物車', desc:`${cart?.reduce((a,c)=>a+c.quantity,0)||0} 件商品`, color:'text-pink-500 bg-pink-50', action:()=>{ navigate('/cart'); setShowDrawer(false); } },

                    <button key={i} onClick={item.action} className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 active:bg-gray-100 transition-colors">
                      <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 ${item.color}`}><item.icon className="w-5 h-5" /></div>
                      <div className="flex-1 text-left">
                        <div className="font-medium text-gray-700 text-sm">{item.label}</div>
                        <div className="text-xs text-gray-400">{item.desc}</div>
                      </div>
                      <Icons.ArrowLeft className="w-4 h-4 text-gray-300 rotate-180 ml-auto" />
                    </button>
                  ))}
                  <div className="border-t border-gray-100 my-2 pt-2">
                    <button onClick={() => {
                      setShowDrawer(false);
                      const lineOaId = '705jtuuh';
                      if (typeof liff !== 'undefined' && liff.isInClient()) { liff.openWindow({ url:`https://line.me/R/ti/p/@${lineOaId}`, external:true }); }
                      else { window.open(`https://line.me/R/ti/p/@${lineOaId}`, '_blank'); }
                    }} className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center text-green-600 bg-green-50 flex-shrink-0"><Icons.HelpCircle className="w-5 h-5" /></div>
                      <div className="flex-1 text-left">
                        <div className="font-medium text-gray-700 text-sm">聯絡客服</div>
                        <div className="text-xs text-gray-400">LINE 即時諮詢</div>
                      </div>
                      <Icons.ArrowLeft className="w-4 h-4 text-gray-300 rotate-180 ml-auto" />
                    </button>
                  </div>

                          <div className="font-medium text-purple-700 font-bold text-sm">管理員後台</div>
                          <div className="text-xs text-purple-400">訂單·商品·設定</div>
                        </div>
                        <Icons.ArrowLeft className="w-4 h-4 text-purple-300 rotate-180 ml-auto" />
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
          <div className="bg-lime-600 p-8 pb-16 rounded-b-[3rem] shadow-lg relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10"></div>
            <div className="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full -ml-10 -mb-10"></div>
            <div className="flex items-center gap-3 relative z-10">
              {/* 三條線選單按鈕 - 頭像左側 */}
              <button onClick={() => setShowDrawer(true)} className="p-2 rounded-xl bg-white/20 text-white flex-shrink-0">
                <Icons.Menu className="w-5 h-5" />

              <img src={user.pictureUrl||'https://via.placeholder.com/150'} className="w-16 h-16 rounded-full border-4 border-white/30 shadow-md flex-shrink-0" referrerPolicy="no-referrer" />
              <div className="text-white min-w-0">
                <h2 className="text-xl font-bold truncate">{user.name}</h2>
                <div className="text-lime-100 text-sm mt-1">{needsRegistration ? '尚未成為正式會員' : '正式會員'}</div>
              </div>
            </div>
          </div>
          <div className="px-4 -mt-10 relative z-20 space-y-4">
            <div className="flex gap-4">
              <div className="flex-1 flex flex-col gap-2">
                <button onClick={handleDailyLottery} disabled={!canDraw||isLotterySpinning}
                  className={`flex-1 p-2 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-1 ${canDraw?'bg-gradient-to-br from-yellow-100 to-orange-100 text-orange-600 active:scale-95':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                  <Icons.Gift className={`w-6 h-6 ${isLotterySpinning?'animate-spin':''}`} />

                </div>
                <div className="text-3xl font-bold text-gray-800">{user.points||0} <span className="text-sm text-gray-400 font-normal">pts</span></div>
              </div>
            </div>
            {/* 管理員入口 — 在優惠券上方顯示 */}
            {isAdmin && (
              <div className="bg-gradient-to-r from-purple-600 to-purple-700 p-4 rounded-2xl shadow-md flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="bg-white/20 p-2 rounded-full"><Icons.ShieldCheck className="w-5 h-5 text-white" /></div>
                  <div><div className="font-bold text-white">管理員後台</div><div className="text-xs text-purple-200">訂單、會員、設定管理</div></div>
                </div>
                <button onClick={() => navigate('/admin')} className="bg-white text-purple-700 px-4 py-2 rounded-xl text-sm font-bold shadow active:scale-95 transition-transform">進入</button>
              </div>
            )}
            {/* 我的優惠券 */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-gray-800 flex items-center gap-2"><Icons.CreditCard className="w-5 h-5 text-lime-600" />我的優惠券</h3>
                <button onClick={() => navigate('/my-coupons')} className="text-xs text-lime-600 font-bold flex items-center gap-1">查看全部 <Icons.ArrowLeft className="w-3 h-3 rotate-180" /></button>
              </div>
              {(() => {
                const today = new Date().toISOString().split('T')[0];
                const activeCoupons = (user.coupons||[]).filter(c => !c.usedAt && c.expiry >= today);
                return activeCoupons.length === 0
                  ? <div className="text-center text-gray-400 text-sm py-4">目前沒有可用優惠券<br/><button onClick={()=>navigate('/campaigns')} className="text-rose-500 font-bold mt-1 text-sm app-scalable">前往領取喜樂優惠券 →</button></div>
                  : <div className="space-y-2 max-h-40 overflow-y-auto no-scrollbar">
                    {activeCoupons.slice(0,3).map((coupon,idx) => (
                      <div key={idx} className="bg-orange-50 border border-orange-100 p-3 rounded-xl flex justify-between items-center">

                        <div className="text-xs text-gray-400">效期: {coupon.expiry}</div>

                    ))}

            </div>
            {/* 快速功能入口 */}
            <div className="grid grid-cols-3 gap-3">
              {[
                {e:'📋',l:'訂單紀錄',a:()=>navigate('/orders')},
                {e:'🎟️',l:'我的優惠券',a:()=>navigate('/my-coupons')},
                {e:'🎁',l:'點數兌換',a:()=>navigate('/redeem')},
                {e:'🏷️',l:'喜樂優惠',a:()=>navigate('/campaigns')},
                {e:'🔍',l:'商品搜尋',a:()=>navigate('/?search=1')},
                {e:'🛍️',l:'購買說明',a:()=>navigate('/instructions')},
                {e:'💬',l:'聯絡客服',a:()=>{const id='705jtuuh';if(typeof liff!=='undefined'&&liff.isInClient())liff.openWindow({url:`https://line.me/R/ti/p/@${id}`,external:true});else window.open(`https://line.me/R/ti/p/@${id}`,'_blank');}},
                {e:'🔗',l:'分享商店',a:()=>{const url=window.location.href.split('#')[0];if(typeof liff!=='undefined'&&liff.isInClient()&&liff.isApiAvailable('shareTargetPicker')){liff.shareTargetPicker([{type:'text',text:`✨ 推薦你來逛逛！\n${url}`}]);}else{try{navigator.share({title:'推薦好店',url});}catch(e){navigator.clipboard?.writeText(url);showAlert('連結已複製！');}}  }},
                {e:'⭐',l:'我的評價',a:()=>navigate('/reviews')},
              ].map((item,i)=>(
                <button key={i} onClick={item.a}
                  className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center gap-1.5 active:scale-95 transition-transform">
                  <span className="text-2xl">{item.e}</span>
                  <span className="text-sm font-bold text-gray-700 leading-tight text-center app-scalable">{item.l}</span>
                </button>
              ))}
            </div>

            {/* 會員資料區 */}
            {(needsRegistration||isEditing) ? (
              <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-lime-100">
                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><Icons.User className="w-5 h-5 text-lime-600" />{needsRegistration?'加入會員 (領取生日禮)':'編輯資料'}</h3>
                <div className="space-y-3">
                  <div><label className="text-xs text-gray-500 block mb-1">手機號碼</label><input type="tel" value={formData.phone||''} onChange={e=>setFormData({...formData,phone:e.target.value})} className="w-full p-2 border rounded-lg bg-gray-50" placeholder="0912345678" maxLength="10" /></div>
                  <div><label className="text-xs text-gray-500 block mb-1">性別</label>
                    <div className="flex gap-4">
                      {['male','female'].map(g => <label key={g} className="flex items-center gap-2"><input type="radio" name="gender" value={g} checked={formData.gender===g} onChange={e=>setFormData({...formData,gender:e.target.value})} /><span className="text-sm">{g==='male'?'男':'女'}</span></label>)}
                    </div>
                  </div>
                  <div><label className="text-xs text-gray-500 block mb-1">生日 <span className="text-red-400 font-bold">*</span></label>
                    {user.birthday && !needsRegistration
                      ? <div className="w-full p-2 border rounded-lg bg-gray-100 text-gray-500 text-sm flex items-center gap-2">🎂 {user.birthday} <span className="text-xs text-gray-400 ml-auto">（已鎖定，不可修改）</span></div>
                      : <>
                          {needsRegistration && (
                            <div className="mb-2 bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2">
                              <span className="text-amber-500 text-base flex-shrink-0">⚠️</span>
                              <div>
                                <div className="text-xs font-bold text-amber-700">生日填寫後不可修改</div>
                                <div className="text-xs text-amber-600 mt-0.5">請確認填寫正確，生日當月可領取專屬生日禮優惠券！</div>
                              </div>
                            </div>
                          )}
                          <input type="date" value={formData.birthday||''} onChange={e=>setFormData({...formData,birthday:e.target.value})} className="w-full p-2 border rounded-lg bg-gray-50" />
                          {!needsRegistration && <p className="text-xs text-lime-600 mt-1">⚠️ 生日填寫後不可修改，請確認後再儲存</p>}
                        </>
                    }
                  </div>
                  <div>
                    <label className="text-xs text-gray-500 block mb-1">常用收件地址 <span className="text-gray-400">（選填，宅配時自動帶入）</span></label>
                    <TaiwanAddressSelector value={formData.address||''} onChange={addr=>setFormData({...formData,address:addr})} />
                  </div>
                  <button onClick={handleSave} className="w-full bg-lime-600 text-white py-2 rounded-lg font-bold shadow-md mt-2">確認送出</button>
                  {isEditing && !needsRegistration && <button onClick={() => setIsEditing(false)} className="w-full text-gray-400 text-sm mt-2">取消</button>}
                </div>
              </div>
            ) : (
              <div className="bg-white p-4 rounded-2xl shadow-sm">
                <div className="flex justify-between items-start">
                  <div className="flex-1">
                    <div className="text-sm text-gray-500 mb-0.5">手機</div>
                    <div className="font-bold text-gray-800">{user.phone}</div>
                    {user.address && <div className="text-xs text-gray-400 mt-1 truncate">📍 {user.address}</div>}

                  <button onClick={() => setIsEditing(true)} className="text-gray-400 p-2 flex-shrink-0"><Icons.Settings2 className="w-5 h-5" /></button>
                </div>

            {/* 許願池 */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><Icons.Gift className="w-5 h-5 text-lime-600" />許願池</h3>
              <textarea placeholder="想要什麼商品？或是對我們有什麼建議？" value={formData.wishlist||user.wishlist||''} onChange={e=>setFormData({...formData,wishlist:e.target.value})} onBlur={() => updateUserProfile({...user,wishlist:formData.wishlist||user.wishlist})} className="w-full p-3 border rounded-xl bg-gray-50 text-sm min-h-[100px]" />
              <div className="text-right mt-2">
                <button onClick={async () => {
                  const wishText = (formData.wishlist||user.wishlist||'').trim();
                  if (!wishText) { showAlert('請先輸入許願內容'); return; }
                  await updateUserProfile({...user, wishlist: wishText});
                  // 透過 LIFF 傳送訊息到 LINE 官方帳號對話
                  const msg = `我要許願：「${wishText}」`;
                  if (typeof liff !== 'undefined' && liff.isInClient() && liff.isApiAvailable('sendMessages')) {
                    try {
                      await liff.sendMessages([{ type: 'text', text: msg }]);
                      showAlert('✨ 許願已送出！\n訊息已傳送到 LINE 對話 💌');
                    } catch(e) {
                      showAlert('許願已儲存！（LINE 訊息傳送失敗：' + e.message + '）');
                    }
                  } else {
                    showAlert('許願已儲存！（請在 LINE 中開啟以傳送訊息）');
                  }
                }} className="bg-lime-100 text-lime-700 px-4 py-1.5 rounded-full text-xs font-bold">送出許願 💌</button>
              </div>
            </div>
          </div>
          <BottomNav active="profile" />
