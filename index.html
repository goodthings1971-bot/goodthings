    const MyCoupons = () => {
      const { user } = useAppContext();
      const navigate = useNavigate();
      const [tab, setTab] = useState('active');
      const today = new Date().toISOString().split('T')[0];
      const allCoupons = user?.coupons || [];
      const active  = allCoupons.filter(c => !c.usedAt && c.expiry >= today);
      const used    = allCoupons.filter(c => c.usedAt);
      const expired = allCoupons.filter(c => !c.usedAt && c.expiry < today);

      const typeColor = (c) => {
        if (c.type==='daily') return 'bg-yellow-50 border-yellow-200 text-yellow-700';
        if (c.type==='campaign') return 'bg-rose-50 border-rose-200 text-rose-700';
        return 'bg-blue-50 border-blue-200 text-blue-700';
      };
      const typeLabel = (c) => {
        if (c.type==='daily') return '每日好運';
        if (c.type==='campaign') return '活動券';
        return '生日禮';
      };

      const CouponCard = ({ c, dim }) => (
        <div className={`border rounded-2xl overflow-hidden ${dim?'opacity-50':''}`}>
          <div className={`p-3 border-b ${typeColor(c)}`}>
            <div className="flex items-center justify-between">
              <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-white/60">{typeLabel(c)}</span>
              {c.usedAt && <span className="text-xs font-bold text-gray-500">✅ 已使用 {c.usedAt}</span>}
              {!c.usedAt && c.expiry < today && <span className="text-xs font-bold text-gray-500">⏰ 已過期</span>}
            </div>
            <div className="font-black text-lg mt-1">{c.title}</div>
          </div>
          <div className="bg-white p-3 flex justify-between text-xs text-gray-500">
            <div>最低消費 NT${c.minSpend}</div>
            <div>效期：{c.expiry}</div>
          </div>
          {c.usedOrderId && <div className="bg-gray-50 px-3 py-1.5 text-xs text-gray-400 border-t">使用於訂單：{c.usedOrderId}</div>}
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          <div className="bg-lime-600 text-white p-4 sticky top-0 z-10 shadow-md">
            <div className="flex items-center gap-3 mb-3">
              <button onClick={() => navigate('/profile')}><Icons.ArrowLeft className="w-6 h-6" /></button>
              <h1 className="text-lg font-bold">我的優惠券</h1>
            </div>
            <div className="flex gap-2">
              {[{id:'active',label:`可使用 (${active.length})`},{id:'used',label:`已使用 (${used.length})`},{id:'expired',label:`已過期 (${expired.length})`}].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-bold ${tab===t.id?'bg-white text-lime-600':'bg-lime-700/60 text-lime-100'}`}>{t.label}</button>
              ))}
            </div>
          </div>
          <div className="p-4 space-y-3">
            {tab==='active' && (active.length===0
              ? <div className="text-center py-16 text-gray-400">
                  <div className="text-5xl mb-3">🎟️</div>
                  <div className="font-bold">沒有可用的優惠券</div>
                  <button onClick={()=>navigate('/campaigns')} className="mt-3 text-rose-500 font-bold text-base app-scalable">前往領取喜樂優惠券 →</button>
                </div>
              : active.map((c,i)=><CouponCard key={i} c={c} dim={false} />)
            )}
            {tab==='used' && (used.length===0
              ? <div className="text-center py-16 text-gray-400"><div className="text-5xl mb-3">📭</div><div className="font-bold">尚未使用過優惠券</div></div>
              : used.map((c,i)=><CouponCard key={i} c={c} dim={true} />)
            )}
            {tab==='expired' && (expired.length===0
              ? <div className="text-center py-16 text-gray-400"><div className="text-5xl mb-3">⏰</div><div className="font-bold">沒有過期的優惠券</div></div>
              : expired.map((c,i)=><CouponCard key={i} c={c} dim={true} />)
            )}
          </div>
          <BottomNav active="profile" />
        </div>
      );
    };

    // =====================================================
    // 頁面：活動優惠券領取
    // =====================================================
    const Campaigns = () => {
      const { user, setUser } = useAppContext();
      const { showAlert } = useDialog();
      const navigate = useNavigate();
      const [campaigns, setCampaigns] = useState([]);
      const [loading, setLoading] = useState(true);
      const [claiming, setClaiming] = useState('');

      useEffect(() => {
        api.get('getCampaigns').then(data => {
          if (Array.isArray(data)) {
            const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
            setCampaigns(data.filter(c => {
              const start = c['開始日期'] ? String(c['開始日期']).substring(0,10) : '';
              const end = c['結束日期'] ? String(c['結束日期']).substring(0,10) : '';
              if (start && today < start) return false;
              if (end && today > end) return false;
              if (Number(c['剩餘數量']) <= 0) return false;
              return true;
            }));
          }
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const handleClaim = async (campName) => {
        if (!user || user.lineId === 'guest') { showAlert('請先登入 LINE 才能領取優惠券'); return; }
        setClaiming(campName);
        try {
          const res = await api.post('claimCampaignCoupon', { lineId: user.lineId, campaignName: campName });
          if (res?.success) {
            showAlert(`🎉 成功領取「${campName}」優惠券！\n已存入您的優惠券包`);
            setUser(prev => ({ ...prev, coupons: [...(prev?.coupons||[]), res.coupon] }));
            setCampaigns(prev => prev.map(c => c['活動名稱'] === campName ? { ...c, '剩餘數量': Number(c['剩餘數量']) - 1 } : c));
          } else {
            showAlert(res?.error || '領取失敗');
          }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
        finally { setClaiming(''); }
      };

      const isAlreadyClaimed = (campName) => {
        return (user?.coupons || []).some(c => c.campaignId === campName);
      };

      const getDiscountLabel = (camp) => {
        const type = camp['折扣類型'];
        const val = Number(camp['折扣值']);
        const min = Number(camp['最低消費']) || 0;
        if (type === 'discount') {
          const pct = Math.round(val * 100);
          return { main: `打 ${pct} 折`, sub: min > 0 ? `消費滿 NT$${min} 適用` : '全品項適用' };
        } else {
          return { main: `折 NT$${val}`, sub: min > 0 ? `消費滿 NT$${min} 可折抵` : '全品項適用' };
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans">
          <div className="bg-gradient-to-br from-rose-500 to-orange-400 text-white p-6 pb-12 rounded-b-[3rem] shadow-lg relative overflow-hidden">
            <div className="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-10 -mt-10"></div>
            <div className="absolute bottom-0 left-0 w-28 h-28 bg-white/10 rounded-full -ml-10 mb-0"></div>
            <div className="flex items-center gap-3 relative z-10">
              <button onClick={() => navigate(-1)} className="p-2 rounded-xl bg-white/20"><Icons.ArrowLeft className="w-5 h-5" /></button>
              <div>
                <h1 className="text-2xl font-black">🎟 喜樂優惠券</h1>
                <p className="text-rose-100 text-sm mt-0.5">限時領取，數量有限</p>
              </div>
            </div>
            {user && (
              <div className="mt-4 bg-white/20 rounded-2xl p-3 flex items-center gap-3 relative z-10">
                <img src={user.pictureUrl||'https://via.placeholder.com/32'} className="w-9 h-9 rounded-full border-2 border-white/40" referrerPolicy="no-referrer" />
                <div>
                  <div className="text-white font-bold text-sm">{user.name}</div>
                  <div className="text-rose-100 text-xs">已持有 {(user.coupons||[]).filter(c=>c.type==='campaign').length} 張喜樂優惠券</div>
                </div>
              </div>
            )}
          </div>

          <div className="px-4 -mt-6 relative z-10 space-y-4 pb-6">
            {loading ? (
              <div className="text-center py-16">
                <div className="w-10 h-10 border-4 border-rose-200 border-t-rose-500 rounded-full animate-spin mx-auto"></div>
              </div>
            ) : campaigns.length === 0 ? (
              <div className="text-center py-16 bg-white rounded-2xl shadow-sm">
                <div className="text-5xl mb-4">🎟️</div>
                <p className="text-gray-500 font-bold">目前沒有進行中的活動</p>
                <p className="text-gray-400 text-sm mt-1">請期待下次活動！</p>
              </div>
            ) : (
              campaigns.map((camp, i) => {
                const discountInfo = getDiscountLabel(camp);
                const claimed = isAlreadyClaimed(camp['活動名稱']);
                const remaining = Number(camp['剩餘數量']);
                const total = Number(camp['總數量']) || 1;
                const pct = Math.min(100, Math.round((remaining / total) * 100));
                const endDate = camp['結束日期'] ? String(camp['結束日期']).substring(0,10) : '';
                const applicable = String(camp['適用商品'] || 'ALL').trim();
                const applicableLabel = applicable === 'ALL' ? '全品項(含兌換)' : applicable === 'NOALL' ? '全品項(不含兌換)' : `指定商品`;

                return (
                  <div key={i} className={`bg-white rounded-2xl shadow-sm overflow-hidden border-2 transition-all ${claimed ? 'border-gray-200 opacity-70' : 'border-rose-100'}`}>
                    {/* 頂部色帶 */}
                    <div className={`h-1.5 ${claimed ? 'bg-gray-200' : pct > 50 ? 'bg-rose-400' : pct > 20 ? 'bg-orange-400' : 'bg-red-500'}`}
                      style={{ width: `${pct}%`, transition: 'width 0.5s ease' }}></div>
                    <div className="p-5">
                      <div className="flex items-start justify-between mb-3">
                        <div className="flex-1">
                          <h3 className="font-black text-gray-800 text-lg">{camp['活動名稱']}</h3>
                          {camp['活動說明'] && <p className="text-gray-500 text-xs mt-0.5">{camp['活動說明']}</p>}
                        </div>
                        <div className={`text-center px-3 py-2 rounded-xl ml-3 flex-shrink-0 ${claimed ? 'bg-gray-100' : 'bg-rose-50'}`}>
                          <div className={`text-xl font-black ${claimed ? 'text-gray-400' : 'text-rose-600'}`}>{discountInfo.main}</div>
                          <div className="text-xs text-gray-400">優惠</div>
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-2 text-xs text-gray-500 mb-4">
                        <div className="bg-gray-50 rounded-lg p-2"><span className="text-gray-400">條件</span><div className="font-bold text-gray-700 mt-0.5">{discountInfo.sub}</div></div>
                        <div className="bg-gray-50 rounded-lg p-2"><span className="text-gray-400">適用</span><div className="font-bold text-gray-700 mt-0.5">{applicableLabel}</div></div>
                        {endDate && <div className="bg-gray-50 rounded-lg p-2"><span className="text-gray-400">截止</span><div className="font-bold text-gray-700 mt-0.5">{endDate}</div></div>}
                        <div className={`rounded-lg p-2 ${remaining < 10 ? 'bg-red-50' : 'bg-gray-50'}`}>
                          <span className="text-gray-400">剩餘</span>
                          <div className={`font-bold mt-0.5 ${remaining < 10 ? 'text-red-600' : 'text-gray-700'}`}>{remaining} 張{remaining < 10 ? ' ⚡快搶' : ''}</div>
                        </div>
                      </div>
                      <button
                        onClick={() => handleClaim(camp['活動名稱'])}
                        disabled={claimed || claiming === camp['活動名稱']}
                        className={`w-full py-3 rounded-xl font-black text-sm transition-all ${
                          claimed ? 'bg-gray-100 text-gray-400 cursor-not-allowed'
                          : claiming === camp['活動名稱'] ? 'bg-rose-300 text-white'
                          : 'bg-gradient-to-r from-rose-500 to-orange-400 text-white shadow-lg shadow-rose-200 active:scale-95'
                        }`}>
                        {claimed ? '✅ 已領取' : claiming === camp['活動名稱'] ? '領取中...' : '🎁 立即領取'}
                      </button>
                    </div>
                  </div>
                );
              })
            )}
          </div>
          <BottomNav active="profile" />
        </div>
      );
    };

    // =====================================================
    // =====================================================
    // 頁面：我的評價
    // =====================================================
    const MyReviews = () => {
      const { user } = useAppContext();
      const { showAlert } = useDialog();
      const navigate = useNavigate();
      const [orders, setOrders] = useState([]);
      const [reviewMap, setReviewMap] = useState({});
      const [loading, setLoading] = useState(true);
      const [submitting, setSubmitting] = useState('');

      useEffect(() => {
        if (!user || user.lineId === 'guest') { setLoading(false); return; }
        Promise.all([
          api.getUserOrders(user.lineId),
          api.get('getUserReviews', { lineId: user.lineId })
        ]).then(([o, r]) => {
          if (o && !o.error) setOrders(o.filter(ord => ord.status === 'Completed'));
          if (Array.isArray(r)) {
            const map = {};
            r.forEach(rv => { map[rv.key] = rv; });
            setReviewMap(map);
          }
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [user?.lineId]);

      const handleSubmit = async (key, orderId, itemId, itemName, rating, comment) => {
        if (!rating) { showAlert('請先選擇星級評分'); return; }
        setSubmitting(key);
        try {
          const r = await api.post('submitReview', { lineId:user.lineId, userName:user.name, orderId, itemId:String(itemId||itemName), itemName, rating, comment });
          if (r?.success) {
            setReviewMap(prev => Object.assign({}, prev, { [key]: { rating, comment, submittedAt: new Date().toISOString().split('T')[0] } }));
            showAlert('✅ 謝謝您的評價！');
          } else showAlert('評價失敗：' + (r?.error||''));
        } catch(e) { showAlert('送出失敗，請稍後再試'); }
        setSubmitting('');
      };

      // 每個商品的評價卡片（獨立元件，才能有自己的 state）
      const ReviewCard = ({ order, item }) => {
        const itemId = String(item.id || item.name);
        const key = order.orderId + '_' + itemId;
        const existing = reviewMap[key];
        const [rating, setRating] = useState(0);
        const [comment, setComment] = useState('');
        const isMe = submitting === key;
        return (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="px-4 pt-4 pb-3 border-b border-gray-50">
              <div className="font-bold text-gray-800 text-sm">{item.name}{item.selectedVariant ? ` · ${item.selectedVariant}` : ''}</div>
              <div className="text-xs text-gray-400 mt-0.5">訂單 {order.orderId} · {order.date ? new Date(order.date).toLocaleDateString('zh-TW') : ''}</div>
            </div>
            {existing ? (
              <div className="p-4">
                <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 space-y-1">
                  <div className="flex items-center gap-2">
                    <div className="flex">{[1,2,3,4,5].map(s=><span key={s} className={`text-xl leading-none ${s<=existing.rating?'text-yellow-400':'text-gray-200'}`}>★</span>)}</div>
                    <span className="text-xs text-gray-400">{existing.submittedAt}</span>
                  </div>
                  {existing.comment && <div className="text-sm text-gray-600">{existing.comment}</div>}
                  <div className="text-xs text-green-600 font-bold">✅ 已評價</div>
                </div>
              </div>
            ) : (
              <div className="p-4 space-y-3">
                <div>
                  <div className="text-xs text-gray-500 mb-1.5">評分</div>
                  <div className="flex gap-2">
                    {[1,2,3,4,5].map(s => (
                      <button key={s} onClick={()=>setRating(s)}
                        className={`text-3xl leading-none transition-transform active:scale-90 ${s<=rating?'text-yellow-400':'text-gray-200'}`}>★</button>
                    ))}
                  </div>
                </div>
                <textarea value={comment} onChange={e=>setComment(e.target.value)}
                  placeholder="分享使用心得（選填）..."
                  className="w-full p-3 border border-gray-200 rounded-xl text-sm bg-gray-50 min-h-[72px] resize-none" />
                <button onClick={()=>handleSubmit(key,order.orderId,item.id||item.name,item.name,rating,comment)}
                  disabled={!rating||isMe}
                  className="w-full py-2.5 bg-lime-600 text-white rounded-xl font-bold text-sm active:scale-95 transition-transform disabled:opacity-40">
                  {isMe ? '送出中...' : '送出評價'}
                </button>
              </div>
            )}
          </div>
        );
      };

      const items = orders.flatMap(order =>
        (order.content?.items||order.items||[]).filter(i=>!i.isRedemption).map(item=>({order,item}))
      );

      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          <div className="bg-gradient-to-r from-yellow-400 to-orange-400 text-white p-4 sticky top-0 z-10 shadow-md">
            <div className="flex items-center gap-3">
              <button onClick={()=>navigate('/profile')} className="p-1"><Icons.ArrowLeft className="w-6 h-6" /></button>
              <h1 className="text-lg font-black flex-1">我的評價</h1>
              <span className="text-yellow-100 text-sm">{items.filter(({order,item})=>!reviewMap[order.orderId+'_'+String(item.id||item.name)]).length} 件待評</span>
            </div>
          </div>
          <div className="p-4 space-y-3">
            {loading ? <div className="text-center py-16 text-gray-400">載入中...</div>
              : items.length === 0 ? (
                <div className="text-center py-16 text-gray-400">
                  <div className="text-5xl mb-3">⭐</div>
                  <div className="font-bold">尚無可評價的商品</div>
                  <div className="text-sm mt-1">完成訂單後即可評價</div>
                </div>
              ) : items.map(({order,item},idx) => <ReviewCard key={idx} order={order} item={item} />)
            }
          </div>
          <BottomNav active="profile" />
        </div>
      );
    };

    // =====================================================
    // App Root
    // =====================================================
    const App = () => {
      // ✅ 電腦版偵測：非手機且非 LIFF 環境顯示提示頁
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      const isLiffClient = typeof liff !== 'undefined' && (() => { try { return liff.isInClient(); } catch(e) { return false; } })();
      if (!isMobile && !isLiffClient) {
        return (
          <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#4ade80 0%,#22c55e 50%,#16a34a 100%)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'system-ui,sans-serif',padding:'24px'}}>
            <div style={{background:'white',borderRadius:'24px',padding:'40px 32px',maxWidth:'420px',width:'100%',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
              <div style={{fontSize:'64px',marginBottom:'16px'}}>📱</div>
              <h1 style={{fontSize:'22px',fontWeight:'900',color:'#166534',marginBottom:'8px'}}>請使用手機 LINE 開啟</h1>
              <p style={{color:'#4b5563',fontSize:'14px',lineHeight:'1.7',marginBottom:'24px'}}>
                訪客無法在電腦版瀏覽器購買<br/>
                請在 LINE 手機中加入「美好的事」LINE 官方帳號
              </p>
              <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'16px',padding:'20px',marginBottom:'24px',textAlign:'left'}}>
                <p style={{color:'#166534',fontSize:'13px',lineHeight:'1.8',margin:0}}>
                  別錯過我們的最新消息！快加入 LINE 好友獲得限定的優惠資訊。<br/>
                  透過以下連結將官方帳號加入好友吧。
                </p>
              </div>
              <a href="https://lin.ee/5gUfccO" target="_blank" rel="noreferrer"
                style={{display:'inline-flex',alignItems:'center',gap:'10px',background:'#06C755',color:'white',borderRadius:'12px',padding:'14px 28px',fontWeight:'800',fontSize:'16px',textDecoration:'none',boxShadow:'0 4px 12px rgba(6,199,85,0.4)'}}>
                <span style={{fontSize:'20px'}}>💚</span> 加入 LINE 好友
              </a>
              <div style={{marginTop:'16px',fontSize:'12px',color:'#9ca3af'}}>
                https://lin.ee/5gUfccO
              </div>
            </div>
          </div>
        );
      }
      return (
      <ErrorBoundary>
        <AppProvider>
          <DialogProvider>
            <HashRouter>
              <Routes>
                <Route path="/" element={<Home />} />
                <Route path="/product/:id" element={<ProductDetail />} />
                <Route path="/cart" element={<Cart />} />
                <Route path="/profile" element={<Profile />} />
                <Route path="/orders" element={<OrderHistory />} />
                <Route path="/instructions" element={<Instructions />} />
                <Route path="/redeem" element={<Redeem />} />
                <Route path="/campaigns" element={<Campaigns />} />
                <Route path="/my-coupons" element={<MyCoupons />} />
                <Route path="/reviews" element={<MyReviews />} />
                <Route path="/admin" element={<AdminDashboard />} />
              </Routes>
            </HashRouter>
          </DialogProvider>
        </AppProvider>
      </ErrorBoundary>
    );
    };
    try {
      const container = document.getElementById('root');
      if (!container) throw new Error('Root element not found');
      ReactDOM.createRoot(container).render(<App />);
    } catch(err) {
      console.error('Render Error:', err);
      document.getElementById('root').innerHTML = `<div style="padding:20px;color:red;">啟動失敗: ${err.message}</div>`;
    }
  </script>
<script>
(function(){
  var src = document.getElementById('_src').textContent;
  try {
    var out = Babel.transform(src, {presets:['react']});
    var s = document.createElement('script');
    s.textContent = out.code;
    document.head.appendChild(s);
  } catch(e) {
    var d = document.getElementById('error-log');
    var c = document.getElementById('error-content');
    d.style.display='block';
    c.innerHTML='<div><strong style="font-size:15px">⚠️ Babel 解析錯誤：</strong><br><br><pre style="white-space:pre-wrap;font-size:12px;color:#ffff99;background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;margin-top:8px">'+(e.message||e+'').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre><p style="font-size:11px;color:#fcc;margin-top:8px">請截圖此錯誤回報給開發者</p></div>';
    console.error('Babel transform failed:',e);
  }
})();
</script>

</body>
</html>
