<body class="bg-yellow-50">
  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(200,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h3 class="font-bold text-xl mb-2">發生錯誤 (Error Log)</h3>
    <button onclick="document.getElementById('error-log').style.display='none'" style="border:1px solid white; padding:5px 10px; margin-bottom:10px;">關閉</button>
    <div id="error-content"></div>
  </div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>' + msg + '</strong><br><small>' + url + ':' + line + '</small><br><pre style="white-space:pre-wrap;">' + (error ? error.stack : '') + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
    window.onunhandledrejection = function(event) {
      var div = document.getElementById('error-log');
      var content = document.getElementById('error-content');
      div.style.display = 'block';
      content.innerHTML += '<div><strong>Unhandled Rejection</strong><br><pre style="white-space:pre-wrap;">' + event.reason + '</pre></div><hr style="border-color:white; margin:10px 0;">';
    };
  </script>
  <div id="root">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fefce8;color:#f97316;font-weight:bold;font-family:sans-serif;">
      載入中... (Loading...)
    </div>
  </div>
  <script type="text/babel">
    console.log('Step 1: Script started');
    if (typeof React === 'undefined') console.error('React missing');
    if (typeof ReactDOM === 'undefined') console.error('ReactDOM missing');
    if (typeof ReactRouterDOM === 'undefined') console.error('ReactRouterDOM missing');
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof ReactRouterDOM === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;">系統錯誤：核心元件未載入，請檢查網路連線。</div>';
      throw new Error('React 或 ReactRouterDOM 未正確載入');
    }
    const { useState, useEffect, createContext, useContext } = React;
    const { HashRouter, Routes, Route, Link, useNavigate, useLocation, useParams } = ReactRouterDOM;

    // --- 重要設定 ---
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxG9xUAxbLvWf6fP9solDNtHgHJ8BV3PpMZwYwhXcl7T7BYQ10cU1c3VLL3yFV6ZNvF/exec';
    const LIFF_ID = '2009248623-E3UOP9Mc';
    const ADMIN_IDS = ['Ua66fd77f72e4524075afd856cae91587', 'U14d8bef8cbaceb57db3eefc526282b13'];

    // --- API 服務 ---
    const api = {};
    api.get = async (action, params = {}) => {
      const query = new URLSearchParams({ action, ...params }).toString();
      try {
        const res = await fetch(`${GAS_API_URL}?${query}`);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        return await res.json();
      } catch (e) { console.error('API GET Error:', e); return null; }
    };
    api.post = async (action, data) => {
      try {
        const res = await fetch(GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...data }),
          headers: { 'Content-Type': 'text/plain' }
        });
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        return await res.json();
      } catch (e) { console.error('API POST Error:', e); throw e; }
    };
    api.fetchProducts = () => api.get('getProducts');
    api.fetchCategories = () => api.get('getCategories');
    api.fetchSettings = () => api.get('getSettings');
    api.getUserProfile = (lineId) => api.get('getUserProfile', { lineId });
    api.submitOrder = (order) => api.post('createOrder', { order });
    api.updateUserProfile = (profile) => api.post('updateUserProfile', { profile });
    // 新增：取得用戶訂單
    api.getUserOrders = (lineId) => api.get('getUserOrders', { lineId });
    api.cancelOrder = (orderId, lineId) => api.post('cancelOrder', { orderId, lineId });

    // --- Utils ---
    const generateOrderId = () => {
      const now = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      const datePart = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const randomPart = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
      return `${datePart}${randomPart}`;
    };

    // --- Icons ---
    const Icons = {
      Home:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      ShoppingCart:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
      User:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Search:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      ArrowLeft:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
      Plus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      Minus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/></svg>,
      Trash2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      Settings2:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      LayoutGrid:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
      ShoppingBag:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      Gift:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>,
      Truck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><path d="M14 17h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
      CreditCard:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
      ShieldCheck:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
      Zap:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      HelpCircle:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>,
      Store:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></svg>,
      ClipboardList:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>,
      Package:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
      CheckCircle:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>,
      XCircle:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>,
      Edit:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Users:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      BarChart:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>,
    };

    // --- Dialog Context ---
    const DialogContext = createContext();
    const useDialog = () => useContext(DialogContext);
    const Dialog = ({ isOpen, type, title, message, onConfirm, onCancel }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm overflow-hidden animate-scale-in">
            <div className={`p-4 text-center ${type === 'confirm' ? 'bg-blue-50' : 'bg-lime-50'}`}>
              <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2 ${type === 'confirm' ? 'bg-blue-100 text-blue-600' : 'bg-lime-100 text-lime-600'}`}>
                {type === 'confirm' ? <Icons.HelpCircle size={24} /> : <Icons.ShieldCheck size={24} />}
              </div>
              <h3 className="text-lg font-bold text-gray-800">{title}</h3>
            </div>
            <div className="p-6 text-center text-gray-600 text-sm whitespace-pre-wrap">{message}</div>
            <div className="flex border-t border-gray-100">
              {type === 'confirm' ? (
                <>
                  <button onClick={onCancel} className="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 border-r border-gray-100">取消</button>
                  <button onClick={onConfirm} className="flex-1 py-3 text-blue-600 font-bold hover:bg-blue-50">確認</button>
                </>
              ) : (
                <button onClick={onConfirm} className="flex-1 py-3 text-lime-600 font-bold hover:bg-lime-50">知道了</button>
              )}
            </div>
          </div>
        </div>
      );
    };
    const DialogProvider = ({ children }) => {
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: () => {}, onCancel: () => {} });
      const showAlert = (message, title = '提示') => new Promise((resolve) => {
        setDialog({ isOpen: true, type: 'alert', title, message,
          onConfirm: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(true); },
          onCancel: () => {} });
      });
      const showConfirm = (message, title = '確認') => new Promise((resolve) => {
        setDialog({ isOpen: true, type: 'confirm', title, message,
          onConfirm: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(true); },
          onCancel: () => { setDialog(p => ({ ...p, isOpen: false })); resolve(false); } });
      });
      return (
        <DialogContext.Provider value={{ showAlert, showConfirm }}>
          {children}
          <Dialog {...dialog} />
        </DialogContext.Provider>
      );
    };

    // --- App Context ---
    const AppContext = createContext();
    const AppProvider = ({ children }) => {
      const [cart, setCart] = useState([]);
      const [user, setUser] = useState(null);
      const [settings, setSettings] = useState(null);
      const [redeemableProducts, setRedeemableProducts] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      useEffect(() => {
        const initApp = async () => {
          try {
            try { const s = localStorage.getItem('cart'); if (s) setCart(JSON.parse(s)); } catch(e) {}
            const loadLiff = async () => {
              if (typeof liff === 'undefined') { setUser({ lineId: 'guest', name: '訪客', points: 0 }); return; }
              try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                  const profile = await liff.getProfile();
                  const dbUser = await api.getUserProfile(profile.userId);
                  setUser({ lineId: profile.userId, name: profile.displayName, pictureUrl: profile.pictureUrl, points: 0, coupons: [], ...(dbUser || {}) });
                } else { setUser({ lineId: 'guest', name: '訪客', points: 0 }); }
              } catch (err) {
                console.error('LIFF Init Failed', err);
                setUser({ lineId: 'test_user', name: '測試會員 (LIFF Error)', points: 0 });
              }
            };
            const loadData = async () => {
              try {
                const [s, p] = await Promise.all([api.fetchSettings(), api.fetchProducts()]);
                if (s) setSettings(s);
                if (p) setRedeemableProducts(p.filter(x => (x.redeemPoints || 0) > 0));
              } catch(e) { console.error('Data load fail', e); }
            };
            await Promise.all([loadLiff(), loadData()]);
          } finally { setIsLoading(false); }
        };
        initApp();
      }, []);
      useEffect(() => { try { localStorage.setItem('cart', JSON.stringify(cart)); } catch(e) {} }, [cart]);

      const addToCart = (p, q, v, isRedeem=false) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === p.id && i.selectedVariant === v && i.isRedemption === isRedeem);
          if (exist) return prev.map(i => i === exist ? { ...i, quantity: i.quantity + q } : i);
          return [...prev, { ...p, quantity: q, selectedVariant: v, isRedemption: isRedeem }];
        });
      };
      const updateQuantity = (id, q, v, isRedeem) => {
        if (q <= 0) return setCart(prev => prev.filter(i => !(i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem)));
        setCart(prev => prev.map(i => (i.id === id && i.selectedVariant === v && i.isRedemption === isRedeem) ? { ...i, quantity: q } : i));
      };
      const cartTotal = cart.reduce((t, i) => i.isRedemption ? t : t + i.price * i.quantity, 0);
      const pointsUsed = cart.reduce((t, i) => (i.isRedemption && i.redeemPoints) ? t + i.redeemPoints * i.quantity : t, 0);
      const isFreeShipping = settings?.freeShippingThreshold ? cartTotal >= settings.freeShippingThreshold : false;
      const shippingFee = isFreeShipping ? 0 : (settings?.shippingFee || 60);

      if (isLoading) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-lime-600">
          <div className="w-12 h-12 border-4 border-lime-200 border-t-lime-600 rounded-full animate-spin mb-4"></div>
          <div className="font-bold text-lg">美好正在發生...</div>
        </div>
      );
      return (
        <AppContext.Provider value={{
          cart, addToCart, updateQuantity, clearCart: () => setCart([]), cartTotal,
          user, setUser, settings, shippingFee, isFreeShipping, pointsUsed,
          redeemableProducts,
          updateUserProfile: (p) => { const nu = { ...user, ...p }; setUser(nu); api.updateUserProfile(nu); },
          redeemItem: (p) => {
            if ((user.points||0) < p.redeemPoints) return false;
            const nu = { ...user, points: user.points - p.redeemPoints };
            setUser(nu); api.updateUserProfile(nu); return true;
          }
        }}>
          {children}
        </AppContext.Provider>
      );
    };
    const useAppContext = () => useContext(AppContext);

    // --- Error Boundary ---
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) { console.error("ErrorBoundary:", error, info); }
      render() {
        if (this.state.hasError) return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-red-50 text-red-800">
            <h1 className="text-2xl font-bold mb-4">發生錯誤</h1>
            <pre className="bg-white p-4 rounded shadow text-xs overflow-auto w-full max-w-md mb-4">{this.state.error?.toString()}</pre>
            <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-full font-bold">重新載入</button>
          </div>
        );
        return this.props.children;
      }
    }

    // --- Shared Components ---
    const ProductCard = ({ product }) => (
      <Link to={`/product/${product.id}`} className="block bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-lg transition-all group relative">
        <div className="aspect-square w-full bg-gray-100 relative overflow-hidden">
          {product.images?.[0] ? <img src={product.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" referrerPolicy="no-referrer" /> : <div className="flex items-center justify-center h-full text-gray-400">無圖片</div>}
          {product.originalPrice > product.price && <div className="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full shadow-md">SALE</div>}
          <div className="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-sm">庫存: {product.stock}</div>
        </div>
        <div className="p-3">
          <h3 className="text-sm font-bold text-gray-800 line-clamp-2 min-h-[40px] group-hover:text-lime-600">{product.name}</h3>
          <div className="mt-2 flex items-baseline gap-2">
            <span className="text-lg font-black text-lime-600">NT${product.price}</span>
            {product.originalPrice && <span className="text-xs text-gray-400 line-through">NT${product.originalPrice}</span>}
          </div>
        </div>
      </Link>
    );

    const BottomNav = ({ active }) => {
      const { cart } = useAppContext();
      const navigate = useNavigate();
      const count = cart.reduce((a, c) => a + c.quantity, 0);
      const navItems = [
        { id: 'home', icon: Icons.Home, label: '首頁', path: '/' },
        { id: 'cart', icon: Icons.ShoppingCart, label: '購物車', path: '/cart', badge: count },

              const isActive = active === item.id;
              return (
                <button key={item.id} onClick={() => navigate(item.path)}
                  className={`relative flex flex-col items-center justify-center w-16 h-16 transition-all duration-300 ${isActive ? '-mt-6' : ''}`}>
                  <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-sm ${isActive ? 'bg-lime-500 text-white scale-110 shadow-lime-200 shadow-lg' : 'bg-transparent text-gray-400'}`}>
                    <item.icon className="w-6 h-6" strokeWidth={isActive ? 2.5 : 2} />

                  {item.badge > 0 && <span className="absolute top-0 right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white shadow-sm">{item.badge}</span>}
                  <span className={`text-[10px] font-bold mt-1 transition-opacity ${isActive ? 'text-lime-600 opacity-100' : 'text-gray-400 opacity-0'}`}>{item.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    // 訂單狀態顯示輔助
    const getOrderStatusDisplay = (order) => {
      const s = order.status;
      const method = order.deliveryMethod || order.content?.deliveryMethod;
      if (s === 'Completed') return { label: '已完成', color: 'bg-green-100 text-green-700', icon: '✅' };
      if (s === 'Cancelled') return { label: '已取消', color: 'bg-red-100 text-red-700', icon: '❌' };
      if (s === 'Shipped') {
        if (method === 'pickup') return { label: '請儘快到店完成取貨', color: 'bg-orange-100 text-orange-700', icon: '🏪' };
        return { label: '寄送中', color: 'bg-blue-100 text-blue-700', icon: '🚚' };
      }
      return { label: '待處理', color: 'bg-yellow-100 text-yellow-700', icon: '⏳' };
    };

    // =====================================================
    // 頁面：首頁
    // =====================================================
    const Home = () => {
      const { settings } = useAppContext();
      const [products, setProducts] = useState([]);
      const [cats, setCats] = useState([]);
      const [activeCat, setActiveCat] = useState('all');
      const [iconSize, setIconSize] = useState('M');
      const [showSizeMenu, setShowSizeMenu] = useState(false);
      useEffect(() => {
        api.fetchProducts().then(p => p && setProducts(p));
        api.fetchCategories().then(c => c && setCats(c));
      }, []);
      const filtered = activeCat === 'all' ? products : products.filter(p => p.categoryId === activeCat);
      const getGridClass = (s) => ({ 'XL':'grid-cols-1','L':'grid-cols-2','M':'grid-cols-3','S':'grid-cols-4','XS':'grid-cols-5' }[s] || 'grid-cols-3');
      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans relative">
          <div className="bg-lime-500 text-white sticky top-0 z-40 shadow-md rounded-b-3xl">
            {settings?.marqueeText && (
              <div className="bg-lime-700 text-white text-xs py-1 overflow-hidden whitespace-nowrap">
                <div className="animate-marquee inline-block px-4">{settings.marqueeText}</div>
              </div>
            )}
            <div className="px-5 py-4 flex justify-between items-center">
              <div className="flex items-center gap-2">

                <h1 className="font-black text-xl tracking-wide">{settings?.storeName || '美好的事'}</h1>
              </div>
              <div className="flex items-center gap-3">
                <Link to="/instructions" className="p-2"><Icons.HelpCircle size={24} /></Link>
                <Link to="/cart" className="relative p-2"><Icons.ShoppingCart size={24} /></Link>
              </div>
            </div>
            <div className="px-4 pb-4 overflow-x-auto no-scrollbar flex gap-2">
              <button onClick={() => setActiveCat('all')} className={`px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap ${activeCat==='all'?'bg-white text-lime-600':'bg-lime-600/50 text-white'}`}>全部商品</button>
              {cats.map(c => <button key={c.id} onClick={() => setActiveCat(c.id)} className={`px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap ${activeCat===c.id?'bg-white text-lime-600':'bg-lime-600/50 text-white'}`}>{c.name}</button>)}

            {showSizeMenu && (
              <div className="bg-white rounded-xl shadow-xl p-2 flex flex-col gap-1 mb-2 border border-gray-100 animate-fade-in">
                {['XL','L','M','S','XS'].map(s => (
                  <button key={s} onClick={() => { setIconSize(s); setShowSizeMenu(false); }}

                    {s==='XL'?'特大':s==='L'?'大':s==='M'?'中':s==='S'?'小':'特小'}
                  </button>
                ))}
              </div>
            )}
            <button onClick={() => setShowSizeMenu(!showSizeMenu)} className="w-12 h-12 bg-white text-lime-600 rounded-full shadow-lg border border-lime-100 flex items-center justify-center">
              <Icons.LayoutGrid size={20} />
            </button>
          </div>
          <BottomNav active="home" />
        </div>
      );
    };

    // =====================================================
    // 頁面：購物說明
    // =====================================================
    const Instructions = () => (
      <div className="min-h-screen bg-gray-50 pb-24 font-sans">
        <div className="bg-lime-500 text-white p-6 pb-10 rounded-b-[3rem] shadow-lg mb-6 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-10 -mt-10"></div>
          <h1 className="text-2xl font-bold text-center relative z-10">購買說明</h1>
        </div>
        <div className="px-4 space-y-6 -mt-12 relative z-20">
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
              <div className="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"><Icons.ShoppingBag size={18}/></div>
              購物流程
            </h2>
            <div className="space-y-6 relative before:absolute before:left-[19px] before:top-2 before:h-[85%] before:w-0.5 before:bg-gray-100">
              {['選購商品','確認購物車','填寫資料','完成訂單'].map((step,i) => (
                <div key={i} className="relative flex items-center gap-4">
                  <div className="w-10 h-10 rounded-full bg-white text-lime-600 flex items-center justify-center font-bold z-10 border-4 border-lime-100 shadow-sm text-sm">{i+1}</div>
                  <div className="bg-gray-50 p-3 rounded-xl flex-1 border border-gray-100"><h3 className="font-bold text-sm text-gray-700">{step}</h3></div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.CreditCard size={18}/></div>
              付款方式
            </h2>
            <div className="space-y-3">
              <div className="flex items-start gap-3 p-3 bg-blue-50 rounded-xl">
                <Icons.Truck className="w-5 h-5 text-blue-500 mt-0.5" />
                <div><div className="font-bold text-sm text-gray-800">貨到付款</div><div className="text-xs text-gray-500">取貨時再付款給物流人員</div></div>
              </div>
              <div className="flex items-start gap-3 p-3 bg-orange-50 rounded-xl">
                <Icons.Store className="w-5 h-5 text-orange-500 mt-0.5" />
                <div><div className="font-bold text-sm text-gray-800">店取付款</div><div className="text-xs text-gray-500">至實體門市取貨時付款</div></div>
              </div>
            </div>
          </div>
        </div>
        <BottomNav active="profile" />
      </div>
    );

    // =====================================================
    // 頁面：購物車
    // =====================================================
    const Cart = () => {
      const { cart, updateQuantity, clearCart, cartTotal, user, settings, shippingFee, isFreeShipping, pointsUsed } = useAppContext();
      const { showAlert } = useDialog();
      const navigate = useNavigate();
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [deliveryMethod, setDeliveryMethod] = useState('shipping');
      const [cvsType, setCvsType] = useState('');
      const [formData, setFormData] = useState({ name: user?.name||'', phone: user?.phone||'', address: user?.address||'', storeName: '' });
      const [selectedCoupon, setSelectedCoupon] = useState(null);
      let discountAmount = selectedCoupon ? selectedCoupon.value : 0;
      const total = cartTotal + (deliveryMethod==='shipping' ? (isFreeShipping?0:shippingFee) : 0) - discountAmount;
      const pointsEarned = Math.floor(cartTotal / (settings?.pointRatio || 100));
      const freeShippingDiff = (settings?.freeShippingThreshold || 1000) - cartTotal;
      const availableCoupons = (user?.coupons||[]).filter(c => {
        const today = new Date().toISOString().split('T')[0];
        return c.expiry >= today && cartTotal >= c.minSpend;
      });
      const handleSubmit = async (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (cart.length === 0) return;
        if (!user?.phone) { showAlert('請先至會員中心填寫手機號碼'); navigate('/profile'); return; }
        if (deliveryMethod==='cvs' && (!cvsType || !formData.storeName)) { showAlert('請選擇超商並填寫門市名稱'); return; }
        if (deliveryMethod==='shipping' && !formData.address) { showAlert('請填寫收件地址'); return; }
        setIsSubmitting(true);
        const orderId = generateOrderId();
        const order = {
          orderId, user: { lineId:user.lineId, name:formData.name||user.name, phone:formData.phone||user.phone,
            address:deliveryMethod==='shipping'?formData.address:(deliveryMethod==='cvs'?`${cvsType} ${formData.storeName}`:'店面取貨') },
          items:cart, total, pointsUsed, pointsEarned, discount:discountAmount,
          deliveryMethod, shippingFee:deliveryMethod==='shipping'?(isFreeShipping?0:shippingFee):0,
          status:'Pending', createdAt:new Date().toISOString()
        };
        try {
          await api.submitOrder(order);
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            const itemsText = cart.map((i,idx) => i.isRedemption ? `${idx+1}.[兌換]${i.name}x${i.quantity}` : `${idx+1}.${i.name}x${i.quantity}(NT$${i.price})`).join('\n');
            await liff.sendMessages([{ type:'text', text:`訂單 ${orderId} 已送出！\n${itemsText}\n總金額:NT$${total}` }]);
          }
          showAlert('訂單已送出！');
          clearCart();
          navigate('/orders');
        } catch(e) { console.error(e); showAlert('訂單送出失敗，請重試'); }
        finally { setIsSubmitting(false); }
      };
      if (cart.length===0) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4">
          <div className="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-4 text-gray-400"><Icons.ShoppingCart className="w-10 h-10" /></div>
          <p className="text-gray-500 mb-6">購物車是空的</p>
          <Link to="/" className="bg-lime-600 text-white px-8 py-3 rounded-full font-bold shadow-lg">去逛逛</Link>
          <BottomNav active="cart" />
        </div>
      );
      return (
        <div className="min-h-screen bg-gray-50 pb-32">
          <div className="bg-white p-4 sticky top-0 z-10 shadow-sm text-center font-bold text-lg">購物車</div>
          <div className="p-4 space-y-4">
            {deliveryMethod==='shipping' && !isFreeShipping && (
              <div className="bg-orange-50 p-3 rounded-xl border border-orange-100 text-sm text-orange-700 flex items-center gap-2">
                <Icons.Truck className="w-5 h-5" /><span>再買 <span className="font-bold">NT${freeShippingDiff}</span> 即可享免運費！</span>
              </div>
            )}
            {cart.map((item,idx) => (
              <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm flex gap-4">
                <img src={item.images?.[0]} className="w-20 h-20 rounded-lg object-cover bg-gray-100" referrerPolicy="no-referrer" />
                <div className="flex-1 flex flex-col justify-between">
                  <div>
                    <h3 className="font-bold text-gray-800 line-clamp-1">{item.name}</h3>
                    <div className="text-xs text-gray-500 mt-1">{item.selectedVariant} {item.isRedemption && <span className="text-red-500 font-bold">(兌換品)</span>}</div>
                  </div>
                  <div className="flex justify-between items-end">
                    <div className="font-bold text-lime-600">{item.isRedemption ? `${item.redeemPoints} 點` : `NT$${item.price}`}</div>
                    <div className="flex items-center gap-3 bg-gray-100 rounded-lg p-1">
                      <button onClick={() => updateQuantity(item.id, item.quantity-1, item.selectedVariant, item.isRedemption)} className="p-1"><Icons.Minus className="w-4 h-4" /></button>
                      <span className="text-sm font-bold w-4 text-center">{item.quantity}</span>
                      <button onClick={() => updateQuantity(item.id, item.quantity+1, item.selectedVariant, item.isRedemption)} className="p-1"><Icons.Plus className="w-4 h-4" /></button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
            {/* 優惠券 */}
            <div className="bg-white p-4 rounded-2xl shadow-sm space-y-3">
              <h3 className="font-bold text-gray-800">使用優惠券</h3>
              {availableCoupons.length > 0 ? (
                <div className="space-y-2">
                  {availableCoupons.map(coupon => (
                    <label key={coupon.id} className={`flex items-center justify-between p-3 border rounded-xl cursor-pointer ${selectedCoupon?.id===coupon.id?'border-lime-500 bg-lime-50':'border-gray-200'}`}>
                      <div className="flex items-center gap-3">
                        <input type="radio" name="coupon" checked={selectedCoupon?.id===coupon.id} onChange={() => setSelectedCoupon(coupon)} />
                        <div><div className="font-bold text-gray-800">{coupon.title}</div><div className="text-xs text-gray-500">滿 ${coupon.minSpend} 可折抵 ${coupon.value}</div></div>
                      </div>
                      <div className="font-bold text-lime-600">-${coupon.value}</div>
                    </label>
                  ))}
                  {selectedCoupon && <button onClick={() => setSelectedCoupon(null)} className="text-xs text-gray-400 underline w-full text-center mt-2">不使用優惠券</button>}
                </div>
              ) : <div className="text-center text-gray-400 text-sm py-2">無可用優惠券</div>}
            </div>
            {/* 取貨方式 */}
            <div className="bg-white p-4 rounded-2xl shadow-sm space-y-3">
              <h3 className="font-bold text-gray-800">取貨方式</h3>
              <div className="grid grid-cols-3 gap-2">
                {[{id:'shipping',icon:Icons.Truck,label:'宅配寄送'},{id:'cvs',icon:Icons.Store,label:'超商取貨'},{id:'pickup',icon:Icons.ShoppingBag,label:'店面取貨'}].map(m => (
                  <button key={m.id} onClick={() => setDeliveryMethod(m.id)}
                    className={`p-2 rounded-xl border text-center font-bold text-sm ${deliveryMethod===m.id?'border-lime-500 bg-lime-50 text-lime-700':'border-gray-200 text-gray-500'}`}>
                    <m.icon className="w-5 h-5 mx-auto mb-1" />{m.label}
                  </button>
                ))}
              </div>
              {deliveryMethod==='pickup' && <div className="bg-gray-50 p-3 rounded-lg text-sm text-gray-600"><div className="font-bold mb-1">取貨資訊</div><div>{settings?.storeAddress||'請聯繫門市'}</div><div>電話：{settings?.storePhone}</div></div>}
              {deliveryMethod==='cvs' && (
                <div className="space-y-3 bg-gray-50 p-3 rounded-lg">
                  <div className="flex gap-2">
                    <button onClick={() => setCvsType('7-11')} className={`flex-1 py-2 rounded-lg border font-bold text-sm ${cvsType==='7-11'?'bg-green-600 text-white border-green-600':'bg-white text-gray-500 border-gray-200'}`}>7-11</button>
                    <button onClick={() => setCvsType('FamilyMart')} className={`flex-1 py-2 rounded-lg border font-bold text-sm ${cvsType==='FamilyMart'?'bg-blue-600 text-white border-blue-600':'bg-white text-gray-500 border-gray-200'}`}>全家</button>
                  </div>
                  <input placeholder="請輸入門市名稱" value={formData.storeName} onChange={e => setFormData({...formData, storeName:e.target.value})} className="w-full p-2 border rounded-lg text-sm" />
                </div>
              )}
            </div>
            <div className="bg-white p-4 rounded-2xl shadow-sm space-y-3">
              <h3 className="font-bold text-sm">收件資訊</h3>
              <input placeholder="姓名" value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})} className="w-full bg-gray-50 p-2 rounded" />
              <input placeholder="電話" value={formData.phone} onChange={e=>setFormData({...formData,phone:e.target.value})} className="w-full bg-gray-50 p-2 rounded" />
              {deliveryMethod==='shipping' && <input placeholder="地址" value={formData.address} onChange={e=>setFormData({...formData,address:e.target.value})} className="w-full bg-gray-50 p-2 rounded" />}
            </div>
            <div className="bg-white p-4 rounded-2xl shadow-sm space-y-2">
              <div className="flex justify-between text-gray-600"><span>小計</span><span>NT${cartTotal}</span></div>
              <div className="flex justify-between text-gray-600"><span>運費</span><span>{deliveryMethod==='shipping'?(isFreeShipping?'免運費':`NT$${shippingFee}`):'免運費'}</span></div>
              {discountAmount>0 && <div className="flex justify-between text-orange-500"><span>優惠券折抵</span><span>-NT${discountAmount}</span></div>}
              {pointsEarned>0 && <div className="flex justify-between text-orange-500 font-bold"><span>預計獲得點數</span><span>+{pointsEarned} 點</span></div>}
              <div className="border-t pt-2 flex justify-between font-bold text-lg text-gray-800"><span>總金額</span><span>NT${total}</span></div>
            </div>
          </div>
          <div className="fixed bottom-20 left-4 right-4 z-20">
            <button onClick={handleSubmit} disabled={isSubmitting}
              className="w-full bg-lime-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-lime-200 active:scale-95 transition-transform disabled:opacity-50">
              {isSubmitting ? '處理中...' : '確認結帳'}
            </button>
          </div>
          <BottomNav active="cart" />
        </div>
      );
    };

    // =====================================================
    // 頁面：訂單紀錄（新增）
    // =====================================================
    const OrderHistory = () => {
      const { user, setUser } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editOrder, setEditOrder] = useState(null);
      const [editForm, setEditForm] = useState({});

      useEffect(() => {
        if (!user || user.lineId === 'guest') { setLoading(false); return; }
        api.getUserOrders(user.lineId).then(data => {
          if (data && !data.error) setOrders(data);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [user]);

      const handleCancel = async (order) => {
        if (order.status !== 'Pending') { showAlert('只有「待處理」的訂單才可取消'); return; }
        if (!await showConfirm(`確定要取消訂單 ${order.orderId}？\n取消後無法復原。`, '取消訂單')) return;
        try {
          const res = await api.cancelOrder(order.orderId, user.lineId);
          if (res?.success) {
            showAlert('訂單已取消');
            setOrders(prev => prev.map(o => o.orderId===order.orderId ? {...o, status:'Cancelled'} : o));
          } else { showAlert('取消失敗：' + (res?.error||'請稍後再試')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
      };

      const handleEditOpen = (order) => {
        if (order.status !== 'Pending') { showAlert('只有「待處理」的訂單才可修改'); return; }
        setEditOrder(order);
        const u = order.content?.user || {};
        setEditForm({ name: u.name||'', phone: u.phone||'', address: u.address||'' });
      };

      const handleEditSave = async () => {
        if (!editForm.phone || !editForm.name) { showAlert('姓名與電話為必填'); return; }
        try {
          const res = await api.post('updateOrderContact', {
            orderId: editOrder.orderId,
            lineId: user.lineId,
            contact: editForm
          });
          if (res?.success) {
            showAlert('訂單已更新');
            setOrders(prev => prev.map(o => o.orderId===editOrder.orderId ? {
              ...o,
              content: { ...o.content, user: { ...o.content.user, ...editForm } }
            } : o));
            setEditOrder(null);
          } else { showAlert('更新失敗：' + (res?.error||'請稍後再試')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          <div className="bg-white p-4 sticky top-0 z-10 shadow-sm flex items-center gap-3">
            <button onClick={() => navigate('/profile')}><Icons.ArrowLeft className="w-6 h-6" /></button>
            <h1 className="font-bold text-lg">訂單紀錄</h1>
          </div>
          {/* 編輯 Modal */}
          {editOrder && (
            <div className="fixed inset-0 z-[9998] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm overflow-hidden animate-scale-in">
                <div className="p-4 bg-blue-50 text-center">
                  <h3 className="text-lg font-bold text-gray-800">修改收件資訊</h3>
                  <p className="text-xs text-gray-500 mt-1">訂單 {editOrder.orderId}</p>
                </div>
                <div className="p-5 space-y-3">

    const Redeem = () => {
      const { redeemableProducts, user, setUser } = useAppContext();
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [processing, setProcessing] = useState(false);
      const handleRedeem = async (product) => {
        if (!user) return;
        if ((user.points||0) < product.redeemPoints) { showAlert('點數不足無法兌換'); return; }
        if (!await showConfirm(`確定要使用 ${product.redeemPoints} 點兌換「${product.name}」嗎？\n兌換後需等待管理員審核出貨。`)) return;
        setProcessing(true);
        try {
          const res = await api.post('createRedemption', { redemption: { lineId:user.lineId, userName:user.name, itemId:product.id, itemName:product.name, points:product.redeemPoints } });
          if (res?.success) {
            showAlert('兌換申請已送出！請等待管理員審核。');
            setUser({ ...user, points: user.points - product.redeemPoints });
            navigate('/profile');
          } else { showAlert('兌換失敗: ' + (res?.error||'未知錯誤')); }
        } catch(e) { showAlert('發生錯誤，請稍後再試'); }
        finally { setProcessing(false); }
      };
      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans">

            ) : (
              <div className="grid gap-4">

                  <div key={p.id} className="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col border border-gray-100">

          if (!p) { setError('無法載入商品資料'); setLoading(false); return; }

        if (embedUrl) return <div className="aspect-video w-full mt-4 rounded-xl overflow-hidden shadow-sm"><iframe src={embedUrl} className="w-full h-full" frameBorder="0" allowFullScreen></iframe></div>;
        return <div className="mt-4 p-4 bg-gray-100 rounded-xl text-center"><a href={url} target="_blank" className="text-blue-600 underline">點此觀看影片</a></div>;

            {product.variants && product.variants.length>0 && (
              <div className="mb-6">
                <h3 className="font-bold text-gray-800 mb-3">{product.variantType||'規格'}</h3>
                <div className="flex flex-wrap gap-2">
                  {product.variants.map(v => (
                    <button key={v} onClick={() => setSelectedVariant(v)}
                      className={`px-4 py-2 rounded-lg border text-sm font-medium ${selectedVariant===v?'border-lime-500 bg-lime-50 text-lime-700':'border-gray-200 text-gray-600'}`}>{v}</button>

            <div className="prose prose-sm text-gray-600 mb-8">
              <h3 className="font-bold text-gray-800 mb-2">商品介紹</h3>
              <p className="whitespace-pre-wrap">{product.description}</p>
              {getVideoEmbed(product.videoUrl)}
            </div>
          </div>
          <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 flex items-center gap-4 z-50">
            <button onClick={() => navigate('/')} className="p-3 rounded-full border border-gray-200 text-gray-500"><Icons.Home className="w-6 h-6" /></button>
            <button onClick={() => { addToCart(product,1,selectedVariant); showAlert('已加入購物車'); }}
              className="flex-1 bg-lime-600 text-white py-3 rounded-full font-bold shadow-lg shadow-lime-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
              <Icons.ShoppingCart className="w-5 h-5" />加入購物車
            </button>
          </div>
        </div>
      );
    };

    // =====================================================
    // 頁面：管理員後台 (Bug Fixed)
    // =====================================================
    const AdminDashboard = () => {
      const { user } = useAppContext();
      // ✅ 修復：使用 useDialog 而非直接呼叫不存在的 setDialog
      const { showAlert, showConfirm } = useDialog();
      const navigate = useNavigate();
      const [orders, setOrders] = useState([]);
      const [redemptions, setRedemptions] = useState([]);
      const [users, setUsers] = useState([]);
      const [products, setProducts] = useState([]);
      const [stats, setStats] = useState({ dailyTotal:0, monthlyTotal:0, grandTotal:0 });
      const [adminSettings, setAdminSettings] = useState({});
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('dashboard');
      const [editProduct, setEditProduct] = useState(null);

      useEffect(() => {
        if (!user) return;
        if (!ADMIN_IDS.includes(user.lineId)) { navigate('/'); return; }
        fetchTabData('dashboard');
      }, [user]);

      useEffect(() => {
        if (user && ADMIN_IDS.includes(user.lineId)) fetchTabData(tab);
      }, [tab]);

      const fetchTabData = async (currentTab) => {
        setLoading(true);
        try {
          if (currentTab==='dashboard') {
            const r = await api.get('getAdminStats', { adminId: user.lineId });
            if (r && !r.error) setStats(r);
          } else if (currentTab==='orders') {
            const r = await api.get('getOrders', { adminId: user.lineId });
            if (r && !r.error) setOrders(r);
          } else if (currentTab==='redemptions') {
            const r = await api.get('getRedemptions', { adminId: user.lineId });
            if (r && !r.error) setRedemptions(r);
          } else if (currentTab==='users') {
            const r = await api.get('getUsers', { adminId: user.lineId });
            if (r && !r.error) setUsers(r);
          } else if (currentTab==='products') {
            const r = await api.fetchProducts();
            if (r) setProducts(r);
          } else if (currentTab==='settings') {
            const r = await api.fetchSettings();
            if (r && !r.error) setAdminSettings(r);
          }
        } catch(e) { console.error(e); showAlert('資料載入失敗'); }
        finally { setLoading(false); }
      };

      const updateStatus = async (orderId, newStatus) => {
        let notify = false;
        if (newStatus==='Shipped') {
          notify = await showConfirm(`訂單 ${orderId} 確認出貨？\n是否發送 LINE 通知給用戶？`, '出貨確認');
        } else if (newStatus==='Completed') {
          if (!await showConfirm(`確定完成訂單 ${orderId} 並發送點數？\n(將自動通知用戶)`, '完成訂單')) return;
          notify = true;
        } else {
          if (!await showConfirm(`確定將訂單 ${orderId} 狀態改為 ${newStatus}?`)) return;
        }
        try {
          const r = await api.post('updateOrderStatus', { adminId:user.lineId, orderId, status:newStatus, notify });
          if (r?.success) { showAlert('更新成功'); fetchTabData('orders'); }
          else showAlert('更新失敗：' + (r?.error||'請稍後再試'));
        } catch(e) { showAlert('更新失敗'); }
      };

      const updateRedemptionStatus = async (redemptionId, newStatus) => {
        const notify = await showConfirm(`是否發送 LINE 通知給用戶？`, `更新兌換狀態為 ${newStatus}`);
        try {
          const r = await api.post('updateRedemptionStatus', { adminId:user.lineId, redemptionId, status:newStatus, notify });
          if (r?.success) { showAlert('更新成功'); fetchTabData('redemptions'); }
          else showAlert('更新失敗：' + (r?.error||'請稍後再試'));
        } catch(e) { showAlert('更新失敗'); }
      };

      const handleSaveProduct = async () => {
        if (!editProduct.name || !editProduct.price) { showAlert('商品名稱與價格為必填'); return; }
        try {
          const r = await api.post('updateProduct', { adminId:user.lineId, product:editProduct });
          if (r?.success) { showAlert('商品已儲存'); setEditProduct(null); fetchTabData('products'); }
          else showAlert('儲存失敗：' + (r?.error||''));
        } catch(e) { showAlert('儲存失敗'); }
      };

      const handleDeleteProduct = async (productId) => {
        if (!await showConfirm('確定要刪除此商品？此動作無法復原。', '刪除商品')) return;
        try {
          const r = await api.post('deleteProduct', { adminId:user.lineId, productId });
          if (r?.success) { showAlert('商品已刪除'); fetchTabData('products'); }
          else showAlert('刪除失敗：' + (r?.error||''));
        } catch(e) { showAlert('刪除失敗'); }
      };

      const statusBadge = (s) => {
        const m = { Completed:'bg-green-100 text-green-700', Shipped:'bg-blue-100 text-blue-700', Cancelled:'bg-red-100 text-red-700', Pending:'bg-yellow-100 text-yellow-700' };
        const l = { Completed:'已完成', Shipped:'寄送中/待取貨', Cancelled:'已取消', Pending:'待處理' };
        return <span className={`px-2 py-1 rounded text-xs font-bold ${m[s]||'bg-gray-100 text-gray-600'}`}>{l[s]||s}</span>;
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-20">
          {/* 商品編輯 Modal */}
          {editProduct && (
            <div className="fixed inset-0 z-[9998] bg-black/50 backdrop-blur-sm flex items-end justify-center animate-fade-in">
              <div className="bg-white rounded-t-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-scale-in">
                <div className="p-4 border-b font-bold text-lg text-center">{editProduct.id?'編輯商品':'新增商品'}</div>
                <div className="p-4 space-y-3">
                  <div><label className="text-xs text-gray-500 block mb-1">商品名稱 *</label><input value={editProduct.name||''} onChange={e=>setEditProduct({...editProduct,name:e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs text-gray-500 block mb-1">售價 *</label><input type="number" value={editProduct.price||''} onChange={e=>setEditProduct({...editProduct,price:Number(e.target.value)})} className="w-full p-2 border rounded-lg" /></div>
                    <div><label className="text-xs text-gray-500 block mb-1">原價</label><input type="number" value={editProduct.originalPrice||''} onChange={e=>setEditProduct({...editProduct,originalPrice:Number(e.target.value)})} className="w-full p-2 border rounded-lg" /></div>
                  </div>
                  <div><label className="text-xs text-gray-500 block mb-1">庫存</label><input type="number" value={editProduct.stock||''} onChange={e=>setEditProduct({...editProduct,stock:Number(e.target.value)})} className="w-full p-2 border rounded-lg" /></div>
                  <div><label className="text-xs text-gray-500 block mb-1">商品說明</label><textarea value={editProduct.description||''} onChange={e=>setEditProduct({...editProduct,description:e.target.value})} className="w-full p-2 border rounded-lg" rows={3} /></div>
                  <div><label className="text-xs text-gray-500 block mb-1">圖片連結 (多個用逗號分隔)</label><input value={Array.isArray(editProduct.images)?editProduct.images.join(','):(editProduct.images||'')} onChange={e=>setEditProduct({...editProduct,images:e.target.value.split(',').map(s=>s.trim())})} className="w-full p-2 border rounded-lg" /></div>
                  <div><label className="text-xs text-gray-500 block mb-1">兌換點數 (0=不可兌換)</label><input type="number" value={editProduct.redeemPoints||0} onChange={e=>setEditProduct({...editProduct,redeemPoints:Number(e.target.value)})} className="w-full p-2 border rounded-lg" /></div>
                  <div><label className="text-xs text-gray-500 block mb-1">規格選項 (逗號分隔，如: S,M,L)</label><input value={Array.isArray(editProduct.variants)?editProduct.variants.join(','):(editProduct.variants||'')} onChange={e=>setEditProduct({...editProduct,variants:e.target.value.split(',').map(s=>s.trim()).filter(s=>s)})} className="w-full p-2 border rounded-lg" /></div>
                </div>
                <div className="p-4 flex gap-3">
                  <button onClick={() => setEditProduct(null)} className="flex-1 py-3 border rounded-xl font-bold text-gray-500">取消</button>
                  <button onClick={handleSaveProduct} className="flex-1 py-3 bg-lime-600 text-white rounded-xl font-bold shadow-md">儲存</button>
                </div>
              </div>
            </div>
          )}

          <div className="bg-lime-600 text-white p-4 sticky top-0 z-10 shadow-md">
            <div className="flex items-center gap-3 mb-4">
              <button onClick={() => navigate('/profile')}><Icons.ArrowLeft className="w-6 h-6" /></button>
              <h1 className="text-lg font-bold">管理員後台</h1>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
              {[
                {id:'dashboard',label:'總覽'},
                {id:'orders',label:'訂單'},
                {id:'redemptions',label:'兌換'},
                {id:'users',label:'用戶'},
                {id:'products',label:'商品'},
                {id:'settings',label:'設定'},
              ].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap ${tab===t.id?'bg-white text-lime-600':'bg-lime-700 text-lime-100'}`}>{t.label}</button>
              ))}
            </div>
          </div>

          <div className="p-4 space-y-4">
            {loading ? <div className="text-center py-10 text-gray-400">載入中...</div> : (
              <>
                {/* 總覽 */}
                {tab==='dashboard' && (
                  <div className="grid grid-cols-1 gap-4">
                    {[{label:'今日訂單金額',val:stats.dailyTotal,color:'text-lime-600'},{label:'本月訂單金額',val:stats.monthlyTotal,color:'text-blue-600'},{label:'總計訂單金額',val:stats.grandTotal,color:'text-gray-800'}].map(s => (
                      <div key={s.label} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 className="text-gray-500 font-bold mb-2">{s.label}</h3>
                        <div className={`text-3xl font-black ${s.color}`}>NT${s.val.toLocaleString()}</div>
                      </div>
                    ))}
                  </div>
                )}
                {/* 訂單 */}
                {tab==='orders' && (
                  orders.length===0 ? <div className="text-center text-gray-400 py-10">無訂單資料</div> :
                  orders.map(order => {
                    const statusInfo = getOrderStatusDisplay(order);
                    const method = order.content?.deliveryMethod || order.deliveryMethod;
                    return (
                      <div key={order.orderId} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <div className="font-bold text-gray-800">{order.orderId}</div>
                            <div className="text-xs text-gray-500">{order.date ? new Date(order.date).toLocaleString('zh-TW') : ''}</div>
                          </div>
                          {statusBadge(order.status)}
                        </div>
                        <div className="text-sm text-gray-600 space-y-1 mb-3">
                          <div>訂購人: {order.content?.user?.name}</div>
                          <div>電話: {order.content?.user?.phone}</div>
                          <div>總金額: NT${order.content?.total}</div>
                          <div className="flex items-center gap-1">
                            取貨: {method==='pickup'?'🏪 店面取貨':method==='cvs'?'🏬 超商取貨':'🚚 宅配'}
                            {order.status==='Shipped' && method==='pickup' && <span className="text-orange-600 font-bold text-xs ml-1">請儘快到店完成取貨</span>}
                          </div>
                          {order.content?.user?.address && method!=='pickup' && <div className="text-xs text-gray-400">地址：{order.content.user.address}</div>}
                        </div>
                        <div className="flex gap-2">
                          {order.status==='Pending' && <button onClick={() => updateStatus(order.orderId,'Shipped')} className="flex-1 bg-blue-500 text-white py-2 rounded-lg text-sm font-bold active:scale-95 transition-transform">確認出貨</button>}
                          {order.status==='Shipped' && <button onClick={() => updateStatus(order.orderId,'Completed')} className="flex-1 bg-green-500 text-white py-2 rounded-lg text-sm font-bold active:scale-95 transition-transform">完成 (發點數)</button>}
                          {order.status==='Pending' && <button onClick={() => updateStatus(order.orderId,'Cancelled')} className="flex-1 bg-red-100 text-red-600 py-2 rounded-lg text-sm font-bold active:scale-95 transition-transform">取消</button>}
                        </div>
                      </div>
                    );
                  })
                )}
                {/* 兌換 */}
                {tab==='redemptions' && (
                  redemptions.length===0 ? <div className="text-center text-gray-400 py-10">無兌換資料</div> :
                  redemptions.map(r => (
                    <div key={r.redemptionId} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                      <div className="flex justify-between items-start mb-2">
                        <div><div className="font-bold text-gray-800">{r.redemptionId}</div><div className="text-xs text-gray-500">{r.date ? new Date(r.date).toLocaleString('zh-TW') : ''}</div></div>
                        {statusBadge(r.status)}
                      </div>
                      <div className="text-sm text-gray-600 mb-3 space-y-1">
                        <div>兌換人: {r.content?.userName}</div>
                        <div>商品: {r.content?.itemName}</div>
                        <div>扣除點數: {r.content?.points}</div>
                      </div>
                      <div className="flex gap-2">
                        {r.status==='Pending' && <button onClick={() => updateRedemptionStatus(r.redemptionId,'Shipped')} className="flex-1 bg-blue-500 text-white py-2 rounded-lg text-sm font-bold">通知出貨</button>}
                        {r.status==='Shipped' && <button onClick={() => updateRedemptionStatus(r.redemptionId,'Completed')} className="flex-1 bg-green-500 text-white py-2 rounded-lg text-sm font-bold">完成兌換</button>}
                      </div>
                    </div>
                  ))
                )}
                {/* 用戶 */}
                {tab==='users' && (
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-3 bg-gray-50 border-b text-sm font-bold text-gray-500">共 {users.length} 位用戶</div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left">
                        <thead className="bg-gray-50 text-gray-500 font-bold text-xs">
                          <tr><th className="p-3">姓名</th><th className="p-3">電話</th><th className="p-3">生日</th><th className="p-3">點數</th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {users.map((u,idx) => (
                            <tr key={idx} className="hover:bg-gray-50">
                              <td className="p-3 font-medium">{u.name}</td>
                              <td className="p-3 text-gray-500">{u.phone}</td>
                              <td className="p-3 text-gray-500">{u.birthday}</td>
                              <td className="p-3 text-lime-600 font-bold">{u.points||0}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
                {/* 商品管理 */}
                {tab==='products' && (
                  <div className="space-y-4">
                    <button onClick={() => setEditProduct({ name:'',price:0,originalPrice:0,stock:0,description:'',images:[],variants:[],redeemPoints:0 })}
                      className="w-full bg-lime-600 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2">
                      <Icons.Plus className="w-5 h-5" /> 新增商品
                    </button>
                    {products.map(p => (
                      <div key={p.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex gap-3">
                        <img src={p.images?.[0]} className="w-16 h-16 rounded-lg object-cover bg-gray-100 flex-shrink-0" referrerPolicy="no-referrer" />
                        <div className="flex-1 min-w-0">
                          <div className="font-bold text-gray-800 truncate">{p.name}</div>
                          <div className="text-lime-600 font-bold">NT${p.price}</div>
                          <div className="text-xs text-gray-400">庫存: {p.stock}</div>
                        </div>
                        <div className="flex flex-col gap-2">
                          <button onClick={() => setEditProduct({...p})} className="p-2 bg-blue-50 text-blue-600 rounded-lg"><Icons.Edit className="w-4 h-4" /></button>
                          <button onClick={() => handleDeleteProduct(p.id)} className="p-2 bg-red-50 text-red-500 rounded-lg"><Icons.Trash2 className="w-4 h-4" /></button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {/* 設定 */}
                {tab==='settings' && (
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                    <h3 className="font-bold text-lg">商店設定</h3>
                    {[
                      {key:'storeName',label:'店名',type:'text'},
                      {key:'shippingFee',label:'運費',type:'number'},
                      {key:'freeShippingThreshold',label:'免運門檻',type:'number'},
                      {key:'pointRatio',label:'點數累積金額 (多少元1點)',type:'number'},
                      {key:'storeAddress',label:'門市地址',type:'text'},
                      {key:'storePhone',label:'門市電話',type:'text'},
                      {key:'marqueeText',label:'跑馬燈文字',type:'text'},
                    ].map(f => (
                      <div key={f.key}>
                        <label className="block text-sm font-bold text-gray-700 mb-1">{f.label}</label>
                        <input type={f.type} value={adminSettings[f.key]||''} onChange={e=>setAdminSettings({...adminSettings,[f.key]:f.type==='number'?Number(e.target.value):e.target.value})} className="w-full p-2 border rounded-lg" />
                      </div>
                    ))}
                    <button onClick={async () => {
                      if (!await showConfirm('確定要更新設定嗎？')) return;
                      try {
                        const r = await api.post('updateSettings', { adminId:user.lineId, settings:adminSettings });
                        if (r?.success) showAlert('設定已更新'); else showAlert('更新失敗：' + (r?.error||''));
                      } catch(e) { showAlert('更新失敗'); }
                    }} className="w-full bg-lime-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-lime-200 active:scale-95 transition-transform">
                      儲存設定
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    };

    // =====================================================
    // App Root
    // =====================================================
    const App = () => (
      <ErrorBoundary>
        <AppProvider>
          <DialogProvider>
            <HashRouter>
              <Routes>
                <Route path="/" element={<Home />} />
                <Route path="/product/:id" element={<ProductDetail />} />
                <Route path="/cart" element={<Cart />} />
                <Route path="/profile" element={<Profile />} />
                <Route path="/orders" element={<OrderHistory />} />
                <Route path="/instructions" element={<Instructions />} />
                <Route path="/redeem" element={<Redeem />} />
                <Route path="/admin" element={<AdminDashboard />} />
              </Routes>
            </HashRouter>
          </DialogProvider>
        </AppProvider>
      </ErrorBoundary>
    );
    try {
      const container = document.getElementById('root');
      if (!container) throw new Error('Root element not found');
      ReactDOM.createRoot(container).render(<App />);
    } catch(err) {
      console.error('Render Error:', err);
      document.getElementById('root').innerHTML = `<div style="padding:20px;color:red;">啟動失敗: ${err.message}</div>`;
    }
  </script>
</body>
</html>
